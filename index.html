<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is Year Progress Dashboard?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Year Progress Dashboard is a free, minimal weekly planner that runs entirely in the browser. It shows your current week as a calendar, fetches a 7-day weather forecast, and lets you create sticky notes. No account or install is required."
      }
    },
    {
      "@type": "Question",
      "name": "Is Year Progress Dashboard free?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Year Progress Dashboard is completely free. There is no account, no subscription, and no paid tier."
      }
    },
    {
      "@type": "Question",
      "name": "Does Year Progress Dashboard store my data?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "All data — notes, settings, and weather cache — is stored locally in your browser's localStorage. Nothing is sent to a server."
      }
    },
    {
      "@type": "Question",
      "name": "How does Year Progress Dashboard get my location for weather?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Year Progress Dashboard detects your city automatically using IP geolocation (ipapi.co with ipwho.is as fallback). You can override the location manually by searching for a city in settings."
      }
    },
    {
      "@type": "Question",
      "name": "What languages does Year Progress Dashboard support?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Year Progress Dashboard supports English, Spanish, and Portuguese. The language can be changed in the settings panel."
      }
    },
    {
      "@type": "Question",
      "name": "Does Year Progress Dashboard work offline?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Year Progress Dashboard works offline for notes and the calendar. Weather data is cached and shown until a fresh fetch is possible. An internet connection is needed to load the page initially and refresh weather."
      }
    }
  ]
}
</script>

<script>
// Apply persisted font/size settings before first paint to prevent flash
(function() {
    var fonts = { 'caveat':"'Caveat', cursive", 'sf-mono':"'SF Mono', 'SFMono-Regular', ui-monospace, monospace", 'lora':"'Lora', serif", 'dm-mono':"'DM Mono', monospace", 'jetbrains-mono':"'JetBrains Mono', monospace" };
    var sizes   = { 'S':'22px', 'M':'28px', 'L':'36px' };
    var sizes1x = { 'S':'16px', 'M':'20px', 'L':'26px' };
    var r = document.documentElement;
    // Theme (applied early to avoid flash)
    var savedTheme = localStorage.getItem('aura_theme') || 'valley';
    if (savedTheme === 'cove') r.classList.add('theme-cove');
    if (savedTheme === 'valley') r.classList.add('theme-valley');
    if (savedTheme === 'tahoe') r.classList.add('theme-tahoe');

    window.addEventListener('DOMContentLoaded', () => {
        const tToggle = document.getElementById('theme-quick-toggle');
        if (tToggle && savedTheme === 'cove') tToggle.classList.add('toggle-cove');
        if (tToggle && savedTheme === 'valley') tToggle.classList.add('toggle-valley');
        if (tToggle && savedTheme === 'tahoe') tToggle.classList.add('toggle-tahoe');
    });
    
    var f = localStorage.getItem('aura_note_font');
    if (f && fonts[f]) r.style.setProperty('--note-font', fonts[f]);
    var s = localStorage.getItem('aura_note_size');
    if (s) r.style.setProperty('--note-size', (window.devicePixelRatio > 1 ? sizes : sizes1x)[s] || sizes[s]);
})();
</script>

/* Sunrise / sunset markers on time ruler */
.sun-label {
    position: absolute;
    bottom: 17px;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    color: #F59E0B;
    opacity: 0.65;
    white-space: nowrap;
    transform: translateX(-50%);
    pointer-events: auto;
    letter-spacing: 0.02em;
    cursor: default;
}
.sun-label:hover { opacity: 1; }
.sun-tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%) translateY(3px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
    white-space: nowrap;
}
.sun-tooltip-icon { opacity: 0.5; display: flex; color: var(--text-color); }
.sun-tooltip-bubble {
    background: rgba(245,158,11,0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 0.5px solid rgba(245,158,11,0.25);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #F59E0B;
}
.sun-label:hover .sun-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* Time ruler — absolute, sits on top edge of week bar */
.time-ruler {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: calc((100% - 90px) * 0.8);
    height: 44px;
    margin-bottom: -3px;
    user-select: none;
    -webkit-user-select: none;
}

.time-ruler-track {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, var(--text-color) 50%, transparent 100%);
    opacity: 0.15;
}

.time-ruler-past {
    position: relative;
    height: 100%;
    background: linear-gradient(to right, rgba(167,139,202,0.08), rgba(167,139,202,0.5));
    border-radius: 1px;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: visible;
}
.time-ruler-past::before {
    content: '';
    position: absolute;
    top: 0;
    left: 20%;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.5));
    border-radius: 1px;
    pointer-events: none;
}
.time-ruler-past::after {
    content: '';
    position: absolute;
    right: -10px;
    top: -5px;
    width: 20px;
    height: 11px;
    background: rgba(167,139,202,0.55);
    filter: blur(6px);
    border-radius: 50%;
    pointer-events: none;
}

.time-ruler-tick {
    position: absolute;
    bottom: 1px;
    width: 1px;
    transform: translateX(-50%);
    border-radius: 1px;
}

.time-ruler-tick.hour    { height: 14px; }
.time-ruler-tick.half    { height: 7px; }
.time-ruler-tick.quarter { height: 3px; }

.time-ruler-now {
    position: absolute;
    top: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    transform: translateX(-50%);
    filter: drop-shadow(0 0 5px rgba(167,139,202,0.4));
}

.time-ruler-now-line {
    flex: 1;
    width: 1.5px;
    position: relative;
    background: linear-gradient(to bottom, rgba(167,139,202,0.0), rgba(167,139,202,0.95));
    border-radius: 1px;
    margin: 2px 0 2px;
}

.time-ruler-now-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #c580fb;
    border: 1.5px solid rgba(255,255,255,0.65);
    box-shadow: 0 0 0 3px rgba(167,139,202,0.25), 0 0 14px rgba(167,139,202,0.7);
    animation: yearDotPulse 3s ease-in-out infinite;
    flex-shrink: 0;
}

.time-ruler-hover-label {
    position: absolute;
    top: 0;
    pointer-events: none;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 3px 10px;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 20;
}
.time-ruler-hover-label.visible { opacity: 1; }

.time-ruler-now-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    margin-top: 10px;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    color: #7B52B0;
    white-space: nowrap;
    flex-shrink: 0;
    background: rgba(167,139,202,0.1);

.day-card:active {
    transform: scale(0.92) translateY(0);
    transition: transform 0.1s var(--sf-easing);
}

.day-card.active {
    background: var(--text-color);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    color: var(--bg-color);
    transform: none;
    z-index: 10;
}

.day-card.active::after {
    content: none;
}

.day-name {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    opacity: 0.45;
    margin-bottom: 2px;
    letter-spacing: 0.04em;
}

.day-card.active .day-name { opacity: 0.6; }

.day-card.weekend .day-number {
    background: linear-gradient(to bottom, var(--text-color) 20%, #A0A0A8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.day-card.weekend.active .day-number {
    background: none;
    -webkit-background-clip: unset;
    -webkit-text-fill-color: unset;
    background-clip: unset;
}

.day-number {
    font-size: 28px; 
    font-weight: 700;
    letter-spacing: -0.06em;
    font-variant-numeric: tabular-nums;
    transition: font-weight 0.4s var(--sf-easing);
}

.day-card.active .day-number {
    font-weight: 850;
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    -webkit-text-fill-color: var(--bg-color);
    color: var(--bg-color);
}

/* Inline weather inside day cards */
.day-main-row {
    display: flex;
    align-items: center;
    gap: 4px;
}

.weather-separator {
    width: 1px;
    height: 28px;
    background: linear-gradient(to bottom, transparent, rgba(120,120,128,0.2) 50%, transparent);
    flex-shrink: 0;
}

/* WEATHER ROW — below the dock */
.weather-row {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 54px;
    margin-top: 10px;
    opacity: 0.7;
}

.weather-day {
    width: 58px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: 0.3s;
    pointer-events: auto;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-color);
}

.weather-day:hover { opacity: 1; transform: translateY(-1px); }

.weather-day .weather-icon { font-size: 15px; margin-bottom: 0; margin-right: 4px; }
.weather-day .weather-temp { font-size: 11px; font-weight: 700; opacity: 0.8; }

.weather-separator {
    width: 1px;
    height: 10px;
    background: linear-gradient(to bottom, transparent, rgba(120,120,128,0.3) 50%, transparent);
    flex-shrink: 0;
}

.weather-day.today {
    filter: drop-shadow(0 0 6px rgba(0, 122, 255, 0.5));
}

.weather-icon { font-size: 14px; margin-bottom: 1px; }
.weather-temp { font-size: 10px; font-weight: 700; }


.weather-tooltip {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Caveat', cursive;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.01em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 9998;
    color: var(--text-color);
    text-align: center;
    white-space: nowrap;
}

.weather-tooltip.show {
    opacity: 0.4;
}

.bottom-controls {
    display: none;
    position: fixed;
    bottom: max(16px, calc(16px + env(safe-area-inset-bottom)));
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
}

.lang-btn {
    background: none;
    border: none;
    color: var(--text-color);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    opacity: 0.3;
    cursor: pointer;
    transition: opacity 0.3s;
}

.lang-btn:hover {
    opacity: 1;
}

.city-tooltip {
    display: none;
    position: fixed;
    bottom: max(16px, calc(16px + env(safe-area-inset-bottom)));
    right: 30px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.2;
    z-index: 9999;
    pointer-events: auto;
    cursor: pointer;
    transition: 0.3s;
}

.city-tooltip:hover {
    opacity: 0.6;
    transform: scale(1.05);
}



.note {
    position: absolute;
    width: fit-content;
    min-width: 80px;
    max-width: 600px;
    min-height: 40px;
    background: var(--card-bg);
    backdrop-filter: blur(50px) saturate(180%);
    -webkit-backdrop-filter: blur(50px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 30px;
    padding: 18px 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    z-index: 1100;
    cursor: grab;
    transition: transform 0.4s var(--spring-easing), box-shadow 0.3s var(--sf-easing), opacity 0.3s ease;
    overflow: visible;
    resize: none;
}

.note:active:not(:has(.note-resize-handle:active)) {
    transform: none;
}

.note.dragging {
    cursor: grabbing;
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.15);
    transition: transform 0.4s var(--spring-easing), padding 0.3s var(--sf-easing),
                border-radius 0.3s var(--sf-easing), opacity 0.25s ease;
}

.note.dragging.near-dock {
    padding: 6px 14px;
    border-radius: 30px;
    opacity: 0.85;
    pointer-events: none;
    transform-origin: center center;
    transition: transform 0.35s var(--spring-easing), padding 0.3s var(--sf-easing),
                border-radius 0.3s var(--sf-easing), opacity 0.25s ease;
}

.note.dragging.near-dock .note-content {
    transition: font-size 0.3s var(--sf-easing), max-height 0.3s var(--sf-easing);
    font-size: 13px;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
    max-height: 1.1em;
}

.note.dragging.near-dock .note-resize-handle,
.note.dragging.near-dock .note-close,
.note.dragging.near-dock .note-color-bar {
    opacity: 0;
    pointer-events: none;
}

/* Note close button — top right corner */
.note-close {
    position: absolute;
    top: -2px;
    right: -6px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #FF5F57;
    border: 0.5px solid rgba(0, 0, 0, 0.12);
    box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transform: scale(0);
    transition: transform 0.3s var(--spring-easing), opacity 0.2s ease, filter 0.15s ease;
}

.note:hover .note-close,
.note.editing .note-close {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
}

.note-close:active {
    filter: brightness(0.8);
}

.note-close svg {
    width: 8px;
    height: 8px;
    stroke: rgba(255, 255, 255, 0.9);
    stroke-width: 1.6;
    fill: none;
    transition: stroke 0.1s ease;
}

.note-close:hover svg {
    stroke: rgba(77, 0, 0, 0.9);
}


.note-content {
    font-family: var(--note-font);
    font-size: var(--note-size);
    line-height: 1.1;
    outline: none;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: normal;
}
body.note-font-sf-mono .note-content {
    font-size: calc(var(--note-size) * 0.72);
    outline: none;
    color: var(--text-color);
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: normal;
}

.note-edit-ta {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--note-font);
    font-size: var(--note-size);
    line-height: 1.1;
    color: inherit;
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    overflow: hidden;
    field-sizing: content;
}
body.note-font-sf-mono .note-edit-ta {
    font-size: calc(var(--note-size) * 0.72);
}

.note-edit-tip {
    position: fixed;
    bottom: max(86px, calc(86px + env(safe-area-inset-bottom)));
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-color);
    opacity: 0.3;
    pointer-events: none;
    user-select: none;
    z-index: 3000;
    white-space: nowrap;
}

.note-content a {
    color: var(--accent-color);
    text-decoration: none;
    border-bottom: 2px solid rgba(0, 122, 255, 0.2);
    font-family: inherit !important;
}

/* Image notes */
.note.image-note {
    padding: 0;
    overflow: visible;
    background: #000;
    border: 1px solid rgba(0,0,0,0.12);
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
}

.note.image-note .note-content,
.note.image-note .note-color-bar {
    display: none;
}

.note.spotify-note {
    width: 300px !important;
    padding: 6px;
    border-radius: 16px;
}
.note.spotify-note .note-content {
    padding: 0;
    overflow: hidden;
    border-radius: 10px;
    height: 152px;
    line-height: 0;
}
.note.spotify-note .note-content iframe {
    display: block;
    width: 100%;
    height: 152px;
    border: none;
    border-radius: 10px;
}
.note.spotify-note .note-color-bar { display: none; }

.note-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 30px;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-user-drag: none;
}


/* ── Screenshot mode (Option+D) ── */
.screenshot-overlay {
    position: fixed;
    inset: 0;
    z-index: 1098;
    backdrop-filter: blur(28px) saturate(120%) brightness(0.88);
    -webkit-backdrop-filter: blur(28px) saturate(120%) brightness(0.88);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}
body.screenshot-mode .screenshot-overlay { opacity: 1; }
body.screenshot-mode .note,
body.screenshot-mode .settings-btn,
body.screenshot-mode .capsule,
body.screenshot-mode .bottom-watermark,
body.screenshot-mode .dev-export-btn,
body.screenshot-mode .note-edit-overlay,
body.screenshot-mode .note-arrow-bar {
    opacity: 0 !important;
    pointer-events: none !important;
    transition: opacity 0.3s ease !important;
}
body.screenshot-mode .dock-wrapper {
    z-index: 1200;
}

/* ── Note editing mode — page blur + arrow bar ── */
.note-edit-overlay {
    display: none;
}
body.note-editing-mode .note-edit-overlay { display: none; }
body.note-editing-mode .note.editing { z-index: 2000 !important; }
body.note-editing-mode .note:not(.editing) { z-index: 50 !important; }

.note-arrow-bar {
    position: fixed;
    bottom: max(28px, calc(28px + env(safe-area-inset-bottom)));
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--card-bg);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border: 0.5px solid rgba(255,255,255,0.35);
    border-radius: 18px;
    padding: 6px 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.25s var(--spring-easing);
}
body.note-editing-mode .note-arrow-bar {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0px);
}
.note-arrow-btn {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text-color);
    opacity: 0.7;
    transition: background 0.15s, opacity 0.15s;
    user-select: none;
    font-family: 'Inter', sans-serif;
}
.note-arrow-btn:hover { background: rgba(128,128,128,0.12); opacity: 1; }
.note-arrow-btn:active { transform: scale(0.88); }
.note-arrow-sep {
    width: 1px;
    height: 18px;
    background: rgba(128,128,128,0.18);
    margin: 0 4px;
    flex-shrink: 0;
}

/* SVG arc resize handle */
.note-resize-handle {
    position: absolute;
    bottom: -5px;
    right: -5px;
    width: 38px;
    height: 38px;
    cursor: nwse-resize;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s var(--sf-easing);
    pointer-events: none;
}
.note-resize-handle svg {
    pointer-events: none;
}
.note-resize-handle .rh-fill {
    pointer-events: stroke;
    cursor: nwse-resize;
}

.note:hover .note-resize-handle { opacity: 1; pointer-events: none; }
.note:hover .note-resize-handle .rh-fill { pointer-events: stroke; }

.note-resize-handle .rh-fill { }



html.hide-ruler .time-ruler {
    display: none !important;
}
html.hide-ruler .dock-wrapper {
    margin-top: auto;
}


/* BG TOGGLE — 3-way theme switcher */
.bg-toggle {
    position: fixed;
    top: 24px;
    right: 76px;
    z-index: 10001;
    width: 102px;
    height: 30px;
    border-radius: 100px;
    border: 0.5px solid rgba(0, 0, 0, 0.08);
    background: rgba(120, 120, 128, 0.12);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.3s var(--spring-easing), background 0.3s;
    padding: 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: inset 0 0.5px 1px rgba(0,0,0,0.05);
}

body.dev-mode:hover .bg-toggle { opacity: 1; }
.bg-toggle:hover { background: rgba(120, 120, 128, 0.18); transform: translateY(-1px); }
.bg-toggle:active { transform: translateY(0) scale(0.96); }

.bg-toggle-icon {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.3;
    transition: opacity 0.3s;
    z-index: 1;
    flex-shrink: 0;
}

/* Active icon brightens based on theme class */
.bg-toggle:not(.toggle-cove):not(.toggle-valley):not(.toggle-tahoe) .icon-theme-default,
.bg-toggle.toggle-cove .icon-theme-cove,
.bg-toggle.toggle-valley .icon-theme-valley,
.bg-toggle.toggle-tahoe .icon-theme-tahoe {
    opacity: 0.9;
}

.bg-toggle-knob {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.04);
    transition: transform 0.4s var(--spring-easing);
    z-index: 0;
}

.bg-toggle.toggle-cove .bg-toggle-knob   { transform: translateX(24px); }
.bg-toggle.toggle-valley .bg-toggle-knob { transform: translateX(48px); }
.bg-toggle.toggle-tahoe .bg-toggle-knob  { transform: translateX(72px); }

.bg-toggle-icon svg {
    width: 12px;
    height: 12px;
    stroke: var(--text-color);
}

/* SETTINGS — top right */
.settings-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10001;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    opacity: 0.35;
    transition: opacity 0.4s ease, transform 0.4s var(--spring-easing);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    padding: 0;
}

.settings-btn:hover { opacity: 1; }
.settings-btn:active { transform: scale(0.92); }
.settings-btn.open { opacity: 1; }


.settings-btn svg {
    transition: transform 0.5s var(--spring-easing);
}
.settings-btn:hover svg { transform: rotate(45deg); }

/* Dev export */
.dev-export-btn {
    position: fixed;
    top: 70px;
    right: 20px;
    z-index: 10001;
    display: none;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    opacity: 0.8;
    letter-spacing: 0.02em;
}
.dev-export-btn:hover { opacity: 1; }
body.dev-mode .dev-export-btn { display: block; }
.dev-only { display: none; }
body.dev-mode .dev-only { display: block; }
.dev-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
}
.dev-modal.open { display: flex; }
.dev-modal-box {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 20px;
    width: 560px;
    max-width: 90vw;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.dev-modal-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.05em;
}
.dev-modal textarea {
    background: #111;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #a8ff78;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 12px;
    resize: none;
    height: 280px;
    width: 100%;
    box-sizing: border-box;
    line-height: 1.6;
}
.dev-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.dev-modal-copy {
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
}
.dev-modal-close {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
}

.settings-panel {
    position: fixed;
    top: 58px;
    right: 20px;
    z-index: 10000;
    background: rgba(22, 22, 24, 0.88);
    backdrop-filter: blur(60px) saturate(180%);
    -webkit-backdrop-filter: blur(60px) saturate(180%);
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 18px;
    padding: 18px;
    box-shadow:
        0 20px 50px rgba(0,0,0,0.4),
        inset 0 1px 0 0 rgba(255,255,255,0.08);
    width: 220px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-12px) scale(0.92);
    transform-origin: top right;
    transition: opacity 0.3s ease, transform 0.5s var(--spring-easing);
    user-select: none;
}

.settings-panel.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0) scale(1);
}

.settings-section-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.4;
    color: rgba(255,255,255,0.9);
    margin-bottom: 6px;
}

.settings-row {
    display: flex;
    gap: 6px;
    align-items: center;
}

.settings-location-input {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.settings-location-input::placeholder { color: rgba(255,255,255,0.3); }

.settings-location-input:focus {
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
}

.settings-toggle {
    display: flex;
    gap: 2px;
    padding: 2px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
}

.settings-toggle-btn {
    flex: 1;
    padding: 6px 0;
    border: none;
    border-radius: 8px;
    background: transparent;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    opacity: 0.4;
    cursor: pointer;
    transition: opacity 0.2s, background 0.2s, box-shadow 0.2s;
}

.settings-toggle-btn.active {
    opacity: 1;
    background: rgba(255,255,255,0.12);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}


.font-pick {
    width: 34px;
    height: 30px;
    border-radius: 8px;
    border: 1.5px solid transparent;
    background: rgba(255,255,255,0.06);
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s, transform 0.2s var(--spring-easing), border-color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    line-height: 1;
}

.font-pick:hover {
    opacity: 0.8;
    transform: scale(1.06);

.capsule {

    flex-direction: column;

}
.capsule-pill {

}
.capsule-pill:hover { opacity: 1; }
.capsule.open .capsule-pill { opacity: 1; border-radius: 0 0 20px 20px; }
.capsule-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-color); opacity: 0.3;
    transition: background 0.3s, opacity 0.3s; flex-shrink: 0;
}
.capsule.has-pending .capsule-dot { background: #c580fb; opacity: 1; }
.capsule-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.15em; opacity: 0.5; color: var(--text-color);
}
.capsule-panel {

    flex-direction: column;
    gap: 12px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    pointer-events: none;
    padding: 0 20px;
    transition: max-height 0.4s var(--sf-easing), opacity 0.3s ease, padding 0.4s var(--sf-easing);
}
.capsule.open .capsule-panel { max-height: 320px; opacity: 1; pointer-events: auto; padding: 20px; }
.capsule-title {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.2em; opacity: 0.35; color: var(--text-color);
}
.capsule-textarea {
    width: 100%; min-height: 80px; resize: none; border: none;
    background: rgba(0,0,0,0.04); border-radius: 12px;

}
.capsule-textarea::placeholder { opacity: 0.3; }
.capsule-days { display: flex; gap: 6px; }
.capsule-day-btn {
    flex: 1; height: 26px; border-radius: 13px;
    border: 0.5px solid rgba(0,0,0,0.15); background: transparent;
    color: var(--text-color); font-size: 10px; font-weight: 700;
    letter-spacing: 0.06em; cursor: pointer; opacity: 0.35;
    transition: opacity 0.2s, background 0.2s, color 0.2s;
}
.capsule-day-btn.active { background: var(--text-color); color: var(--bg-color); opacity: 1; }
.capsule-day-btn:hover { opacity: 0.7; }
.capsule-send {
    height: 30px; border-radius: 15px; border: none;
    background: var(--text-color); color: var(--bg-color);
    font-size: 10px; font-weight: 700; text-transform: uppercase;

}

@media (max-width: 1260px) and (min-width: 431px) {
    .day-card        { width: 52px; height: 54px; border-radius: 28px; }

}

/* ── 1x (non-retina) screens: thicken hairline borders + scale down fonts ── */
@media (-webkit-max-device-pixel-ratio: 1), (max-resolution: 1dppx) {
    .dock-container,
    .note,
    .settings-panel,
    .note-arrow-bar,
    .time-ruler-now-label,
    .sun-tooltip-bubble {
        border-width: 1px;
    }
    body            { justify-content: flex-end; }
    .dock-wrapper   { padding-bottom: 32px; margin-top: 0; margin-bottom: 0; }
    :root           { --note-size: 20px; }
    .day-number     { font-size: 18px; }
    .day-name       { font-size: 8px; }
    .weather-tooltip { font-size: 24px; }
    .sun-label      { font-size: 7px; }
    .sun-tooltip-bubble { font-size: 9px; }
}

/* ── backdrop-filter unsupported fallback (Firefox, some Windows) ── */
@supports not (backdrop-filter: blur(1px)) {
    .dock-container  { background: rgba(240, 240, 240, 0.92); }
    .note            { background: rgba(245, 245, 245, 0.96); }
    .settings-panel  { background: rgba(22, 22, 24, 0.95); }
    .note-arrow-bar  { background: rgba(240, 240, 240, 0.96); }
    .note-edit-overlay { background: rgba(0,0,0,0.35); }
}

/* ── Dock to bottom + fluid width at ≤ 750px ── */
@media (max-width: 750px) and (min-width: 431px) {
    body           { justify-content: flex-end; }
    .dock-wrapper  { width: calc(100% - 32px); padding-bottom: max(20px, env(safe-area-inset-bottom)); margin-top: 0; margin-bottom: 0; }
    .dock-row      { width: 100%; }
    .dock-container{ flex: 1; }
    .day-card      { flex: 1; width: auto; min-width: 0; }
    .dock-nav      { display: none; }
    .time-ruler    { width: calc(100% - 32px); }
}

/* ── Mobile layout — iPhone 13 → current (≤ 430px logical px) ── */
@media (max-width: 430px) {
    #desktop-only { display: none !important; }

    /* ── Body: dock at bottom ── */
    body {
        justify-content: flex-end;
    }

    /* ── Dock wrapper: safe-area bottom breathing room ── */
    .dock-wrapper {
        width: calc(100% - 24px);
        gap: 10px;
        padding-bottom: max(20px, env(safe-area-inset-bottom));
        margin-top: 0;
        margin-bottom: 0;
    }
    .dock-row { width: 100%; }
    .dock-container {
        flex: 1;
        padding: 8px 6px;
        gap: 4px;
        border-radius: 28px;
    }
    .dock-nav { display: none; }

    /* ── Day cards: full-width flex, tall enough for touch ── */
    .day-card {
        flex: 1;
        width: auto;
        min-width: 0;
        height: 80px;
        border-radius: 22px;
    }
    .day-card:hover  { transform: none; }
    .day-card:active { transform: scale(0.96); }

    /* ── Typography ── */
    .day-name   { font-size: 10px; letter-spacing: 0; }
    .day-number { font-size: 24px; }
    .day-separator { display: none; }
    .day-main-row  { gap: 3px; }

    /* ── Hide desktop-only chrome ── */
    .bottom-controls { display: none; }
    .city-tooltip    { display: none; }
    .capsule         { display: none; }

    /* ── Year progress: above dock ── */
    .year-progress-label {
        top: auto;
        bottom: calc(100% + 10px);
    }
    .year-progress-label .yp-bar { width: calc(100vw - 48px); }

    /* ── Time ruler: collapse, hide all ruler elements ── */
    .time-ruler { display: none; }

    /* ── Mobile clock pill: safe-area aware top ── */
    #mobile-time {
        display: block;
        position: fixed;
        top: max(16px, env(safe-area-inset-top, 16px));
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #7B52B0;
        background: rgba(167,139,202,0.12);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 0.5px solid rgba(167,139,202,0.3);
        border-radius: 20px;
        padding: 4px 12px;
        z-index: 9999;
        pointer-events: none;
        white-space: nowrap;
    }

    /* ── Settings button: respect Dynamic Island / notch ── */
    .settings-btn {
        top: max(16px, env(safe-area-inset-top, 16px));
        right: 16px;
    }

    /* ── Settings panel: open below settings button ── */
    .settings-panel {
        right: 8px;
        left: 8px;
        width: auto;
        top: max(66px, calc(env(safe-area-inset-top, 0px) + 60px));
        max-height: calc(100dvh - max(66px, calc(env(safe-area-inset-top, 0px) + 60px)) - 20px);
    }

    /* ── Notes ── */
    .weather-tooltip  { font-size: 20px; }
    .note             { max-width: calc(100vw - 32px); }
    .note-resize-handle { opacity: 1; }
    .note-arrow-bar   { max-width: calc(100vw - 32px); }
}

<script>
    /* ============================================================
       BACKGROUND GEOMETRY & MESH
    ============================================================ */
    const geoModes = ['off', 'dots', 'web', 'stellar', 'tribon', 'mesh'];
    let currentGeo = localStorage.getItem('aura_bg_geo') || 'off';

    function initMeshBg() {
        const W = window.innerWidth, H = window.innerHeight;
        const PAD = 200;
        const TW = W + PAD * 2, TH = H + PAD * 2;
        const balls = [
            { x: W *  1.20 - 300 + PAD, y: H * -0.10 + 300 + PAD, r: 300, color: '#007AFF' },
            { x: W * -0.18 + 275 + PAD, y: H *  1.12 - 275 + PAD, r: 275, color: '#FF3B30' },
            { x: W *  0.93 - 250 + PAD, y: H *  0.83 - 250 + PAD, r: 250, color: '#5856D6' },
        ];
        const iframe = document.getElementById('mesh-iframe');
        if (!iframe) return;
        const circles = balls.map(b =>
            `<div style="position:absolute;width:${b.r*2}px;height:${b.r*2}px;left:${b.x-b.r}px;top:${b.y-b.r}px;border-radius:50%;background:${b.color};"></div>`
        ).join('');
        const srcdoc = `<!DOCTYPE html><html><head><style>
            *{margin:0;padding:0;box-sizing:border-box;}
            body{width:${TW}px;height:${TH}px;overflow:hidden;background:transparent;filter:blur(120px);}
        </style></head><body>${circles}</body></html>`;
        iframe.srcdoc = srcdoc;
        iframe.style.top = `-${PAD}px`;
        iframe.style.left = `-${PAD}px`;
        iframe.style.width = `${TW}px`;
        iframe.style.height = `${TH}px`;
    }

    function drawBgGeo() {
        const canvas = document.getElementById('dot-connections');
        if (!canvas) return;
        const W = window.innerWidth, H = window.innerHeight;
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, W, H);

        if (currentGeo === 'web') {
            const STEP = 22, OFF = 11;
            const cols = Math.ceil(W / STEP) + 1, rows = Math.ceil(H / STEP) + 1;
            ctx.strokeStyle = 'rgba(0,0,0,0.13)';
            ctx.lineWidth = 1;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = c * STEP + OFF, y = r * STEP + OFF;
                    if (c < cols - 1 && Math.random() < 0.14)
                        { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + STEP, y); ctx.stroke(); }
                    if (r < rows - 1 && Math.random() < 0.14)
                        { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + STEP); ctx.stroke(); }
                }
            }
        } else if (currentGeo === 'stellar') {
            const N = Math.floor((W * H) / 14000);
            const pts = Array.from({ length: N }, () => ({ x: Math.random() * W, y: Math.random() * H }));
            const MAX_DIST = 160;
            ctx.lineWidth = 0.8;
            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < MAX_DIST) {
                        const alpha = (1 - d / MAX_DIST) * 0.22;
                        ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
                        ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke();
                    }
                }
            }
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 1.3, 0, Math.PI * 2); ctx.fill(); });
        } else if (currentGeo === 'tribon') {
            const A1 = 0.5436890126920764, A2 = 0.2956120693571985;
            const N = Math.floor((W * H) / 6500);
            ctx.fillStyle = 'rgba(0,0,0,0.38)';
            for (let i = 0; i < N; i++) {
                const x = ((0.5 + i * A1) % 1) * W, y = ((0.5 + i * A2) % 1) * H;
                ctx.beginPath(); ctx.arc(x, y, 1.2, 0, Math.PI * 2); ctx.fill();
            }
        }
    }

    function applyBgGeo(mode, noSave = false) {
        geoModes.forEach(m => document.body.classList.remove('bg-geo-' + m));
        document.body.classList.add('bg-geo-' + mode);
        document.querySelectorAll('.geo-switch-btn').forEach(b => b.classList.toggle('active', b.dataset.geo === mode));
        currentGeo = mode;
        if (mode === 'mesh') initMeshBg();
        drawBgGeo();
        if (!noSave) localStorage.setItem('aura_bg_geo', mode);
    }

    window.addEventListener('resize', () => {
        if (currentGeo === 'mesh') initMeshBg();
        drawBgGeo();
    });

    /* ============================================================
       LANGUAGE SYSTEM: EN / ES / PT (3-way cycle)
    ============================================================ */
    const LANGS = ['en', 'es', 'pt'];
    const LANG_LABELS = { en: 'EN', es: 'ES', pt: 'PT' };
    let lang = LANGS.includes(localStorage.getItem('aura_lang')) ? localStorage.getItem('aura_lang') : 'en';
    const dock = document.getElementById('dock');
    let notes = JSON.parse(localStorage.getItem('aura_notes_v3')) || [];

    // First time — seed hint notes
    if (notes.length === 0) {
        notes = [
            { id: 'n_s2', x: Math.min(40,  window.innerWidth * 0.04), y: 38,  w: Math.min(260, window.innerWidth * 0.45), text: 'saturday\n→ farmers market\n→ fix the bike\n→ dinner with J at 8', color: 'mint',  zIndex: 100 },
            ...(window.innerWidth > 600 ? [
            { id: 'n_s4', x: Math.min(175, window.innerWidth * 0.30), y: 38,  w: Math.min(223, window.innerWidth * 0.40), text: 'book flights\n↗ tokyo, april\nbefore prices jump',                 color: 'pink',  zIndex: 101 },
            { id: 'n_s5', x: Math.min(712, window.innerWidth * 0.55), y: 38,  w: Math.min(224, window.innerWidth * 0.38), text: 'ship it. don\'t wait.',                                            color: 'blue',  zIndex: 102 },
            ] : []),
        ];
        localStorage.setItem('aura_notes_v3', JSON.stringify(notes));
    }
    let topZ = 1100;

    /* ============================================================
       GREETINGS — simple main, funny subs
    ============================================================ */

    // Main greeting: simple, warm, uses day name where it feels right
    function getMainGreeting(lang, slot, dayName) {
        const map = {
            en: {
                morning:   `Good morning.`,
                afternoon: `Good afternoon.`,
                evening:   `Good evening.`,
                night:     `Good night.`,
            },
            es: {
                morning:   `Buenos días.`,
                afternoon: `Buenas tardes.`,
                evening:   `Buenas noches.`,
                night:     `Buenas noches.`,
            },
            pt: {
                morning:   `Bom dia.`,
                afternoon: `Boa tarde.`,
                evening:   `Boa noite.`,
                night:     `Boa noite.`,
            },
        };
        return map[lang][slot] || map[lang].morning;
    }

    // Subs stay funny & rotational
    const greetingSubs = {
        en: {
            dawn:      ["Can't sleep? Neither can your inbox.", "The birds aren't even awake yet. You good?", "Early bird gets the coffee. Go."],
            morning:   ["Fully charged. Let's pretend.", "Coffee first. Ambitions second.", "Today's forecast: unclear, like your plans.", "Still half asleep? Same energy here."],
            lateAM:    ["Lunch o'clock is approaching. Stay strong.", "The morning's not over. Technically.", "Still morning. Barely."],
            noon:      ["Midday. Peak confusion hours.", "It's noon somewhere. Actually it's here.", "Halfway through. You can do this. Probably."],
            afternoon: ["4pm slump incoming. You've been warned.", "Time is flying. Unlike your productivity.", "Still got it. Maybe."],
            evening:   ["Golden hour. Your ideas are finally good.", "Almost done. With the day, at least.", "Dinner soon? Your stomach says yes."],
            night:     ["Should you be asleep? Asking for science.", "Late-night ideas hit different. Unfortunately.", "This is fine. Everything is fine."],
        },
        es: {
            dawn:      ["¿No puedes dormir? Tu bandeja tampoco.", "Ni los pájaros están despiertos. ¿Todo bien?", "El que madruga, toma el café primero."],
            morning:   ["El café antes que las ambiciones.", "Hoy: confusión moderada y posibles logros.", "Cargado al 40%. Suficiente por agora.", "Buenos días. Relativo."],
            lateAM:    ["El almuerzo se acerca. Aguanta.", "Técnicamente todavía es mañana.", "La mañana no se ha rendido. Tú tampoco."],
            noon:      ["Mediodía. Hora pico del caos.", "Aquí es donde el café ya no ayuda.", "Mitad del día. Mitad de las excusas."],
            afternoon: ["El bajón de las 4pm viene en camino.", "El tiempo vuela. Tu lista de pendientes no.", "¿Productivo? Eso está por verse."],
            evening:   ["Hora dorada. Ideas finalmente decentes.", "La cena no se va a hacer sola.", "Casi terminas. El día, al menos."],
            night:     ["¿No deberías estar durmiendo? La ciencia pregunta.", "Ideas de madrugada: arriesgadas. Inevitables.", "Todo está bien. Completamente bien."],
        },
        pt: {
            dawn:      ["Não consegue dormir? Sua caixa de entrada também não.", "Nem os pássaros acordaram ainda. Tá bem?", "Quem madruga toma café primeiro."],
            morning:   ["Café antes das ambições. Sempre.", "Previsão de hoje: confusão com chance de produtividade.", "Carregando... 40%. Por enquanto basta.", "Bom dia. Relativamente falando."],
            lateAM:    ["O almoço está chegando. Segura.", "Tecnicamente ainda é manhã.", "A manhã ainda não desistiu. Você também não."],
            noon:      ["Meio-dia. Horário de pico do caos.", "É aqui que o café já não funciona mais.", "Metade do dia. Metade das desculpas."],
            afternoon: ["A queda das 16h vem aí. Avisado.", "O tempo voa. Sua lista de tarefas não.", "Produtivo? A ver."],
            evening:   ["Hora dourada. Suas ideias finalmente prestam.", "O jantar não vai se fazer sozinho.", "Quase terminou. O dia, pelo menos."],
            night:     ["Não deveria estar dormindo? Pergunta a ciência.", "Ideias de madrugada: arriscadas. Inevitáveis.", "Tá tudo bem. Completamente bem."],
        }
    };

    function getTimeSlot(hour) {
        if (hour >= 5 && hour < 12)  return 'morning';
        if (hour >= 12 && hour < 17) return 'afternoon';
        if (hour >= 17 && hour < 21) return 'evening';
        return 'night'; // Covers 21:00 - 04:59
    }

    // Pick a sub greeting (rotates every 10 minutes)
    function getSubGreeting(slot) {
        const subs = greetingSubs[lang][slot];
        const minuteBucket = Math.floor(Date.now() / (10 * 60 * 1000));
        return subs[minuteBucket % subs.length];
    }

    function updateHeader() {
        const now = new Date();
        const hour = now.getHours();
        const locale = lang === 'en' ? 'en-US' : lang === 'es' ? 'es-ES' : 'pt-BR';

        const slot = getTimeSlot(hour);
        const dayName = now.toLocaleDateString(locale, { weekday: 'long' });
        const greetEl = document.getElementById('greeting');
        if (!greetEl) return;
        greetEl.textContent = getMainGreeting(lang, slot, dayName);
    }

    function cycleLang() {
        const idx = LANGS.indexOf(lang);
        const nextLang = LANGS[(idx + 1) % LANGS.length];
        applyLang(nextLang);

        // Animate greeting
        const greetEl = document.getElementById('greeting');
        if (greetEl) {
            greetEl.classList.remove('lang-switch');
            void greetEl.offsetWidth; // reflow
            greetEl.classList.add('lang-switch');
        }
    }

    // Clicking the greeting cycles language
    document.getElementById('greeting').addEventListener('click', () => cycleLang());

    /* ============================================================
       LINKIFY
    ============================================================ */
    function spotifyEmbed(text) {
        const t = text.trim();
        // Extract src URL from any iframe embed containing a Spotify embed URL
        const match = t.match(/src=["'](https:\/\/open\.spotify\.com\/embed\/[^"'\s]+)["']/i);
        if (match) return match[1];
        // Also accept a bare Spotify embed URL
        if (/^https:\/\/open\.spotify\.com\/embed\//i.test(t)) return t;
        return null;
    }

    function renderNoteContent(content, text) {
        const spotifySrc = spotifyEmbed(text);
        if (spotifySrc) {
            content.innerHTML = `<iframe src="${spotifySrc}" width="100%" height="152" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" style="border-radius:10px;display:block;"></iframe>`;
            content.closest('.note').classList.add('spotify-note');
        } else {
            content.innerHTML = linkify(text);
            content.closest('.note').classList.remove('spotify-note');
        }
    }

    function linkify(text) {
        const urlRegex = /((https?:\/\/|www\.)[^\s]+|[a-zA-Z0-9-]+\.[a-zA-Z]{2,}[^\s]*)/gi;
        return text.replace(urlRegex, (url) => {
            let href = url.startsWith('http') ? url : 'https://' + url;
            return `<a href="${href}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${url}</a>`;
        });
    }


    /* ============================================================
       DOCK
    ============================================================ */
    let dockOffset = 0; // days offset from current start

    function initDock() {
        const dayNames = {
            en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            es: ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'],
            pt: ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'],
        };
        const now = new Date();
        const isMobile = window.innerWidth <= 430;
        const numDays = isMobile ? 5 : 7;
        const weekStart = new Date(now);
        weekStart.setHours(0, 0, 0, 0);
        const dayOfWeek = now.getDay(); // 0=Sun, 1=Mon, ...6=Sat
        const daysToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
        weekStart.setDate(now.getDate() + daysToMonday + dockOffset);

        const dock = document.getElementById('dock');
        dock.innerHTML = '';

        for (let i = 0; i < numDays; i++) {
            const date = new Date(weekStart);
            date.setDate(weekStart.getDate() + i);
            const dateStr = toISO(date);
            const isToday = date.toDateString() === now.toDateString();
            const isPast = date < new Date(now.getFullYear(), now.getMonth(), now.getDate());

            // 1. Create Day Card
            const card = document.createElement('div');
            const isWeekend = date.getDay() === 0 || date.getDay() === 6;
            card.className = `day-card${isToday ? ' active' : ''}${isPast ? ' past' : ''}${isWeekend ? ' weekend' : ''}`;
            card.dataset.date = dateStr;
            card.innerHTML = `
                <span class="day-name">${(dayNames[lang] || dayNames['en'])[date.getDay()]}</span>
                <div class="day-main-row">
                    <span class="day-number">${date.getDate()}</span>
                </div>
            `;
            dock.appendChild(card);
            if (isToday) {
                requestAnimationFrame(() => {
                    const light = document.getElementById('active-day-light');
                    if (!light) return;
                    const cr = card.getBoundingClientRect();
                    light.style.left = (cr.left + cr.width / 2) + 'px';
                    light.style.top  = (cr.top  + cr.height / 2) + 'px';
                });
            }

            // 2. Separators (dock only)
            if (i < numDays - 1) {
                const nextDate = new Date(weekStart);
                nextDate.setDate(weekStart.getDate() + i + 1);
                const nextIsToday = nextDate.toDateString() === now.toDateString();
                if (!isToday && !nextIsToday) {
                    const sep = document.createElement('div');
                    sep.className = 'day-separator';
                    dock.appendChild(sep);
                }
            }
        }
    }

    function initWeatherRow() {
        const weatherRow = document.getElementById('weather');
        weatherRow.innerHTML = '';
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        for (let i = 0; i < 7; i++) {
            const date = new Date(now);
            date.setDate(now.getDate() + i);
            const dateStr = toISO(date);
            const wSlot = document.createElement('div');

            wSlot.id = 'dw-' + dateStr;

            weatherRow.appendChild(wSlot);
            if (i < 6) {

                wSep.className = 'weather-separator';

    }

    /* ============================================================
       TIME RULER
    ============================================================ */
    const RULER_START = 0;   // midnight
    const RULER_END   = 24;  // midnight
    const RULER_SPAN  = RULER_END - RULER_START;

    window.drawSunriseSunset = function() {
        return; // Hiding for now
        const ruler = document.getElementById('time-ruler');
        ruler.querySelectorAll('.sun-label').forEach(el => el.remove());
        const sun = window.todaySunTimes;
        if (!sun) return;

        const toH = iso => { const d = new Date(iso); return d.getHours() + d.getMinutes() / 60; };
        const toPct = h => Math.max(0, Math.min(100, (h - RULER_START) / RULER_SPAN * 100));
        const fmt = iso => {
            const d = new Date(iso);
            const h = d.getHours(), mm = String(d.getMinutes()).padStart(2,'0');
            return `${h % 12 || 12}:${mm}${h >= 12 ? 'pm' : 'am'}`;
        };

        const riseH = toH(sun.rise), setH = toH(sun.set);
        const risePct = toPct(riseH), setPct = toPct(setH);


        const riseIcon = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
            <circle cx="6" cy="5" r="2.2"/>
            <line x1="6" y1="0.5" x2="6" y2="1.8"/>
            <line x1="6" y1="8.2" x2="6" y2="9.5"/>
            <line x1="9.5" y1="5" x2="10.8" y2="5"/>
            <line x1="1.2" y1="5" x2="2.5" y2="5"/>
            <line x1="8.5" y1="2.5" x2="9.4" y2="1.6"/>
            <line x1="2.6" y1="8.4" x2="3.5" y2="7.5"/>
            <line x1="8.5" y1="7.5" x2="9.4" y2="8.4"/>
            <line x1="2.6" y1="1.6" x2="3.5" y2="2.5"/>
            <line x1="0" y1="11" x2="12" y2="11"/>
            <polyline points="4,9 6,7 8,9"/>
        </svg>`;
        const setIcon = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
            <circle cx="6" cy="4" r="2.2"/>
            <line x1="6" y1="0.5" x2="6" y2="1.8"/>
            <line x1="9.5" y1="4" x2="10.8" y2="4"/>
            <line x1="1.2" y1="4" x2="2.5" y2="4"/>
            <line x1="8.5" y1="1.5" x2="9.4" y2="0.6"/>
            <line x1="2.6" y1="0.6" x2="3.5" y2="1.5"/>
            <line x1="0" y1="8" x2="12" y2="8"/>
            <polyline points="4,9.5 6,11.5 8,9.5"/>
        </svg>`;

        const makeLabel = (iso, pct, icon) => {
            const l = document.createElement('div');
            l.className = 'sun-label'; l.style.left = pct + '%';
            l.textContent = fmt(iso);
            const tip = document.createElement('div');
            tip.className = 'sun-tooltip';
            tip.innerHTML = `<span class="sun-tooltip-icon">${icon}</span><div class="sun-tooltip-bubble">${fmt(iso)}</div>`;
            l.appendChild(tip);
            ruler.appendChild(l);
        };

        if (riseH >= RULER_START && riseH <= RULER_END) makeLabel(sun.rise, risePct, riseIcon);
        if (setH  >= RULER_START && setH  <= RULER_END) makeLabel(sun.set,  setPct,  setIcon);
    };

    function buildTimeRuler() {
        const ruler = document.getElementById('time-ruler');
        ruler.querySelectorAll('.time-ruler-tick').forEach(el => el.remove());

        const now = new Date();
        const nowH = now.getHours() + now.getMinutes() / 60;

        for (let h = RULER_START; h <= RULER_END; h++) {
            const isPastH = h <= nowH;

            // Hour tick
            const pct = (h - RULER_START) / RULER_SPAN * 100;
            const tick = document.createElement('div');
            tick.className = 'time-ruler-tick hour';
            tick.style.left = pct + '%';
            tick.style.background = isPastH ? '#c580fb' : 'var(--text-color)';
            tick.style.opacity = isPastH ? '0.55' : '0.25';
            ruler.appendChild(tick);

            if (h < RULER_END) {
                // Half-hour tick
                const halfPct = (h + 0.5 - RULER_START) / RULER_SPAN * 100;
                const isPastHalf = (h + 0.5) <= nowH;
                const half = document.createElement('div');
                half.className = 'time-ruler-tick half';
                half.style.left = halfPct + '%';
                half.style.background = isPastHalf ? '#c580fb' : 'var(--text-color)';
                half.style.opacity = isPastHalf ? '0.35' : '0.15';
                ruler.appendChild(half);

                // Quarter-hour ticks
                [0.25, 0.75].forEach(q => {
                    const qPct = (h + q - RULER_START) / RULER_SPAN * 100;
                    const isPastQ = (h + q) <= nowH;
                    const qt = document.createElement('div');
                    qt.className = 'time-ruler-tick quarter';
                    qt.style.left = qPct + '%';
                    qt.style.background = isPastQ ? '#c580fb' : 'var(--text-color)';
                    qt.style.opacity = isPastQ ? '0.2' : '0.08';
                    ruler.appendChild(qt);
                });
            }
        }
    }

    let timeFormatIdx = parseInt(localStorage.getItem('aura_time_format') || '0') % 2;

    function formatTime(h, m) {
        const mm = m.toString().padStart(2, '0');
        if (timeFormatIdx === 0) {
            const ampm = h >= 12 ? 'pm' : 'am';
            const h12 = h % 12 || 12;
            return h12 + ':' + mm + ampm;
        }
        return h.toString().padStart(2, '0') + ':' + mm;
    }


    function updateTimeline() {

        const headerTime = document.getElementById('header-time');
