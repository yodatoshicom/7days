<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is Year Progress Dashboard?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Year Progress Dashboard is a free, minimal weekly planner that runs entirely in the browser. It shows your current week as a calendar, fetches a 7-day weather forecast, and lets you create sticky notes. No account or install is required."
      }
    },
    {
      "@type": "Question",
      "name": "Is Year Progress Dashboard free?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Year Progress Dashboard is completely free. There is no account, no subscription, and no paid tier."
      }
    },
    {
      "@type": "Question",
      "name": "Does Year Progress Dashboard store my data?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "All data — notes, settings, and weather cache — is stored locally in your browser's localStorage. Nothing is sent to a server."
      }
    },
    {
      "@type": "Question",
      "name": "How does Year Progress Dashboard get my location for weather?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Year Progress Dashboard detects your city automatically using IP geolocation (ipapi.co with ipwho.is as fallback). You can override the location manually by searching for a city in settings."
      }
    },
    {
      "@type": "Question",
      "name": "What languages does Year Progress Dashboard support?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Year Progress Dashboard supports English, Spanish, and Portuguese. The language can be changed in the settings panel."
      }
    },
    {
      "@type": "Question",
      "name": "Does Year Progress Dashboard work offline?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Year Progress Dashboard works offline for notes and the calendar. Weather data is cached and shown until a fresh fetch is possible. An internet connection is needed to load the page initially and refresh weather."
      }
    }
  ]
}
</script>

<script>
// Apply persisted font/size settings before first paint to prevent flash
(function() {
    var fonts = { 'caveat':"'Caveat', cursive", 'sf-mono':"'SF Mono', 'SFMono-Regular', ui-monospace, monospace", 'lora':"'Lora', serif", 'dm-mono':"'DM Mono', monospace", 'jetbrains-mono':"'JetBrains Mono', monospace", 'fraunces':"'Fraunces', serif" };
    var sizes   = { 'S':'21px', 'M':'22px', 'L':'28px' };
    var sizes1x = { 'S':'15px', 'M':'16px', 'L':'20px' };
    var r = document.documentElement;
    r.classList.add('theme-valley');
    
    var f = localStorage.getItem('aura_note_font');
    if (f && fonts[f]) r.style.setProperty('--note-font', fonts[f]);
    var s = localStorage.getItem('aura_note_size');
    if (s) r.style.setProperty('--note-size', (window.devicePixelRatio > 1 ? sizes : sizes1x)[s] || sizes[s]);
})();
</script>
<style>

:root {
    --sf-easing: cubic-bezier(0.32, 0.72, 0, 1);
    --spring-easing: cubic-bezier(0.34, 1.56, 0.64, 1);
    --bg-color: #1a1040;
    --text-color: #f0eeff;
    --accent-color: #007AFF;
    --card-bg: rgba(255, 255, 255, 0.08);

    --note-font: 'Caveat', cursive;
    --note-size: 28px;
}

/* ── Valley theme ── */
html.theme-valley {
    background-color: #1a1040;
    background-image: url('wallpaper.webp');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}
html.theme-valley body {
    background-image: none !important;
    background-color: transparent;
}
/* Hide entire dock by default in valley; show-old-dock brings back the big legacy dock */
html.theme-valley .dock-wrapper { display: none; }
html.theme-valley.show-old-dock .dock-wrapper {
    display: flex;
    position: relative;
    top: auto;
    left: auto;
    transform: none;
    margin-top: auto;
    margin-bottom: 60px;
}
html.theme-valley.show-old-dock .day-card,
html.theme-valley.show-old-dock .day-card:first-child,
html.theme-valley.show-old-dock .day-card:last-child,
html.theme-valley.show-old-dock .day-card:first-child:hover,
html.theme-valley.show-old-dock .day-card:last-child:hover,
html.theme-valley.show-old-dock .day-card.active,
html.theme-valley.show-old-dock .day-card.active:first-child,
html.theme-valley.show-old-dock .day-card.active:last-child {
    width: 64px;
    height: 76px;
    border-radius: 30px;
}
html.theme-valley.show-old-dock .day-card .day-name { font-size: 10px; margin-bottom: 2px; }
html.theme-valley.show-old-dock .day-card .day-number { font-size: 28px; font-weight: 700; }
html.theme-valley.show-old-dock .dock-nav { display: flex; }
html.theme-valley.show-old-dock .weather-row { display: flex; }
html.theme-valley.show-old-dock .header-container {
    display: block;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: 10px;
}

html.theme-valley .year-bar-fill {
    background: linear-gradient(to right, rgba(180, 120, 255, 0.6), rgba(220, 160, 255, 0.9));
    border-radius: 0;
    box-shadow: 0 0 12px rgba(180, 120, 255, 0.4);
}
html.theme-valley #year-bar-marker {
    bottom: 2px;
}
html.theme-valley .year-bar-label {
    color: rgba(220, 180, 255, 0.9);
    background: rgba(20, 10, 40, 0.55);
    backdrop-filter: blur(40px) saturate(130%) contrast(110%);
    -webkit-backdrop-filter: blur(40px) saturate(130%) contrast(110%);
    border: none;
    outline: 0.5px solid rgba(255, 255, 255, 0.1);
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 4px 16px rgba(0, 0, 0, 0.3);
}
html.theme-valley .season-label {
    color: rgba(200, 150, 255, 0.6);
}
html.theme-valley .weather-row { color: rgba(240, 238, 255, 0.8); }
html.theme-valley .weather-day { color: rgba(240, 238, 255, 0.8); }
html.theme-valley .weather-separator {
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15) 50%, transparent);
}
/* ---- active day backlight (behind glass pill) ---- */
#active-day-light {
    display: none;
    position: fixed;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 999;
}
html.theme-valley #active-day-light {
    display: block;
    background: radial-gradient(circle, rgba(190, 140, 255, 0.2) 0%, rgba(140, 80, 255, 0.08) 50%, transparent 75%);
}


/* Note color bar — shown below note in editing mode */
.note-color-dot[data-color="default"] { background: rgba(0,0,0,0.08); }
.note-color-dot[data-color="yellow"] { background: #fbbf24; }
.note-color-dot[data-color="blue"] { background: #60a5fa; }
.note-color-dot[data-color="mint"] { background: #34d399; }
.note-color-dot[data-color="pink"] { background: #f472b6; }

.bar-color-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s var(--spring-easing), border-color 0.15s;
    flex-shrink: 0;
}
.bar-color-dot:hover { transform: scale(1.25); }
.bar-color-dot.active { border-color: var(--text-color); }
.bar-color-dot[data-color="default"] { background: rgba(128,128,128,0.25); }
.bar-color-dot[data-color="yellow"] { background: #fbbf24; }
.bar-color-dot[data-color="blue"] { background: #60a5fa; }
.bar-color-dot[data-color="mint"] { background: #34d399; }
.bar-color-dot[data-color="pink"] { background: #f472b6; }



.greeting {
    font-size: 68px;
    font-weight: 700;
    letter-spacing: -0.05em;
    background: linear-gradient(to bottom, var(--text-color) 70%, transparent);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 0.2s ease, transform 0.3s var(--spring-easing);
    display: inline-block;
    position: relative;
}

.greeting:hover {
    opacity: 0.8;
    transform: scale(1.02);
}

.greeting:active {
    transform: scale(0.97);
}

/* Lang flash animation on greeting */
@keyframes greetingPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.03); }
    100% { transform: scale(1); }
}

.greeting.lang-switch {
    animation: greetingPulse 0.4s var(--spring-easing);
}

.header-container {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: 10px;
    text-align: center;
    white-space: nowrap;
    z-index: 500;
    user-select: none;
    -webkit-user-select: none;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
}

/* Background geometry modes */

html {
    background-color: #e3dde6;
    background-image: url('bg2.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    overflow: hidden;
    height: 100%;
}

/* Background geometry modes */
body.bg-geo-dots,
body.bg-geo-web  { background-image: radial-gradient(circle, rgba(0,0,0,0.13) 1px, transparent 1px); background-size: 22px 22px; }
body.bg-geo-off,
body.bg-geo-stellar,
body.bg-geo-tribon,
body.bg-geo-mesh { background-image: none; }

body {
    background: none;
    color: var(--text-color);
    height: 100vh;
    height: 100dvh;
    max-height: 100dvh;
    overflow: hidden;
    position: fixed;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    opacity: 0;
    transition: opacity 0.35s ease;
}

#dot-connections {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
}

#mesh-iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    border: none;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease;
}
body.bg-geo-mesh #mesh-iframe {
    opacity: 0.54;
}


body.ready {
    opacity: 1;
}




/* Sunrise / sunset markers on time ruler */
.sun-label {
    position: absolute;
    bottom: 17px;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    color: #F59E0B;
    opacity: 0.65;
    white-space: nowrap;
    transform: translateX(-50%);
    pointer-events: auto;
    letter-spacing: 0.02em;
    cursor: default;
}
.sun-label:hover { opacity: 1; }
.sun-tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%) translateY(3px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
    white-space: nowrap;
}
.sun-tooltip-icon { opacity: 0.5; display: flex; color: var(--text-color); }
.sun-tooltip-bubble {
    background: rgba(245,158,11,0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 0.5px solid rgba(245,158,11,0.25);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #F59E0B;
}
.sun-label:hover .sun-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* Time ruler — absolute, sits on top edge of week bar */
.time-ruler {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: calc((100% - 90px) * 0.8);
    height: 44px;
    margin-bottom: -3px;
    user-select: none;
    -webkit-user-select: none;
}

.time-ruler-track {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, var(--text-color) 50%, transparent 100%);
    opacity: 0.15;
}

.time-ruler-past {
    position: relative;
    height: 100%;
    background: linear-gradient(to right, rgba(167,139,202,0.08), rgba(167,139,202,0.5));
    border-radius: 1px;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: visible;
}
.time-ruler-past::before {
    content: '';
    position: absolute;
    top: 0;
    left: 20%;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.5));
    border-radius: 1px;
    pointer-events: none;
}
.time-ruler-past::after {
    content: '';
    position: absolute;
    right: -10px;
    top: -5px;
    width: 20px;
    height: 11px;
    background: rgba(167,139,202,0.55);
    filter: blur(6px);
    border-radius: 50%;
    pointer-events: none;
}

.time-ruler-tick {
    position: absolute;
    bottom: 1px;
    width: 1px;
    transform: translateX(-50%);
    border-radius: 1px;
}

.time-ruler-tick.hour    { height: 14px; }
.time-ruler-tick.half    { height: 7px; }
.time-ruler-tick.quarter { height: 3px; }

.time-ruler-now {
    position: absolute;
    top: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    transform: translateX(-50%);
    filter: drop-shadow(0 0 5px rgba(167,139,202,0.4));
}

.time-ruler-now-line {
    flex: 1;
    width: 1.5px;
    position: relative;
    background: linear-gradient(to bottom, rgba(167,139,202,0.0), rgba(167,139,202,0.95));
    border-radius: 1px;
    margin: 2px 0 2px;
}

.time-ruler-now-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #c580fb;
    border: 1.5px solid rgba(255,255,255,0.65);
    box-shadow: 0 0 0 3px rgba(167,139,202,0.25), 0 0 14px rgba(167,139,202,0.7);
    animation: yearDotPulse 3s ease-in-out infinite;
    flex-shrink: 0;
}

.time-ruler-hover-label {
    position: absolute;
    top: 0;
    pointer-events: none;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 3px 10px;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 20;
}
.time-ruler-hover-label.visible { opacity: 1; }

.time-ruler-now-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    margin-top: 10px;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    color: #7B52B0;
    white-space: nowrap;
    flex-shrink: 0;
    background: rgba(167,139,202,0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(167,139,202,0.3);
    border-radius: 20px;
    padding: 3px 10px;
    cursor: pointer;
    user-select: none;
    pointer-events: auto;
}


/* THE PRO STUDIO DOCK */
.dock-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    margin-top: auto;
    margin-bottom: 250px;
}

.dock-row {
    display: flex;
    align-items: center;
    gap: 5px;
    position: relative;
}

.dock-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: none;
    color: var(--text-color);
    cursor: pointer;
    opacity: 0.25;
    transition: opacity 0.25s ease, transform 0.25s var(--sf-easing);
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    -webkit-tap-highlight-color: transparent;
}

.dock-nav:hover {
    opacity: 0.6;
}

.dock-nav:active {
    transform: scale(0.75);
    opacity: 0.4;
}

.dock-container {
    position: relative;
    padding: 8px;
    background: rgba(20, 10, 40, 0.55);
    backdrop-filter: blur(40px) saturate(130%) contrast(110%);
    -webkit-backdrop-filter: blur(40px) saturate(130%) contrast(110%);
    border-radius: 40px;
    border: none;

    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -1px 0 rgba(0, 0, 0, 0.08),
        0 12px 40px rgba(0, 0, 0, 0.25),
        0 2px 8px rgba(0, 0, 0, 0.12);

    display: flex;
    gap: 4px;
    align-items: center;
    user-select: none;
    z-index: 1000;
}


.day-separator {
    display: none;
}

.day-card {
    width: 64px;
    height: 76px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: transparent;
    border-radius: 30px;
    color: rgba(255, 255, 255, 0.6);
    transition:
        transform 0.5s var(--sf-easing),
        background 0.3s var(--sf-easing),
        box-shadow 0.3s var(--sf-easing);
    cursor: default;
    position: relative;
}


.day-card:hover {
    background: rgba(255, 255, 255, 0.05);
    transform: none;
}

.day-card:active {
    transform: scale(0.92) translateY(0);
    transition: transform 0.1s var(--sf-easing);
}

.day-card.active {
    background: rgba(255, 255, 255, 0.06);
    border: none;
    filter: none;
    z-index: 2;
    box-shadow: none;
}

.day-card.active::after {
    content: none;
}

.day-name {
    color: rgba(255, 255, 255, 0.35);
    font-size: 7px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 1px;
    letter-spacing: 0.06em;
}

.day-card.active .day-name { color: rgba(220, 180, 255, 0.7); }

.day-card.weekend .day-number {
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    -webkit-text-fill-color: rgba(210, 185, 255, 0.75);
    color: rgba(210, 185, 255, 0.75);
}

.day-card.weekend.active .day-number {
    background: none;
    -webkit-background-clip: unset;
    -webkit-text-fill-color: unset;
    background-clip: unset;
}

.day-number {
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    -webkit-text-fill-color: rgba(255, 255, 255, 0.7);
    color: rgba(255, 255, 255, 0.7);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    transition: font-weight 0.4s var(--sf-easing);
}

.day-card.active .day-number {
    font-weight: 700;
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    -webkit-text-fill-color: #fff;
    color: #fff;
}

.day-card.active:hover { background: rgba(255, 255, 255, 0.08); }

/* Inline weather inside day cards */
.day-main-row {
    display: flex;
    align-items: center;
    gap: 4px;
}

.weather-separator {
    width: 1px;
    height: 28px;
    background: linear-gradient(to bottom, transparent, rgba(120,120,128,0.2) 50%, transparent);
    flex-shrink: 0;
}

/* WEATHER ROW — below the dock */
.weather-row {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 54px;
    margin-top: 10px;
    opacity: 0.7;
}

.weather-day {
    width: 58px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: 0.3s;
    pointer-events: auto;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-color);
}

.weather-day:hover { opacity: 1; transform: translateY(-1px); }

.weather-day .weather-icon { font-size: 15px; margin-bottom: 0; margin-right: 4px; }
.weather-day .weather-temp { font-size: 11px; font-weight: 700; opacity: 0.8; }

.weather-separator {
    width: 1px;
    height: 10px;
    background: linear-gradient(to bottom, transparent, rgba(120,120,128,0.3) 50%, transparent);
    flex-shrink: 0;
}

.weather-day.today {
    filter: drop-shadow(0 0 6px rgba(0, 122, 255, 0.5));
}

.weather-icon { font-size: 14px; margin-bottom: 1px; }
.weather-temp { font-size: 10px; font-weight: 700; }


.weather-tooltip {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Caveat', cursive;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.01em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 9998;
    color: var(--text-color);
    text-align: center;
    white-space: nowrap;
}

.weather-tooltip.show {
    opacity: 0.4;
}


.city-tooltip {
    display: none;
    position: fixed;
    bottom: max(16px, calc(16px + env(safe-area-inset-bottom)));
    right: 30px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.2;
    z-index: 9999;
    pointer-events: auto;
    cursor: pointer;
    transition: 0.3s;
}

.city-tooltip:hover {
    opacity: 0.6;
    transform: scale(1.05);
}



.note {
    position: absolute;
    width: fit-content;
    min-width: 0;
    max-width: 600px;
    min-height: 40px;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.015);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: none;
    border-top: 0.5px solid rgba(255, 255, 255, 0.15);
    border-radius: 30px;
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -1px 0 rgba(0, 0, 0, 0.08),
        0 4px 16px rgba(0, 0, 0, 0.12);
    color: #f0eeff;
    white-space: normal;
    z-index: 1100;
    cursor: grab;
    transition: transform 0.4s var(--spring-easing), box-shadow 0.3s var(--sf-easing), opacity 0.3s ease;
    overflow: visible;
    resize: none;
    user-select: none;
    -webkit-user-select: none;
}
.note.selected {
    outline: 2px solid rgba(197, 128, 251, 0.7);
    outline-offset: 0px;
}
.note .note-content {
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: break-word;
}
.note textarea { color: inherit; }

.note[data-note-color="yellow"] { color: #fef3c7; }
.note[data-note-color="blue"] { color: #dbeafe; }
.note[data-note-color="mint"] { color: #d1fae5; }
.note[data-note-color="pink"] { color: #fce7f3; }


.note:active:not(:has(.note-resize-handle:active)) {
    transform: none;
}

.note.dragging {
    cursor: grabbing;
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.15);
    transition: transform 0.4s var(--spring-easing), padding 0.3s var(--sf-easing),
                border-radius 0.3s var(--sf-easing), opacity 0.25s ease;
}

.note.dragging.near-dock {
    padding: 6px 14px;
    border-radius: 30px;
    opacity: 0.85;
    pointer-events: none;
    transform-origin: center center;
    transition: transform 0.35s var(--spring-easing), padding 0.3s var(--sf-easing),
                border-radius 0.3s var(--sf-easing), opacity 0.25s ease;
}

.note.dragging.near-dock .note-content {
    transition: font-size 0.3s var(--sf-easing), max-height 0.3s var(--sf-easing);
    font-size: 13px;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
    max-height: 1.1em;
}

.note.dragging.near-dock .note-resize-handle,
.note.dragging.near-dock .note-close,
.note.dragging.near-dock .note-color-bar {
    opacity: 0;
    pointer-events: none;
}

/* Note close button — top right corner */
.note-close {
    position: absolute;
    top: -2px;
    right: -6px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #FF5F57;
    border: 0.5px solid rgba(0, 0, 0, 0.12);
    box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transform: scale(0);
    transition: transform 0.3s var(--spring-easing), opacity 0.2s ease, filter 0.15s ease;
}

.note:hover .note-close,
.note.editing .note-close {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
}

.note-close:active {
    filter: brightness(0.8);
}

.note-close svg {
    width: 8px;
    height: 8px;
    stroke: rgba(255, 255, 255, 0.9);
    stroke-width: 1.6;
    fill: none;
    transition: stroke 0.1s ease;
}

.note-close:hover svg {
    stroke: rgba(77, 0, 0, 0.9);
}


.note-content {
    font-family: var(--note-font);
    font-weight: var(--note-weight, 400);
    font-size: var(--note-size);
    line-height: 1.1;
    outline: none;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: normal;
    user-select: none;
    -webkit-user-select: none;
}

/* Blurred note content state */
.note.blurred .note-content,
.note.blurred .note-image {
    filter: blur(4px);
    opacity: 0.6;
    transition: filter 0.3s ease, opacity 0.3s ease;
    user-select: none;
    pointer-events: none;
}

.note.blurred:hover .note-content,
.note.blurred:hover .note-image {
    filter: blur(1.5px);
    opacity: 0.8;
}

/* Selection rectangle overlay */
.selection-rect {
    position: fixed;
    border: 1px solid rgba(0, 122, 255, 0.5);
    background: rgba(0, 122, 255, 0.05);
    pointer-events: none;
    z-index: 999;
    border-radius: 4px;
    transition: none;
    display: none;
}

/* ── Page Navigation Dots ── */
.page-dots {
    position: fixed;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 1200;
    padding: 6px 3px;
}
.page-dot {
    width: 6px;
    height: 14px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
    border: 0.5px solid rgba(255, 255, 255, 0.1);
}
.page-dot:hover {
    background: rgba(255, 255, 255, 0.45);
    transform: scale(1.1);
}
.page-dot.active {
    width: 8px;
    height: 20px;
    border-radius: 5px;
    background: rgba(255, 255, 255, 0.65);
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
    border: 0.5px solid rgba(255, 255, 255, 0.25);
}
/* Circle variant */
.page-dots.circles .page-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}
.page-dots.circles .page-dot.active {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}
/* Shape toggle button */
.page-shape-toggle {
    position: fixed;
    bottom: 12px;
    right: 12px;
    width: 22px;
    height: 22px;
    border: none;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 6px;
    cursor: pointer;
    z-index: 1200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.25s ease, opacity 0.25s ease;
    opacity: 0.4;
}
.page-shape-toggle:hover {
    background: rgba(255, 255, 255, 0.25);
    opacity: 0.7;
}
.page-shape-toggle svg {
    width: 12px;
    height: 12px;
    fill: rgba(255, 255, 255, 0.8);
}

/* Disable text selection during multi-select mode */
body.is-selecting {
    user-select: none;
    -webkit-user-select: none;
}

/* Highlight notes that would be selected during rectangle draw */
.note.potential-select {
    outline: 2px solid rgba(197, 128, 251, 0.5);
    outline-offset: 0px;
}

body.note-editing-mode .note.editing {
    user-select: text;
    -webkit-user-select: text;
}

body.note-editing-mode .note.editing .note-content,
body.note-editing-mode .note.editing textarea {
    user-select: text;
    -webkit-user-select: text;
}

body.note-font-sf-mono .note-content {
    font-size: calc(var(--note-size) * 0.72);
    outline: none;
    color: var(--text-color);
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: normal;
}

.note-edit-ta {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--note-font);
    font-weight: var(--note-weight, 400);
    font-size: var(--note-size);
    line-height: 1.1;
    color: inherit;
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    overflow: hidden;
    field-sizing: content;
}
body.note-font-sf-mono .note-edit-ta {
    font-size: calc(var(--note-size) * 0.72);
}


.note-content a {
    color: var(--accent-color);
    text-decoration: none;
    border-bottom: 2px solid rgba(0, 122, 255, 0.2);
    font-family: inherit !important;
}

/* Image notes */
.note.image-note {
    padding: 6px !important;
    overflow: visible;
    /* backdrop-filter conflicts with video compositor layers causing blank frames
       after tab switches — image/video covers the full note so this is safe to remove */
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
}

.note.image-note .note-content,
.note.image-note .note-color-bar {
    display: none;
}



.note-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 30px;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-user-drag: none;
}

video.note-image {
    pointer-events: none;
}

.video-play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
}

.note.image-note:hover .video-play-btn {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

.video-play-btn:hover {
    background: rgba(0, 0, 0, 0.75);
}

.video-play-btn:active {
    transform: translate(-50%, -50%) scale(0.9);
}

/* ── Video upload progress indicator ── */
.video-upload-indicator {
    position: fixed;
    z-index: 9000;
    width: 180px;
    padding: 14px 16px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 0.5px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 8px 30px rgba(0, 0, 0, 0.25);
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
    animation: vui-in 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes vui-in {
    from { opacity: 0; transform: scale(0.85) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
}
.video-upload-indicator.done {
    animation: vui-out 0.22s ease forwards;
}
@keyframes vui-out {
    to { opacity: 0; transform: scale(0.88) translateY(4px); }
}
.vui-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 6px;
}
.vui-label svg {
    opacity: 0.6;
    flex-shrink: 0;
}
.vui-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
}

    position: absolute;

    content: '';

    bottom: 4px;

    height: 100%;

    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-size: 8px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #c580fb;
    opacity: 0.6;
    white-space: nowrap;
    transition: opacity 0.4s ease;
}
.season-bracket.past .season-label {
    opacity: 1;
}

/* Bar mode labels & dividers — shared across all modes */
.bar-mode-label {
    position: absolute;
    bottom: 100%;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-size: 8px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(197, 128, 251, 0.3);
    white-space: nowrap;
    pointer-events: auto;
    cursor: pointer;
    margin-bottom: 4px;
    transition: opacity 0.4s ease;
}
.bar-mode-label.past { color: rgba(197, 128, 251, 0.6); }
.bar-mode-label.current { color: rgba(197, 128, 251, 0.85); }

.bar-mode-divider {
    position: absolute;
    bottom: 100%;
    width: 2px;
    height: 6px;
    background: rgba(0, 0, 0, 0.2);
    pointer-events: none;
    z-index: 1;
}
.bar-mode-divider.past {
    background: #c580fb;
    opacity: 0.8;
}

html.theme-valley .bar-mode-divider {
    background: rgba(0, 0, 0, 0.3);
}
html.theme-valley .bar-mode-divider.past {
    background: #c580fb;
    opacity: 0.8;
}
html.theme-valley .bar-mode-label {
    color: rgba(255, 255, 255, 0.3);
}
html.theme-valley .bar-mode-label.past { color: rgba(255, 255, 255, 0.5); }
html.theme-valley .bar-mode-label.current { color: rgba(255, 255, 255, 0.7); }


.bar-sun-marker {
    color: #f5a623 !important;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0;
    margin-bottom: 16px;
    opacity: 0.8;
}


/* Bottom watermark — Alcove-style fading text */
.bottom-watermark {
    display: block;
    position: fixed;
    bottom: -0.18em;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(100px, 14vw, 220px);
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    letter-spacing: 0.01em;
    line-height: 0.85;
    color: var(--text-color);
    opacity: 0.1;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
    z-index: 0;
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.25) 55%, transparent 85%);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.25) 55%, transparent 85%);
    white-space: nowrap;
}

/* SEARCH OVERLAY — Minimal, White, Apple-style */
.search-overlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.3s var(--sf-easing), visibility 0.3s;
}

.search-overlay.show {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
}

.search-container {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 0 40px;
    transform: translateY(20px);
    transition: transform 0.4s var(--spring-easing);
}

.search-overlay.show .search-container {
    transform: translateY(0);
}

.engine-switch {
    display: flex;
    gap: 8px;
    padding: 4px;
    background: rgba(0, 0, 0, 0.04);
    border-radius: 12px;
}

.engine-btn {
    padding: 6px 14px;
    border: none;
    border-radius: 9px;
    background: transparent;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-color);
    opacity: 0.4;
    cursor: pointer;
    transition: all 0.2s ease;
}

.engine-btn.active {
    opacity: 1;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

.search-input-wrap {
    width: 100%;
    text-align: center;
}

.search-input {
    width: 100%;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #1d1d1f;
    background: transparent;
    border: none;
    outline: none;
    text-align: center;
    caret-color: #007AFF;
    padding: 0;
}

.search-input::placeholder {
    color: rgba(0, 0, 0, 0.1);
}

.search-hint {
    margin-top: 24px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.2;
    color: #000;
}

/* CLAUDE PAYWALL MODAL */
.claude-paywall {
    position: fixed;
    inset: 0;
    z-index: 999999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s;
}

.claude-paywall.show {
    opacity: 1;
    visibility: visible;
}

.claude-paywall-card {
    background: var(--bg-color);
    border-radius: 30px;
    padding: 36px 32px;
    max-width: 340px;
    width: 90%;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    transform: scale(0.92);
    transition: transform 0.35s var(--spring-easing);
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
}

.claude-paywall.show .claude-paywall-card {
    transform: scale(1);
}

.claude-paywall-emoji {
    font-size: 48px;
    line-height: 1;
}

.claude-paywall-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-color);
}

.claude-paywall-sub {
    font-size: 13px;
    line-height: 1.5;
    opacity: 0.5;
    color: var(--text-color);
}

.claude-paywall-price {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text-color);
    line-height: 1;
}

.claude-paywall-price span {
    font-size: 14px;
    font-weight: 600;
    opacity: 0.4;
}

.claude-paywall-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 14px;
    background: var(--accent-color);
    color: #fff;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s var(--spring-easing), opacity 0.2s;
}

.claude-paywall-btn:hover { transform: scale(1.02); }
.claude-paywall-btn:active { transform: scale(0.97); }

.claude-paywall-dismiss {
    background: none;
    border: none;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-color);
    opacity: 0.3;
    cursor: pointer;
    transition: opacity 0.2s;
    padding: 4px 8px;
}

.claude-paywall-dismiss:hover { opacity: 0.6; }

.claude-paywall-features {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
    text-align: left;
}

.claude-paywall-features span {
    font-size: 11px;
    opacity: 0.45;
    color: var(--text-color);
}






/* ── Scale down on smaller desktop/laptop screens (< 1260px) ── */
@media (max-width: 1260px) and (min-width: 431px) {
    .day-card        { width: 52px; height: 54px; border-radius: 28px; }
    .day-number      { font-size: 22px; }
    .day-name        { font-size: 9px; }
    .dock-container  { padding: 7px; gap: 3px; border-radius: 30px; }
    .dock-wrapper    { gap: 0; }
    .day-separator   { height: 28px; }
    .time-ruler      { height: 35px; margin-bottom: -10px; }

}

/* ── 1x (non-retina) screens: thicken hairline borders + scale down fonts ── */
@media (-webkit-max-device-pixel-ratio: 1), (max-resolution: 1dppx) {
    .dock-container,
    .note,
    .settings-panel,
    .note-arrow-bar,
    .time-ruler-now-label,
    .sun-tooltip-bubble {
        border-width: 1px;
    }
    body            { justify-content: flex-end; }
    .dock-wrapper   { padding-bottom: 32px; margin-top: 0; margin-bottom: 0; }
    :root           { --note-size: 20px; }
    .day-number     { font-size: 18px; }
    .day-name       { font-size: 8px; }
    .weather-tooltip { font-size: 24px; }
    .sun-label      { font-size: 7px; }
    .sun-tooltip-bubble { font-size: 9px; }
}

/* ── backdrop-filter unsupported fallback (Firefox, some Windows) ── */
@supports not (backdrop-filter: blur(1px)) {
    .dock-container  { background: rgba(240, 240, 240, 0.92); }
    .note            { background: rgba(245, 245, 245, 0.96); }
    .settings-panel  { background: rgba(22, 22, 24, 0.95); }
    .note-arrow-bar  { background: rgba(240, 240, 240, 0.96); }
    .note-edit-overlay { background: rgba(0,0,0,0.35); }
}

/* ── Dock to bottom + fluid width at ≤ 750px ── */
@media (max-width: 750px) and (min-width: 431px) {
    body           { justify-content: flex-end; }
    .dock-wrapper  { width: calc(100% - 32px); padding-bottom: max(20px, env(safe-area-inset-bottom)); margin-top: 0; margin-bottom: 0; }
    .dock-row      { width: 100%; }
    .dock-container{ flex: 1; }
    .day-card      { flex: 1; width: auto; min-width: 0; }
    .dock-nav      { display: none; }
    .time-ruler    { width: calc(100% - 32px); }
}

/* ── Mobile layout — iPhone 13 → current (≤ 430px logical px) ── */
@media (max-width: 430px) {
    #desktop-only { display: none !important; }

    /* ── Body: dock at bottom ── */
    body {
        justify-content: flex-end;
    }

    /* ── Dock wrapper: safe-area bottom breathing room ── */
    .dock-wrapper {
        width: calc(100% - 24px);
        gap: 10px;
        padding-bottom: max(20px, env(safe-area-inset-bottom));
        margin-top: 0;
        margin-bottom: 0;
    }
    .dock-row { width: 100%; }
    .dock-container {
        flex: 1;
        padding: 8px 6px;
        gap: 4px;
        border-radius: 28px;
    }
    .dock-nav { display: none; }

    /* ── Day cards: full-width flex, tall enough for touch ── */
    .day-card {
        flex: 1;
        width: auto;
        min-width: 0;
        height: 80px;
        border-radius: 22px;
    }
    .day-card:hover  { transform: none; }
    .day-card:active { transform: scale(0.96); }

    /* ── Typography ── */
    .day-name   { font-size: 10px; letter-spacing: 0; }
    .day-number { font-size: 24px; }
    .day-separator { display: none; }
    .day-main-row  { gap: 3px; }

    /* ── Hide desktop-only chrome ── */
    .city-tooltip    { display: none; }

    /* ── Year progress: above dock ── */
    .year-progress-label {
        top: auto;
        bottom: calc(100% + 10px);
    }
    .year-progress-label .yp-bar { width: calc(100vw - 48px); }

    /* ── Time ruler: collapse, hide all ruler elements ── */
    .time-ruler { display: none; }


    /* ── Settings button: respect Dynamic Island / notch ── */
    .settings-btn {
        top: max(16px, env(safe-area-inset-top, 16px));
        right: 16px;
    }

    /* ── Settings panel: open below settings button ── */
    .settings-panel {
        right: 8px;
        left: 8px;
        width: auto;
        top: max(66px, calc(env(safe-area-inset-top, 0px) + 60px));
        max-height: calc(100dvh - max(66px, calc(env(safe-area-inset-top, 0px) + 60px)) - 20px);
    }

    /* ── Notes ── */
    .weather-tooltip  { font-size: 20px; }
    .note             { max-width: calc(100vw - 32px); }
    .note-resize-handle { opacity: 1; }
    .note-arrow-bar   { max-width: calc(100vw - 32px); }
}

<script>
    /* ============================================================
       BACKGROUND GEOMETRY & MESH
    ============================================================ */
    const geoModes = ['off', 'dots', 'web', 'stellar', 'tribon', 'mesh'];
    let currentGeo = localStorage.getItem('aura_bg_geo') || 'off';

    function initMeshBg() {
        const W = window.innerWidth, H = window.innerHeight;
        const PAD = 200;
        const TW = W + PAD * 2, TH = H + PAD * 2;
        const balls = [
            { x: W *  1.20 - 300 + PAD, y: H * -0.10 + 300 + PAD, r: 300, color: '#007AFF' },
            { x: W * -0.18 + 275 + PAD, y: H *  1.12 - 275 + PAD, r: 275, color: '#FF3B30' },
            { x: W *  0.93 - 250 + PAD, y: H *  0.83 - 250 + PAD, r: 250, color: '#5856D6' },
        ];
        const iframe = document.getElementById('mesh-iframe');
        if (!iframe) return;
        const circles = balls.map(b =>
            `<div style="position:absolute;width:${b.r*2}px;height:${b.r*2}px;left:${b.x-b.r}px;top:${b.y-b.r}px;border-radius:50%;background:${b.color};"></div>`
        ).join('');
        const srcdoc = `<!DOCTYPE html><html><head><style>
            *{margin:0;padding:0;box-sizing:border-box;}
            body{width:${TW}px;height:${TH}px;overflow:hidden;background:transparent;filter:blur(120px);}
        </style></head><body>${circles}</body></html>`;
        iframe.srcdoc = srcdoc;
        iframe.style.top = `-${PAD}px`;
        iframe.style.left = `-${PAD}px`;
        iframe.style.width = `${TW}px`;
        iframe.style.height = `${TH}px`;
    }

    function drawBgGeo() {
        const canvas = document.getElementById('dot-connections');
        if (!canvas) return;
        const W = window.innerWidth, H = window.innerHeight;
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, W, H);

        if (currentGeo === 'web') {
            const STEP = 22, OFF = 11;
            const cols = Math.ceil(W / STEP) + 1, rows = Math.ceil(H / STEP) + 1;
            ctx.strokeStyle = 'rgba(0,0,0,0.13)';
            ctx.lineWidth = 1;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = c * STEP + OFF, y = r * STEP + OFF;
                    if (c < cols - 1 && Math.random() < 0.14)
                        { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + STEP, y); ctx.stroke(); }
                    if (r < rows - 1 && Math.random() < 0.14)
                        { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + STEP); ctx.stroke(); }
                }
            }
        } else if (currentGeo === 'stellar') {
            const N = Math.floor((W * H) / 14000);
            const pts = Array.from({ length: N }, () => ({ x: Math.random() * W, y: Math.random() * H }));
            const MAX_DIST = 160;
            ctx.lineWidth = 0.8;
            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < MAX_DIST) {
                        const alpha = (1 - d / MAX_DIST) * 0.22;
                        ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
                        ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke();
                    }
                }
            }
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 1.3, 0, Math.PI * 2); ctx.fill(); });
        } else if (currentGeo === 'tribon') {
            const A1 = 0.5436890126920764, A2 = 0.2956120693571985;
            const N = Math.floor((W * H) / 6500);
            ctx.fillStyle = 'rgba(0,0,0,0.38)';
            for (let i = 0; i < N; i++) {
                const x = ((0.5 + i * A1) % 1) * W, y = ((0.5 + i * A2) % 1) * H;
                ctx.beginPath(); ctx.arc(x, y, 1.2, 0, Math.PI * 2); ctx.fill();
            }
        }
    }

    function applyBgGeo(mode, noSave = false) {
        geoModes.forEach(m => document.body.classList.remove('bg-geo-' + m));
        document.body.classList.add('bg-geo-' + mode);
        currentGeo = mode;
        if (mode === 'mesh') initMeshBg();
        drawBgGeo();
        if (!noSave) localStorage.setItem('aura_bg_geo', mode);
    }

    window.addEventListener('resize', () => {
        if (currentGeo === 'mesh') initMeshBg();
        drawBgGeo();
    });

    /* ============================================================
       LANGUAGE SYSTEM: EN / ES / PT (3-way cycle)
    ============================================================ */
    // ---- IndexedDB for media blobs ----
    const mediaDB = (function() {
        const DB_NAME = 'aura_media';
        const STORE = 'blobs';
        let dbPromise;
        function open() {
            if (!dbPromise) {
                dbPromise = new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, 1);
                    req.onupgradeneeded = () => req.result.createObjectStore(STORE);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }
            return dbPromise;
        }
        return {
            async put(key, data) {
                const db = await open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE, 'readwrite');
                    tx.objectStore(STORE).put(data, key);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },
            async get(key) {
                const db = await open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE, 'readonly');
                    const req = tx.objectStore(STORE).get(key);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            async del(key) {
                const db = await open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE, 'readwrite');
                    tx.objectStore(STORE).delete(key);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },
            async keys() {
                const db = await open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE, 'readonly');
                    const req = tx.objectStore(STORE).getAllKeys();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }
        };
    })();

    const LANGS = ['en', 'es', 'pt'];
    const LANG_LABELS = { en: 'EN', es: 'ES', pt: 'PT' };
    let lang = LANGS.includes(localStorage.getItem('aura_lang')) ? localStorage.getItem('aura_lang') : 'en';
    const dock = document.getElementById('dock');
    let notes = JSON.parse(localStorage.getItem('aura_notes_v3')) || [];
    const PAGE_COUNT = 4;
    let currentPage = parseInt(localStorage.getItem('aura_current_page') || '0', 10);
    if (isNaN(currentPage) || currentPage < 0 || currentPage >= PAGE_COUNT) currentPage = 0;

    // Ensure all notes have a page property
    notes.forEach(n => { if (n.page == null) n.page = 0; });

    function switchPage(page) {
        if (page === currentPage) return;
        clearSelection();
        currentPage = page;
        localStorage.setItem('aura_current_page', String(page));
        // Hide/show notes based on page
        document.querySelectorAll('.note').forEach(el => {
            const d = notes.find(n => n.id === el.id);
            const show = (d && d.page === currentPage);
            const wasHidden = el.style.display === 'none';
            el.style.display = show ? '' : 'none';
            if (show && wasHidden) {
                const vid = el.querySelector('video');
                if (vid && vid.src) vid.load();
            }
        });
        renderPageDots();
    }

    function renderPageDots() {
        let container = document.getElementById('page-dots');
        if (!container) {
            container = document.createElement('div');
            container.className = 'page-dots';
            container.id = 'page-dots';
            document.body.appendChild(container);
        }
        container.className = 'page-dots';
        container.innerHTML = '';
        for (let i = 0; i < PAGE_COUNT; i++) {
            const dot = document.createElement('div');
            dot.className = 'page-dot' + (i === currentPage ? ' active' : '');
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                switchPage(i);
            });
            container.appendChild(dot);
        }
    }
    renderPageDots();

    // Shape toggle button removed

    let selectedNoteIds = new Set();
    const selRect = document.getElementById('selection-rect');
    let isSelecting = false;
    let selStart = { x: 0, y: 0 };

    // First time — seed hint notes
    if (notes.length === 0) {
        notes = [
            { "id": "n1776098065375vhb9", "x": 276, "y": 60,  "w": 271, "text": "add to your homepage 🏡", "page": 0, "zIndex": 100 },
            { "id": "n1776098095232",      "x": 274, "y": 133, "w": 176, "h": 96, "manualResize": true, "text": "double click to create a note", "page": 0, "zIndex": 101 },
            { "id": "n1776098589852",      "x": 45,  "y": 53,  "w": 207, "h": 128, "manualResize": true, "text": "book flights\n↗ tokyo, april\nbefore prices jump", "page": 0, "zIndex": 102 },
            { "id": "n1776100345016",      "x": 87,  "y": 194, "w": 162, "text": "weekdash.com", "page": 0, "zIndex": 103 },
            { "id": "n1776200000001",      "x": 570, "y": 55,  "w": 265, "h": 185, "manualResize": true, "imageData": "vid/preview.mov", "page": 0, "zIndex": 104 }
        ];
        localStorage.setItem('aura_notes_v3', JSON.stringify(notes));
    }
    let topZ = Math.max(1100, ...notes.map(n => n.zIndex || 0));

    // Track mouse for paste-to-note
    let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    document.addEventListener('mousemove', (e) => {
        mousePos.x = e.clientX;
        mousePos.y = e.clientY;
    });

    document.addEventListener('paste', (e) => {
        // Skip if typing in an input/textarea
        if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) || document.activeElement.contentEditable === 'true') return;

        const text = (e.clipboardData || window.clipboardData).getData('text').trim();
        if (!text) return;

        // Simple URL check
        const urlRegex = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([/\w .-]*)*\/?$/i;
        if (urlRegex.test(text)) {
            e.preventDefault();
            // Extract domain.tld
            let domain = text.replace(/^(https?:\/\/)?(www\.)?/i, '').split('/')[0];
            
            const newNote = {
                id: 'n' + Date.now(),
                x: mousePos.x - 100,
                y: mousePos.y - 20,
                text: text,
                displayTitle: domain,
                zIndex: ++topZ,
                page: currentPage
            };
            // Actually, user wants trimmed text in the note.
            newNote.text = domain; 

            notes.push(newNote);
            createNote(newNote, true);
            save();
        }
    });

    // ---- MULTI-SELECTION HELPERS ----
    function clearSelection() {
        selectedNoteIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.remove('selected');
        });
        selectedNoteIds.clear();
    }

    function toggleNoteSelection(id) {
        const el = document.getElementById(id);
        if (!el) return;
        if (selectedNoteIds.has(id)) {
            selectedNoteIds.delete(id);
            el.classList.remove('selected');
        } else {
            selectedNoteIds.add(id);
            el.classList.add('selected');
        }
    }

    function selectNotesInRect(x1, y1, x2, y2) {
        const left = Math.min(x1, x2);
        const top = Math.min(y1, y2);
        const right = Math.max(x1, x2);
        const bottom = Math.max(y1, y2);

        clearSelection();

        document.querySelectorAll('.note').forEach(el => {
            const rect = el.getBoundingClientRect();
            // Collision: rectangle intersection
            if (rect.left < right && rect.right > left && rect.top < bottom && rect.bottom > top) {
                selectedNoteIds.add(el.id);
                el.classList.add('selected');
            }
        });
    }

    // ---- COPY / PASTE SELECTED NOTES ----
    let copiedNotes = null;

    window.addEventListener('keydown', (e) => {
        if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) || document.activeElement.contentEditable === 'true') return;

        // Cmd/Ctrl+C — copy selected notes
        if ((e.metaKey || e.ctrlKey) && e.key === 'c' && selectedNoteIds.size > 0) {
            e.preventDefault();
            const selectedData = notes.filter(n => selectedNoteIds.has(n.id));
            if (!selectedData.length) return;
            // Store copies with relative positions (offset from the group's top-left)
            const minX = Math.min(...selectedData.map(n => n.x));
            const minY = Math.min(...selectedData.map(n => n.y));
            copiedNotes = selectedData.map(n => ({
                text: n.text,
                color: n.color,
                imageData: n.imageData,
                w: n.w,
                h: n.h,
                manualResize: n.manualResize,
                ox: n.x - minX,
                oy: n.y - minY,
            }));
            return;
        }

        // Cmd/Ctrl+V — paste copied notes at mouse position
        if ((e.metaKey || e.ctrlKey) && e.key === 'v' && copiedNotes) {
            e.preventDefault();
            clearSelection();
            const baseX = mousePos.x - 20;
            const baseY = mousePos.y - 20;
            copiedNotes.forEach(src => {
                const n = {
                    id: 'n' + Date.now() + Math.random().toString(36).slice(2, 6),
                    x: baseX + src.ox,
                    y: baseY + src.oy,
                    text: src.text,
                    color: src.color,
                    w: src.w,
                    h: src.h,
                    manualResize: src.manualResize,
                    imageData: src.imageData,
                    zIndex: ++topZ,
                    page: currentPage,
                };
                notes.push(n);
                createNote(n);
                selectedNoteIds.add(n.id);
                const el = document.getElementById(n.id);
                if (el) el.classList.add('selected');
            });
            save();
            return;
        }

        // Delete / Backspace — delete selected notes (with confirm popup)
        if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNoteIds.size > 0) {
            e.preventDefault();
            showDeleteConfirm();
            return;
        }
    });

    // ---- DELETE CONFIRM MODAL ----
    const deleteConfirmModal  = document.getElementById('delete-confirm-modal');
    const deleteConfirmMsg    = document.getElementById('delete-confirm-msg');
    const deleteConfirmCancel = document.getElementById('delete-confirm-cancel');
    const deleteConfirmBtn    = document.getElementById('delete-confirm-delete');

    function showDeleteConfirm() {
        const count = selectedNoteIds.size;
        deleteConfirmMsg.textContent = `Delete ${count} ${count === 1 ? 'note' : 'notes'}?`;
        deleteConfirmModal.classList.add('open');
        deleteConfirmBtn.focus();
    }

    function hideDeleteConfirm() {
        deleteConfirmModal.classList.remove('open');
    }

    function commitDeleteSelected() {
        selectedNoteIds.forEach(id => {
            const data = notes.find(n => n.id === id);
            if (data && data.imageData) mediaDB.del('media_' + id);
            const el = document.getElementById(id);
            if (el) el.remove();
        });
        notes = notes.filter(n => !selectedNoteIds.has(n.id));
        selectedNoteIds.clear();
        save();
        hideDeleteConfirm();
    }

    deleteConfirmCancel.addEventListener('click', hideDeleteConfirm);
    deleteConfirmBtn.addEventListener('click', commitDeleteSelected);

    deleteConfirmModal.addEventListener('mousedown', (e) => {
        if (e.target === deleteConfirmModal) hideDeleteConfirm();
    });

    window.addEventListener('keydown', (e) => {
        if (deleteConfirmModal.classList.contains('open')) {
            if (e.key === 'Escape') { e.preventDefault(); hideDeleteConfirm(); }
            if (e.key === 'Enter')  { e.preventDefault(); commitDeleteSelected(); }
        }
    });

    // ---- SELECTION RECTANGLE ON WINDOW CLICK ----
    window.addEventListener('mousedown', (e) => {
        // Only start selection if clicking on empty space (not on a note, not on UI elements)
        if (
            e.button !== 0 ||
            e.target.closest('.note') ||
            e.target.closest('.dock-wrapper') ||
            e.target.closest('.settings-btn') ||
            e.target.closest('.search-overlay') ||
            e.target.closest('.note-context-menu') ||
            e.target.closest('.dev-modal') ||
            e.target.closest('.delete-confirm-modal') ||
            ['INPUT', 'TEXTAREA', 'BUTTON', 'A'].includes(e.target.tagName)
        ) return;

        isSelecting = true;
        selStart.x = e.clientX;
        selStart.y = e.clientY;
        
        document.body.classList.add('is-selecting');
        selRect.style.display = 'block';
        selRect.style.left = e.clientX + 'px';
        selRect.style.top = e.clientY + 'px';
        selRect.style.width = '0px';
        selRect.style.height = '0px';
    });

    window.addEventListener('mousemove', (e) => {
        if (!isSelecting) return;
        
        const x = e.clientX;
        const y = e.clientY;
        const left = Math.min(selStart.x, x);
        const top = Math.min(selStart.y, y);
        const width = Math.abs(x - selStart.x);
        const height = Math.abs(y - selStart.y);
        
        selRect.style.left = left + 'px';
        selRect.style.top = top + 'px';
        selRect.style.width = width + 'px';
        selRect.style.height = height + 'px';
        
        // Live preview: highlight notes that would be selected
        const right = Math.max(selStart.x, x);
        const bottom = Math.max(selStart.y, y);
        
        document.querySelectorAll('.note').forEach(el => {
            const rect = el.getBoundingClientRect();
            // Collision: rectangle intersection
            if (rect.left < right && rect.right > left && rect.top < bottom && rect.bottom > top) {
                el.classList.add('potential-select');
            } else {
                el.classList.remove('potential-select');
            }
        });
    });

    window.addEventListener('mouseup', (e) => {
        if (!isSelecting) return;
        isSelecting = false;
        document.body.classList.remove('is-selecting');
        
        const x = e.clientX;
        const y = e.clientY;
        const width = Math.abs(x - selStart.x);
        const height = Math.abs(y - selStart.y);
        
        // Remove potential-select from all notes
        document.querySelectorAll('.note.potential-select').forEach(el => el.classList.remove('potential-select'));
        
        // Only select if rectangle is large enough (avoid accidental clicks)
        if (width > 10 && height > 10) {
            selectNotesInRect(selStart.x, selStart.y, x, y);
        } else {
            // Small click - clear selection
            clearSelection();
        }
        
        selRect.style.display = 'none';
    });

    function getMainGreeting(lang, slot) {
        const map = {
            en: { morning: 'Good morning.', afternoon: 'Good afternoon.', evening: 'Good evening.', night: 'Good night.' },
            es: { morning: 'Buenos días.', afternoon: 'Buenas tardes.', evening: 'Buenas noches.', night: 'Buenas noches.' },
            pt: { morning: 'Bom dia.', afternoon: 'Boa tarde.', evening: 'Boa noite.', night: 'Boa noite.' },
        };
        return map[lang][slot] || map[lang].morning;
    }

    function getTimeSlot(hour) {
        if (hour >= 5 && hour < 12)  return 'morning';
        if (hour >= 12 && hour < 20) return 'afternoon';
        return 'night';
    }

    function updateHeader() {
        const now = new Date();
        const slot = getTimeSlot(now.getHours());
        const greetEl = document.getElementById('greeting');
        if (!greetEl) return;
        greetEl.textContent = getMainGreeting(lang, slot);
    }

    function cycleLang() {
        const idx = LANGS.indexOf(lang);
        const nextLang = LANGS[(idx + 1) % LANGS.length];
        applyLang(nextLang);

        const greetEl = document.getElementById('greeting');
        if (greetEl) {
            greetEl.classList.remove('lang-switch');
            void greetEl.offsetWidth;
            greetEl.classList.add('lang-switch');
        }
    }

    document.getElementById('greeting').addEventListener('click', () => cycleLang());

    /* ============================================================
       LINKIFY
    ============================================================ */
    function renderNoteContent(content, text) {
        content.innerHTML = linkify(text);
    }

    function wrapNote(note, data) {
        if (data.imageData) return;
        const content = note.querySelector('.note-content');
        if (!content) return;
        const text = data.text || '';
        if (!text.trim()) return;

        // Always clear fixed height so it auto-sizes to content
        note.style.height = '';
        delete data.h;

        if (data.manualResize) return;

        const lines = text.split('\n');

        // Single line (no explicit newlines) — let CSS fit-content + max-width handle it
        if (lines.length <= 1) {
            note.style.width = '';
            delete data.w;
            return;
        }

        // Multi-line: measure the longest line and size to fit
        const cs = getComputedStyle(content);
        const mirror = document.createElement('div');
        mirror.style.cssText = 'position:fixed;top:-9999px;left:-9999px;white-space:pre;visibility:hidden;pointer-events:none;';
        mirror.style.fontFamily = cs.fontFamily;
        mirror.style.fontSize = cs.fontSize;
        mirror.style.fontWeight = cs.fontWeight;
        mirror.style.lineHeight = cs.lineHeight;
        mirror.style.letterSpacing = cs.letterSpacing;
        document.body.appendChild(mirror);

        const NOTE_PAD = 32;
        const NOTE_MAX = 568;
        const NOTE_MIN = 80;

        let maxW = 0;
        lines.forEach(line => {
            mirror.textContent = line || ' ';
            maxW = Math.max(maxW, mirror.getBoundingClientRect().width);
        });
        mirror.remove();

        const edgeMax = Math.max(NOTE_MIN, window.innerWidth - data.x - 16);
        const w = Math.max(Math.min(Math.ceil(maxW) + NOTE_PAD, NOTE_MAX + NOTE_PAD, edgeMax), NOTE_MIN);
        note.style.width = w + 'px';
        data.w = w;
    }

    function linkify(text) {
        const urlRegex = /((https?:\/\/|www\.)[^\s]+|[a-zA-Z0-9-]+\.[a-zA-Z]{2,}[^\s]*)/gi;
        return text.replace(urlRegex, (url) => {
            let href = url.startsWith('http') ? url : 'https://' + url;
            return `<a href="${href}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${url}</a>`;
        });
    }


    /* ============================================================
       DOCK
    ============================================================ */
    let dockOffset = 0; // days offset from current start

    function initDock() {
        const dayNames = {
            en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            es: ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'],
            pt: ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'],
        };
        const now = new Date();
        const isMobile = window.innerWidth <= 430;
        const numDays = isMobile ? 5 : 7;
        const weekStart = new Date(now);
        weekStart.setHours(0, 0, 0, 0);
        weekStart.setDate(now.getDate() + dockOffset);

        const dock = document.getElementById('dock');
        dock.innerHTML = '';

        for (let i = 0; i < numDays; i++) {
            const date = new Date(weekStart);
            date.setDate(weekStart.getDate() + i);
            const dateStr = toISO(date);
            const isToday = date.toDateString() === now.toDateString();
            const isPast = date < new Date(now.getFullYear(), now.getMonth(), now.getDate());

            // 1. Create Day Card
            const card = document.createElement('div');
            const isWeekend = date.getDay() === 0 || date.getDay() === 6;
            card.className = `day-card${isToday ? ' active' : ''}${isPast ? ' past' : ''}${isWeekend ? ' weekend' : ''}`;
            card.dataset.date = dateStr;
            card.innerHTML = `
                <span class="day-name">${(dayNames[lang] || dayNames['en'])[date.getDay()]}</span>
                <div class="day-main-row">
                    <span class="day-number">${date.getDate()}</span>
                </div>
            `;
            dock.appendChild(card);
            if (isToday) {
                requestAnimationFrame(() => {
                    const light = document.getElementById('active-day-light');
                    if (!light) return;
                    const cr = card.getBoundingClientRect();
                    light.style.left = (cr.left + cr.width / 2) + 'px';
                    light.style.top  = (cr.top  + cr.height / 2) + 'px';
                });
            }

            // 2. Separators (dock only)
            if (i < numDays - 1) {
                const nextDate = new Date(weekStart);
                nextDate.setDate(weekStart.getDate() + i + 1);
                const nextIsToday = nextDate.toDateString() === now.toDateString();
                if (!isToday && !nextIsToday) {
                    const sep = document.createElement('div');
                    sep.className = 'day-separator';
                    dock.appendChild(sep);
                }
            }
        }
    }

    function initWeatherRow() {

    /* ============================================================
       TIME RULER
    ============================================================ */
    const RULER_START = 0;   // midnight
    const RULER_END   = 24;  // midnight
    const RULER_SPAN  = RULER_END - RULER_START;

    window.drawSunriseSunset = function() {
        return; // Sun/moon arc removed
        const ruler = document.getElementById('time-ruler');
        ruler.querySelectorAll('.sun-label').forEach(el => el.remove());
        const sun = window.todaySunTimes;
        if (!sun) return;

        const toH = iso => { const d = new Date(iso); return d.getHours() + d.getMinutes() / 60; };
        const toPct = h => Math.max(0, Math.min(100, (h - RULER_START) / RULER_SPAN * 100));
        const fmt = iso => {
            const d = new Date(iso);
            const h = d.getHours(), mm = String(d.getMinutes()).padStart(2,'0');
            return `${h % 12 || 12}:${mm}${h >= 12 ? 'pm' : 'am'}`;
        };

        const riseH = toH(sun.rise), setH = toH(sun.set);
        const risePct = toPct(riseH), setPct = toPct(setH);


        const riseIcon = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
            <circle cx="6" cy="5" r="2.2"/>
            <line x1="6" y1="0.5" x2="6" y2="1.8"/>
            <line x1="6" y1="8.2" x2="6" y2="9.5"/>
            <line x1="9.5" y1="5" x2="10.8" y2="5"/>
            <line x1="1.2" y1="5" x2="2.5" y2="5"/>
            <line x1="8.5" y1="2.5" x2="9.4" y2="1.6"/>
            <line x1="2.6" y1="8.4" x2="3.5" y2="7.5"/>
            <line x1="8.5" y1="7.5" x2="9.4" y2="8.4"/>
            <line x1="2.6" y1="1.6" x2="3.5" y2="2.5"/>
            <line x1="0" y1="11" x2="12" y2="11"/>
            <polyline points="4,9 6,7 8,9"/>
        </svg>`;
        const setIcon = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
            <circle cx="6" cy="4" r="2.2"/>
            <line x1="6" y1="0.5" x2="6" y2="1.8"/>
            <line x1="9.5" y1="4" x2="10.8" y2="4"/>
            <line x1="1.2" y1="4" x2="2.5" y2="4"/>
            <line x1="8.5" y1="1.5" x2="9.4" y2="0.6"/>
            <line x1="2.6" y1="0.6" x2="3.5" y2="1.5"/>
            <line x1="0" y1="8" x2="12" y2="8"/>
            <polyline points="4,9.5 6,11.5 8,9.5"/>
        </svg>`;

        const makeLabel = (iso, pct, icon) => {
            const l = document.createElement('div');
            l.className = 'sun-label'; l.style.left = pct + '%';
            l.textContent = fmt(iso);
            const tip = document.createElement('div');
            tip.className = 'sun-tooltip';
            tip.innerHTML = `<span class="sun-tooltip-icon">${icon}</span><div class="sun-tooltip-bubble">${fmt(iso)}</div>`;
            l.appendChild(tip);
            ruler.appendChild(l);
        };

        if (riseH >= RULER_START && riseH <= RULER_END) makeLabel(sun.rise, risePct, riseIcon);
        if (setH  >= RULER_START && setH  <= RULER_END) makeLabel(sun.set,  setPct,  setIcon);
    };

    function buildTimeRuler() {
        const ruler = document.getElementById('time-ruler');
        ruler.querySelectorAll('.time-ruler-tick').forEach(el => el.remove());

        const now = new Date();
        const nowH = now.getHours() + now.getMinutes() / 60;

        for (let h = RULER_START; h <= RULER_END; h++) {
            const isPastH = h <= nowH;

            // Hour tick
            const pct = (h - RULER_START) / RULER_SPAN * 100;
            const tick = document.createElement('div');
            tick.className = 'time-ruler-tick hour';
            tick.style.left = pct + '%';
            tick.style.background = isPastH ? '#c580fb' : 'var(--text-color)';
            tick.style.opacity = isPastH ? '0.55' : '0.25';
            ruler.appendChild(tick);

            if (h < RULER_END) {
                // Half-hour tick
                const halfPct = (h + 0.5 - RULER_START) / RULER_SPAN * 100;
                const isPastHalf = (h + 0.5) <= nowH;
                const half = document.createElement('div');
                half.className = 'time-ruler-tick half';
                half.style.left = halfPct + '%';
                half.style.background = isPastHalf ? '#c580fb' : 'var(--text-color)';
                half.style.opacity = isPastHalf ? '0.35' : '0.15';
                ruler.appendChild(half);

                // Quarter-hour ticks
                [0.25, 0.75].forEach(q => {
                    const qPct = (h + q - RULER_START) / RULER_SPAN * 100;
                    const isPastQ = (h + q) <= nowH;
                    const qt = document.createElement('div');
                    qt.className = 'time-ruler-tick quarter';
                    qt.style.left = qPct + '%';
                    qt.style.background = isPastQ ? '#c580fb' : 'var(--text-color)';
                    qt.style.opacity = isPastQ ? '0.2' : '0.08';
                    ruler.appendChild(qt);
                });
            }
        }
    }

    let timeFormatIdx = parseInt(localStorage.getItem('aura_time_format') || '0') % 2;

    function formatTime(h, m) {
        const mm = m.toString().padStart(2, '0');
        if (timeFormatIdx === 0) {
            const ampm = h >= 12 ? 'pm' : 'am';
            const h12 = h % 12 || 12;
            return h12 + ':' + mm + ampm;
        }
        return h.toString().padStart(2, '0') + ':' + mm;
    }
