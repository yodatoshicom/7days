    function getDayCardAtPoint(x, y) {
        const cards = document.querySelectorAll('[data-date]');
        for (const card of cards) {
            const rect = card.getBoundingClientRect();
            if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                return { card, dateStr: card.dataset.date };
            }
        }
        return null;
    }

    const contextMenu = document.getElementById('note-context-menu');
    function openContextMenu(x, y, noteEl, data) {
        activeNoteRef = { note: noteEl, data };
        contextMenu.classList.add('show');
        const menuW = contextMenu.offsetWidth;
        const menuH = contextMenu.offsetHeight;
        let left = x, top = y;
        if (left + menuW > window.innerWidth - 10) left = window.innerWidth - menuW - 10;
        if (top + menuH > window.innerHeight - 10) top = window.innerHeight - menuH - 10;
        contextMenu.style.left = left + 'px';
        contextMenu.style.top = top + 'px';
        
        const activeColor = data.color || 'default';
        contextMenu.querySelectorAll('.ncm-color-dot').forEach(d =>
            d.classList.toggle('active', d.dataset.color === activeColor)
        );
    }
    function closeContextMenu() {
        contextMenu.classList.remove('show');
    }
    contextMenu.addEventListener('mousedown', (e) => {
        e.preventDefault(); e.stopPropagation();
        const dot = e.target.closest('.ncm-color-dot');
        const btn = e.target.closest('.ncm-btn');
        if (dot && activeNoteRef.note) {
            const c = dot.dataset.color;
            const { note, data } = activeNoteRef;
            data.color = c;
            if (c && c !== 'default') note.setAttribute('data-note-color', c);
            else note.removeAttribute('data-note-color');
            contextMenu.querySelectorAll('.ncm-color-dot').forEach(d =>
                d.classList.toggle('active', d.dataset.color === c)
            );
            save();
        } else if (btn) {
            // Handle blur action
            if (btn.dataset.action === 'blur' && activeNoteRef.note) {
                const { note, data } = activeNoteRef;
                data.blurred = !data.blurred;
                note.classList.toggle('blurred', data.blurred);
                save();
                closeContextMenu();
                return;
            }
            
            const ta = document.querySelector('.note-edit-ta');
            const char = btn.dataset.insert;
            if (ta) {
                const pos = ta.selectionStart;
                ta.value = ta.value.slice(0, pos) + char + ta.value.slice(ta.selectionEnd);
                ta.selectionStart = ta.selectionEnd = pos + char.length;
                ta.focus();
                ta.dispatchEvent(new Event('input'));
            } else if (activeNoteRef.data) {
                activeNoteRef.data.text = (activeNoteRef.data.text || '') + char;
                const content = activeNoteRef.note.querySelector('.note-content');
                renderNoteContent(content, activeNoteRef.data.text);
                save();
            }
            closeContextMenu();
        }
    });
    window.addEventListener('mousedown', (e) => {
        if (!e.target.closest('#note-context-menu')) closeContextMenu();
    });

function createNote(data, autoFocus = false) {
        const note = document.createElement('div');
        note.className = 'note';
        note.id = data.id;
        note.style.left = Math.max(data.x, 20) + 'px';
        note.style.top  = Math.max(data.y, 20) + 'px';
        requestAnimationFrame(() => {
            const margin = 20;
            const nx = parseFloat(note.style.left);
            const ny = parseFloat(note.style.top);
            note.style.left = Math.min(nx, window.innerWidth  - note.offsetWidth  - margin) + 'px';
            note.style.top  = Math.min(ny, window.innerHeight - note.offsetHeight - margin) + 'px';
        });
        if (data.w) note.style.width = data.w + 'px';
        if (data.manualResize && data.h) note.style.height = data.h + 'px';
        note.style.zIndex = data.zIndex || topZ;
        if (data.color && data.color !== 'default') note.setAttribute('data-note-color', data.color);

        const content = document.createElement('div');
        content.className = 'note-content';
        content.spellcheck = false;
        note.appendChild(content);
        renderNoteContent(content, data.text || '');

// ---- IMAGE NOTE ----
        if (data.imageData) {
            note.classList.add('image-note');
            const isVideoSrc = data.imageData.startsWith('data:video/') || /\.(mov|mp4|webm|ogv|ogg)(\?.*)?$/i.test(data.imageData);
            if (isVideoSrc) {
                const vid = document.createElement('video');
                vid.className = 'note-image';
                vid.src = data.imageData;
                vid.loop = true;
                vid.muted = true;
                vid.playsInline = true;
                vid.autoplay = false;
                vid.draggable = false;
                vid.ondragstart = () => false;
                note.insertBefore(vid, content);

                const playBtn = document.createElement('button');
                playBtn.className = 'video-play-btn';
                const pauseIcon = `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>`;
                const playIcon = `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
                playBtn.innerHTML = playIcon;
                playBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (vid.paused) {
                        vid.play();
                        playBtn.innerHTML = pauseIcon;
                    } else {
                        vid.pause();
                        playBtn.innerHTML = playIcon;
                    }
                });
                note.insertBefore(playBtn, content);
            } else {
                const img = document.createElement('img');
                img.className = 'note-image';
                img.src = data.imageData;
                img.draggable = false;
                img.ondragstart = () => false;
                note.insertBefore(img, content);
            }
        }


        // ---- RESIZE HANDLE (bottom-right, iOS style) ----
        const resizeHandle = document.createElement('div');
        resizeHandle.className = 'note-resize-handle';
        // SVG arc — quarter circle matching note's 30px border-radius, convex toward corner
        // Arc: center at (4,4), radius 30, from (34,4) to (4,34), sweep clockwise
        resizeHandle.innerHTML = `<svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 33.0,11.8 A 30,30 0 0,1 11.8,33.0" stroke="transparent" stroke-width="20" stroke-linecap="round" style="pointer-events:stroke;cursor:nwse-resize"/>
          <path class="rh-fill" d="M 33.0,11.8 A 30,30 0 0,1 11.8,33.0" stroke="rgba(255,255,255,0.92)" stroke-width="7" stroke-linecap="round" style="pointer-events:none"/>
        </svg>`;
        note.appendChild(resizeHandle);

        // ---- CLOSE BUTTON (top-right) ----
        const closeBtn = document.createElement('div');
        closeBtn.className = 'note-close';
        closeBtn.innerHTML = `<svg viewBox="0 0 6 6"><line x1="1" y1="1" x2="5" y2="5"/><line x1="5" y1="1" x2="1" y2="5"/></svg>`;
        note.appendChild(closeBtn);

        closeBtn.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            if (data.imageData) mediaDB.del('media_' + data.id);
            data._deleted = true;
            note.remove();
            notes = notes.filter(n => n.id !== data.id);
            document.body.classList.remove('note-editing-mode');
            activeNoteRef = { note: null, data: null };
            document.querySelectorAll('.note').forEach(n => n.style.opacity = '');
            save();
        });

        document.body.appendChild(note);

        // ---- CLAMP NOTE TO VIEWPORT ----
        const clampNote = (x, y) => {
            const margin = 20;
            const w = note.offsetWidth;
            const h = note.offsetHeight;
            return {
                x: Math.min(Math.max(x, margin), window.innerWidth  - w - margin),
                y: Math.min(Math.max(y, margin), window.innerHeight - h - margin)
            };
        };

        // ---- DRAG (mouse + touch) ----
        const startDrag = (clientX, clientY) => {
            const origOx = clientX - note.offsetLeft;
            const origOy = clientY - note.offsetTop;
            note.style.zIndex = ++topZ;
            note.classList.add('dragging');
            let isNearDock = false;
            const dockEl = document.getElementById('dock');
            const SCALE_MINI = 0.65;

            // Track offsets for all selected notes
            const selectedOffsets = [];
            if (selectedNoteIds.size > 1) {
                selectedNoteIds.forEach(id => {
                    if (id === data.id) return;
                    const el = document.getElementById(id);
                    if (el) {
                        selectedOffsets.push({
                            el,
                            ox: clientX - el.offsetLeft,
                            oy: clientY - el.offsetTop
                        });
                    }
                });
            }

            const move = (cx, cy) => {
                const dockRect = dockEl.getBoundingClientRect();
                const pad = 40;
                const nearDock = cx >= dockRect.left - pad && cx <= dockRect.right + pad &&
                                 cy >= dockRect.top - pad && cy <= dockRect.bottom + pad;
                if (nearDock && !isNearDock) { isNearDock = true; note.classList.add('near-dock'); }
                else if (!nearDock && isNearDock) { isNearDock = false; note.classList.remove('near-dock'); }
                if (isNearDock) {
                    note.style.left = (cx - note.offsetWidth / 2) + 'px';
                    note.style.top  = (cy - note.offsetHeight / 2) + 'px';
                    note.style.transform = `scale(${SCALE_MINI})`;
                } else {
                    note.style.left = (cx - origOx) + 'px';
                    note.style.top  = (cy - origOy) + 'px';
                    note.style.transform = `scale(1.02)`;
                    
                    // Move all other selected notes together
                    selectedOffsets.forEach(({ el, ox, oy }) => {
                        el.style.left = (cx - ox) + 'px';
                        el.style.top = (cy - oy) + 'px';
                    });
                }
                document.querySelectorAll('.day-card.drag-over').forEach(c => c.classList.remove('drag-over'));
                const hit = getDayCardAtPoint(cx, cy);
                if (hit && !hit.card.classList.contains('past')) hit.card.classList.add('drag-over');
            };

            const stop = (cx, cy) => {
                note.classList.remove('dragging', 'near-dock');
                note.style.transform = '';
                document.querySelectorAll('.day-card.drag-over').forEach(c => c.classList.remove('drag-over'));
                note.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease';
                setTimeout(() => { note.style.transition = ''; }, 500);
                
                // Clamp all selected notes
                selectedNoteIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        const clamped = clampNote(parseFloat(el.style.left), parseFloat(el.style.top));
                        el.style.left = clamped.x + 'px';
                        el.style.top = clamped.y + 'px';
                    }
                });
                save();
            };
            return { move, stop };
        };

        note.onmousedown = (e) => {
            if (e.button !== 0) return;
            if (e.target.closest('.note-resize-handle')) return;
            if (e.target.closest('.note-close')) return;
            if (e.target.closest('.video-play-btn')) return;
            if (note.querySelector('.note-edit-ta')) return;
            if (e.target.tagName === 'A') return;
            if (window._lastFileDrop && Date.now() - window._lastFileDrop < 400) return;
            e.preventDefault();
            
            // Shift+click to toggle selection
            if (e.shiftKey) {
                toggleNoteSelection(data.id);
            } else if (!selectedNoteIds.has(data.id)) {
                // Click on unselected note - clear others and select this one
                clearSelection();
                selectedNoteIds.add(data.id);
                note.classList.add('selected');
            }
            
            const { move, stop } = startDrag(e.clientX, e.clientY);
            const cleanup = (cx, cy) => { stop(cx, cy); window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
            const onMove  = (me) => { if (me.buttons === 0) { cleanup(me.clientX, me.clientY); return; } me.preventDefault(); move(me.clientX, me.clientY); };
            const onUp    = (me) => cleanup(me.clientX, me.clientY);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        };

        note.addEventListener('touchstart', (e) => {
            if (e.target.closest('.note-resize-handle')) return;
            if (e.target.closest('.note-close')) return;
            if (e.target.closest('.video-play-btn')) return;
            if (note.querySelector('.note-edit-ta')) return;
            if (e.target.tagName === 'A') return;
            if (window._lastFileDrop && Date.now() - window._lastFileDrop < 400) return;
            const t = e.touches[0];
            const { move, stop } = startDrag(t.clientX, t.clientY);
            const onMove   = (te) => { te.preventDefault(); const t = te.touches[0]; move(t.clientX, t.clientY); };
            const cleanup  = () => { window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onEnd); window.removeEventListener('touchcancel', onEnd); };
            const onEnd    = (te) => { const t = te.changedTouches[0]; stop(t.clientX, t.clientY); cleanup(); };
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);
            window.addEventListener('touchcancel', onEnd);
        }, { passive: true });

        note.oncontextmenu = (e) => {
            e.preventDefault();
            e.stopPropagation();
            openContextMenu(e.clientX, e.clientY, note, data);
        };

        // ---- RESIZE (mousedown + touchstart on handle) ----
        function startResize(clientX, clientY) {
            const startX = clientX;
            const startY = clientY;
            const startRect = note.getBoundingClientRect();
            const startW = Math.ceil(startRect.width);
            const startH = Math.ceil(startRect.height);

            note.style.height = startH + 'px';

            const minW = 20;
            const minH = 20;
            const onMove = (me) => {
                if (me.buttons === 0) { onUp(); return; }
                const newW = Math.max(minW, startW + (me.clientX - startX));
                const newH = Math.max(minH, startH + (me.clientY - startY));
                note.style.width = newW + 'px';
                note.style.height = newH + 'px';
            };
            const onTouchMove = (te) => {
                te.preventDefault();
                const t = te.touches[0];
                const newW = Math.max(minW, startW + (t.clientX - startX));
                const newH = Math.max(minH, startH + (t.clientY - startY));
                note.style.width = newW + 'px';
                note.style.height = newH + 'px';
            };
            const onUp = () => {
                const endRect = note.getBoundingClientRect();
                data.w = Math.ceil(endRect.width);
                data.h = Math.ceil(endRect.height);
                data.manualResize = true;
                save();
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
                window.removeEventListener('touchmove', onTouchMove);
                window.removeEventListener('touchend', onUp);
                window.removeEventListener('touchcancel', onUp);
            };
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', onUp);
            window.addEventListener('touchcancel', onUp);
        }

        const rhPath = resizeHandle.querySelector('path');
        rhPath.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            startResize(e.clientX, e.clientY);
        });

        rhPath.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            e.preventDefault();
            const t = e.touches[0];
            startResize(t.clientX, t.clientY);
        }, { passive: false });

        // ---- DOUBLE CLICK TO EDIT ----
        note.ondblclick = (e) => {
            if (e.target.closest('.note-resize-handle')) return;
            if (e.target.closest('.note-delete')) return;
            if (data.imageData) { e.stopPropagation(); return; }
            if (note.classList.contains('editing')) return;
            e.stopPropagation();
            note.classList.add('editing');
            document.body.classList.add('note-editing-mode');
            activeNoteRef = { note, data };

            const ta = document.createElement('textarea');
            ta.className = 'note-edit-ta';
            ta.rows = 1;
            ta.value = data.text || '';
            ta.spellcheck = false;
            content.style.display = 'none';
            note.insertBefore(ta, content);

            // Mirror div to measure natural text width (longest line)
            const mirror = document.createElement('div');
            mirror.style.cssText = 'position:fixed;top:-9999px;left:-9999px;white-space:pre;visibility:hidden;pointer-events:none;';
            const taCs = getComputedStyle(ta);
            mirror.style.fontFamily = taCs.fontFamily;
            mirror.style.fontSize   = taCs.fontSize;
            mirror.style.lineHeight = taCs.lineHeight;
            document.body.appendChild(mirror);

            const NOTE_PAD = 32; // 16px padding each side
            const NOTE_MAX = 568; // max-width 600 - padding
            const NOTE_MIN = 80;

            const taResize = () => {
                if (!data.manualResize) {
                    const lines = (ta.value || ' ').split('\n');
                    let maxW = 0;
                    lines.forEach(line => {
                        mirror.textContent = line || ' ';
                        maxW = Math.max(maxW, mirror.getBoundingClientRect().width);
                    });
                    const edgeMax = Math.max(NOTE_MIN, window.innerWidth - data.x - 16);
                    note.style.width = Math.max(Math.min(Math.ceil(maxW) + NOTE_PAD, NOTE_MAX + NOTE_PAD, edgeMax), NOTE_MIN) + 'px';
                }
                ta.style.height = 'auto';
                ta.style.height = ta.scrollHeight + 'px';
            };
            taResize();
            ta.focus();
            ta.setSelectionRange(ta.value.length, ta.value.length);

            ta.oninput = () => {
                taResize();
                const pos = ta.selectionStart;
                const before = ta.value.slice(0, pos);
                if (before.endsWith('- ')) {
                    ta.value = ta.value.slice(0, pos - 2) + '→ ' + ta.value.slice(pos);
                    ta.selectionStart = ta.selectionEnd = pos;
                } else if (before.endsWith('/ ')) {
                    ta.value = ta.value.slice(0, pos - 2) + '↗ ' + ta.value.slice(pos);
                    ta.selectionStart = ta.selectionEnd = pos;
                } else if (before.endsWith('->')) {
                    ta.value = ta.value.slice(0, pos - 2) + '→' + ta.value.slice(pos);
                    ta.selectionStart = ta.selectionEnd = pos - 1;
                }
            };

            ta.onkeydown = (e) => {
                if (e.key === 'Escape') { e.preventDefault(); ta.blur(); return; }
                if (e.key === 'Enter') {
                    if (e.shiftKey) {
                        // Shift+Enter: new line (with list continuation)
                        const listMode = ta.value.trimStart().startsWith('→');
                        if (listMode) {
                            e.preventDefault();
                            const pos = ta.selectionStart;
                            const currentLine = ta.value.slice(0, pos).split('\n').pop();
                            const prefix = currentLine.match(/^(→\s*)/) ? currentLine.match(/^(→\s*)/)[1] : '→ ';
                            const insert = '\n' + prefix;
                            ta.value = ta.value.slice(0, pos) + insert + ta.value.slice(ta.selectionEnd);
                            ta.selectionStart = ta.selectionEnd = pos + insert.length;
                            taResize();
                        }
                        // non-list shift+enter: browser default (inserts newline)
                    } else {
                        // Enter alone: finish editing
                        e.preventDefault();
                        ta.blur();
                    }
                }
            };

            ta.onblur = () => {
                mirror.remove();
                if (data._deleted) {
                    document.body.classList.remove('note-editing-mode');
                    activeNoteRef = { note: null, data: null };
                    document.querySelectorAll('.note').forEach(n => n.style.opacity = '');
                    return;
                }
                const plainText = ta.value.trimEnd();
                ta.remove();
                content.style.display = '';
                note.classList.remove('editing');
                document.body.classList.remove('note-editing-mode');
                activeNoteRef = { note: null, data: null };
                data.text = plainText;
                renderNoteContent(content, plainText);
                document.querySelectorAll('.note').forEach(n => n.style.opacity = '');
                if (!plainText.trim()) {
                    note.remove();
                    notes = notes.filter(n => n.id !== data.id);
                    save();
                    return;
                }
                if (note.classList.contains('spotify-note')) {
                    save();
                    return;
                }
                wrapNote(note, data);
                save();
            };
        };

        if (autoFocus) {
            // Append to DOM first so getBoundingClientRect works, then open editor
            requestAnimationFrame(() => note.ondblclick({ target: note, stopPropagation: () => {}, closest: () => null }));
        }
        
        return note;
    }

    // ---- VIDEO FRAME RECOVERY ON TAB SWITCH ----
    // Primary fix: .note.image-note has backdrop-filter:none to avoid the
    // Chromium/WebKit compositing bug where video layers go blank on tab resume.
    // This handler is a secondary safety net for paused videos that still drop
    // their frame — play()+pause() forces the browser to decode and paint a frame.
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState !== 'visible') return;
        document.querySelectorAll('.note video').forEach(vid => {
            if (!vid.paused) return;
            const t = vid.currentTime;
            vid.play().then(() => {
                requestAnimationFrame(() => {
                    vid.pause();
                    vid.currentTime = t;
                });
            }).catch(() => {
                // play() blocked (e.g. no user gesture yet) — try a nudge seek
                try { vid.currentTime = t + 0.001; vid.currentTime = t; } catch (_) {}
            });
        });
    });

    // ---- IMAGE DROP FROM FILE SYSTEM ----
    window.addEventListener('dragover', (e) => {
        if (e.dataTransfer.types.includes('Files')) e.preventDefault();
    });

    window.addEventListener('drop', (e) => {
        if (e.target.closest('.dock-wrapper')) return;
        const file = Array.from(e.dataTransfer.files).find(f => f.type.startsWith('image/') || f.type.startsWith('video/'));
        if (!file) return;
        e.preventDefault();

        const reader = new FileReader();

        // Show upload progress indicator for videos
        let uploadIndicator = null;
        if (file.type.startsWith('video/')) {
            uploadIndicator = document.createElement('div');
            uploadIndicator.className = 'video-upload-indicator';
            uploadIndicator.innerHTML = `
                <div class="vui-label">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                    Reading video…
                </div>
                <div class="vui-track"><div class="vui-bar" id="vui-bar-active"></div></div>`;
            const indicatorW = 180;
            const indicatorH = 60;
            uploadIndicator.style.left = Math.min(e.clientX - indicatorW / 2, window.innerWidth - indicatorW - 16) + 'px';
            uploadIndicator.style.top  = Math.min(e.clientY - indicatorH / 2, window.innerHeight - indicatorH - 16) + 'px';
            document.body.appendChild(uploadIndicator);

            reader.onprogress = (pe) => {
                if (!pe.lengthComputable) return;
                const bar = uploadIndicator.querySelector('.vui-bar');
                if (bar) bar.style.width = Math.round((pe.loaded / pe.total) * 100) + '%';
            };
        }

        const removeIndicator = () => {
            if (!uploadIndicator) return;
            const bar = uploadIndicator.querySelector('.vui-bar');
            if (bar) bar.style.width = '100%';
            uploadIndicator.classList.add('done');
            uploadIndicator.addEventListener('animationend', () => uploadIndicator.remove(), { once: true });
            uploadIndicator = null;
        };

        reader.onload = (ev) => {
            if (file.type.startsWith('video/')) {
                const vid = document.createElement('video');
                vid.onerror = removeIndicator;
                vid.onloadedmetadata = () => {
                    removeIndicator();
                    const maxW = 320, maxH = 320;
                    let w = vid.videoWidth, h = vid.videoHeight;
                    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
                    const data = {
                        id: 'n' + Date.now(),
                        x: Math.round(e.clientX - w / 2),
                        y: Math.round(e.clientY - h / 2),
                        text: '',
                        imageData: ev.target.result,
                        w, h,
                        manualResize: true,
                        zIndex: ++topZ,
                        page: currentPage
                    };
                    notes.push(data);
                    window._lastFileDrop = Date.now();
                    createNote(data);
                    save();
                };
                vid.src = ev.target.result;
            } else {
                const tempImg = new Image();
                tempImg.onload = () => {
                    const maxW = 320, maxH = 320;
                    let w = tempImg.naturalWidth, h = tempImg.naturalHeight;
                    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
                    const data = {
                        id: 'n' + Date.now(),
                        x: Math.round(e.clientX - w / 2),
                        y: Math.round(e.clientY - h / 2),
                        text: '',
                        imageData: ev.target.result,
                        w, h,
                        manualResize: true,
                        zIndex: ++topZ,
                        page: currentPage
                    };
                    notes.push(data);
                    window._lastFileDrop = Date.now();
                    createNote(data);
                    save();
                };
                tempImg.src = ev.target.result;
            }
        };
        reader.readAsDataURL(file);
    });

    function spawnNote(x, y, target) {
        if (
            !target.closest('.note') &&
            !target.closest('.dock-wrapper') &&
            !target.closest('.settings-panel') &&
            !target.closest('.settings-btn') &&
            !target.closest('.city-tooltip') &&
            !target.closest('.weather-tooltip') &&
            !target.closest('.note-arrow-bar') &&
            !target.closest('.search-overlay') &&
            !target.closest('.dev-modal') &&
            !target.closest('.year-bar') &&
            !target.closest('.page-dots') &&
            target.tagName !== 'BUTTON' &&
            target.tagName !== 'INPUT' &&
            target.tagName !== 'A'
        ) {
            const n = {
                id: 'n' + Date.now(),
                x: x - 40,
                y: y - 30,
                text: '',
                zIndex: ++topZ,
                page: currentPage
            };
            notes.push(n);
            createNote(n, true);
        }
    }

    window.addEventListener('dblclick', (e) => spawnNote(e.clientX, e.clientY, e.target));

    // Double-tap to create note on touch devices
    let lastTap = 0, lastTapTarget = null;
    window.addEventListener('touchend', (e) => {
        const now = Date.now();
        const t = e.changedTouches[0];
        if (now - lastTap < 300 && lastTapTarget === e.target) {
            spawnNote(t.clientX, t.clientY, e.target);
            lastTap = 0;
        } else {
            lastTap = now;
            lastTapTarget = e.target;
        }
    });

    // Escape key: exit note editing as if you clicked away
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const active = document.querySelector('.note-edit-ta');
            if (active) active.blur();
            if (document.body.classList.contains('screenshot-mode')) {
                document.body.classList.remove('screenshot-mode');
            }
            return;
        }

        // Option+D — dev mode
        if (e.altKey && (e.key.toLowerCase() === 'd' || e.key === '∂')) {
            e.preventDefault();
            document.body.classList.toggle('dev-mode');
            return;
        }

        // Direct typing — create note and start typing
        if (
            e.key.length === 1 &&
            !e.ctrlKey &&
            !e.metaKey &&
            !e.altKey &&
            !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) &&
            document.activeElement.contentEditable !== 'true' &&
            !document.body.classList.contains('screenshot-mode') &&
            !document.getElementById('search-overlay').classList.contains('show')
        ) {
            e.preventDefault();
            const cx = mousePos.x || window.innerWidth / 2;
            const cy = mousePos.y || window.innerHeight / 2;
            const n = {
                id: 'n' + Date.now(),
                x: cx - 60,
                y: cy - 30,
                text: '',
                zIndex: ++topZ,
                page: currentPage
            };
            notes.push(n);
            const noteEl = createNote(n, true);
            
            // Insert the typed character after edit mode opens
            requestAnimationFrame(() => {
                const ta = noteEl.querySelector('.note-edit-ta');
                if (ta) {
                    ta.value = e.key;
                    ta.dispatchEvent(new Event('input'));
                    ta.selectionStart = ta.selectionEnd = ta.value.length;
                    ta.focus();
                }
            });
        }
    });


    function save() {
        document.querySelectorAll('.note').forEach(el => {
            const d = notes.find(x => x.id === el.id);
            if (d) {
                // Skip hidden notes (other pages) — their rect is 0
                if (el.style.display === 'none') return;
                d.x = parseInt(el.style.left);
                d.y = parseInt(el.style.top);
                if (d.manualResize) {
                    const rect = el.getBoundingClientRect();
                    d.w = Math.ceil(rect.width);
                    d.h = Math.ceil(rect.height);
                }
                d.zIndex = el.style.zIndex;
            }
        });
        // Store media blobs in IndexedDB, keep only ref key in localStorage
        const toSave = notes.map(n => {
            if (n.imageData && n.imageData.startsWith('data:')) {
                const key = 'media_' + n.id;
                mediaDB.put(key, n.imageData);
                return { ...n, imageData: key };
            }
            return n;
        });
        localStorage.setItem('aura_notes_v3', JSON.stringify(toSave));
    }

    /* ============================================================
       MISC
    ============================================================ */
    function clearNotes() {
        notes.forEach(n => { if (n.imageData) mediaDB.del('media_' + n.id); });
        document.querySelectorAll('.note').forEach(n => n.remove());
        notes = [];
        localStorage.removeItem('aura_notes_v3');
    }

    // Track which note is being edited for the color bar
    let activeNoteRef = { note: null, data: null };

    // Dev mode — activate with ?dev in URL or Shift+F
    if (location.search.includes('dev')) {
        document.body.classList.add('dev-mode');
    }
    const devBtn    = document.getElementById('dev-export-btn');
    const devModal  = document.getElementById('dev-modal');
    const devOutput = document.getElementById('dev-modal-output');
    const devCopy   = document.getElementById('dev-modal-copy');
    const devClose  = document.getElementById('dev-modal-close');

    devBtn.addEventListener('click', () => {
        const snapshot = notes.filter(d => (d.page || 0) === currentPage).map(d => {
            const el = document.getElementById(d.id);
            const rect = el ? el.getBoundingClientRect() : null;
            return {
                id: d.id,
                x: Math.round(d.x),
                y: Math.round(d.y),
                w: rect ? Math.round(rect.width) : d.w,
                ...(d.h ? { h: d.h } : {}),
                ...(d.manualResize ? { manualResize: true } : {}),
                text: d.text,
                ...(d.color && d.color !== 'default' ? { color: d.color } : {}),
                ...(d.imageData ? { hasImage: true } : {}),
            };
        });
        devOutput.value = JSON.stringify(snapshot, null, 4);
        devModal.classList.add('open');
    });
    devCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(devOutput.value);
        devCopy.textContent = 'copied!';
        setTimeout(() => devCopy.textContent = 'copy', 1500);
    });
    devClose.addEventListener('click', () => devModal.classList.remove('open'));
    devModal.addEventListener('click', e => { if (e.target === devModal) devModal.classList.remove('open'); });

    // City display click → open settings
    document.getElementById('city-display').addEventListener('mousedown', (e) => {
        e.preventDefault();
        toggleSettings(true);
    });

    function toISO(date) {
        return date.getFullYear() + '-' +
            String(date.getMonth() + 1).padStart(2, '0') + '-' +
            String(date.getDate()).padStart(2, '0');
    }


</script>
<script src="js/weather.js"></script>
<script>
// Init — paint UI immediately, defer network calls
    initDock();
    initWeatherRow();

    updateHeader();
    updateWatermark();
    applyLang(lang);
    initWeatherPlaceholder();
    // Hydrate media from IndexedDB, then create notes
    (async function() {
        for (const n of notes.filter(n => !n.archived)) {
            if (n.imageData && n.imageData.startsWith('media_')) {
                const blob = await mediaDB.get(n.imageData);
                if (blob) n.imageData = blob;
                else n.imageData = null; // media lost
            }
            createNote(n);
            // Hide notes not on current page
            if (n.page !== currentPage) {
                const el = document.getElementById(n.id);
                if (el) el.style.display = 'none';
            }
        }
    })();
    setInterval(() => {
        updateHeader();
    }, 60000);


    // Kick off location + weather after first frame so UI is visible first
    requestAnimationFrame(() => {
        setTimeout(startLocationProcess, 0);
    });

/* ============================================================
       SETTINGS PANEL
    ============================================================ */
    // Year bar hide toggle
    (function() {
        const btn = document.getElementById('season-flip-btn');
        const key = 'aura_year_bar_hidden';
        let hidden = localStorage.getItem(key) === 'true';
        // If never set, default to shown (false)
        if (localStorage.getItem(key) === null) hidden = false;
        function apply() {
            document.documentElement.classList.toggle('year-bar-hidden', hidden);
        }
        apply();
        btn.addEventListener('click', () => {
            hidden = !hidden;
            localStorage.setItem(key, hidden);
            apply();
        });
    })();

    // App logo click (disabled)
    (function() {
        const logo = document.getElementById('app-logo');
        if (!logo) return;
        logo.addEventListener('click', () => {
            // week note disabled
        });
    })();

    // Font test switch (top-right quick-picker for testing note fonts)
    (function() {
        const wrap = document.getElementById('font-test-switch');
        if (!wrap) return;
        const key = 'aura_font_test';
        function apply(family, weight, size, btn, reflow = true) {
            document.documentElement.style.setProperty('--note-font', family);
            document.documentElement.style.setProperty('--note-weight', weight);
            if (size) document.documentElement.style.setProperty('--note-size', size);
            wrap.querySelectorAll('.ft-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            localStorage.setItem(key, JSON.stringify({ family, weight, size }));
            if (reflow && typeof reflowNotes === 'function') {
                document.fonts.ready.then(() => reflowNotes());
            }
        }
        const popup = document.getElementById('ft-popup');
        let popupTimer;
        function showPopup(text) {
            if (!popup) return;
            popup.textContent = text;
            popup.classList.add('show');
            clearTimeout(popupTimer);
            popupTimer = setTimeout(() => popup.classList.remove('show'), 1400);
        }
        wrap.addEventListener('click', (e) => {
            const btn = e.target.closest('.ft-btn');
            if (!btn) return;
            apply(btn.dataset.fontFamily, btn.dataset.fontWeight, btn.dataset.fontSize, btn);
            showPopup(btn.getAttribute('title') || '');
        });
        const saved = localStorage.getItem(key);
        if (saved) {
            try {
                const { family, weight, size } = JSON.parse(saved);
                const btn = Array.from(wrap.querySelectorAll('.ft-btn')).find(b => b.dataset.fontFamily === family && b.dataset.fontWeight === weight);
                apply(family, weight, size, btn, false);
            } catch {}
        }
    })();

    // Old dock toggle (shows greeting + weather row from legacy dock)
    (function() {
        const btn = document.getElementById('old-dock-toggle-btn');
        const key = 'aura_show_old_dock';
        let on = localStorage.getItem(key) !== 'false'; // Default to true if not explicitly disabled
        function apply() {
            document.documentElement.classList.toggle('show-old-dock', on);
            if (btn) btn.classList.toggle('active', on);
        }
        apply();
        btn.addEventListener('click', () => {
            on = !on;
            localStorage.setItem(key, on);
            apply();
        });
    })();

    // Clear legacy week-hidden state that could leave dock hidden
    localStorage.removeItem('aura_week_visible');

    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const settingsLocation = document.getElementById('settings-location');
    const settingsLocationStatus = document.getElementById('settings-location-status');

    function toggleSettings(forceOpen) {
        const willOpen = forceOpen !== undefined ? forceOpen : !settingsPanel.classList.contains('show');
        settingsPanel.classList.toggle('show', willOpen);
        settingsBtn.classList.toggle('open', willOpen);
        if (willOpen) {
            // Show current city in the input
            const cache = getLocationCache();
            settingsLocation.value = cache ? cache.city : '';
            settingsLocationStatus.textContent = cache ? cache.city : '';
        }
    }

    settingsBtn.addEventListener('click', () => toggleSettings());

    // Close settings on click outside
    document.addEventListener('mousedown', (e) => {
        if (settingsPanel.classList.contains('show') &&
            !settingsPanel.contains(e.target) &&
            !settingsBtn.contains(e.target) &&
            e.target.id !== 'city-display') {
            toggleSettings(false);
        }
    });

    // Location search
    settingsLocation.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const query = settingsLocation.value.trim();
            if (query) {
                settingsLocationStatus.textContent = 'Searching...';
                searchCity(query);
            }
        }
        if (e.key === 'Escape') toggleSettings(false);
    });

    // Temperature unit
    let tempUnit = localStorage.getItem('aura_temp_unit') || 'C';

    function applyTempUnit(unit, refetch = true) {
        tempUnit = unit;
        localStorage.setItem('aura_temp_unit', unit);
        document.querySelectorAll('#temp-toggle .settings-toggle-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.unit === unit);
        });
        if (refetch && currentLat && currentLon) fetchWeather(currentLat, currentLon, true);
    }

    document.getElementById('temp-toggle').addEventListener('click', (e) => {
        const btn = e.target.closest('.settings-toggle-btn');
        if (!btn) return;
        applyTempUnit(btn.dataset.unit);
    });

    // Note font
    const noteFonts = {
        'caveat':   "'Caveat', cursive",
        'sf-mono': "'SF Mono', 'SFMono-Regular', ui-monospace, monospace",
        'lora':     "'Lora', serif",
        'dm-mono':  "'DM Mono', monospace",
        'jetbrains-mono': "'JetBrains Mono', monospace",
        'fraunces': "'Fraunces', serif",
    };

    function reflowNotes() {
        document.querySelectorAll('.note').forEach(el => {
            const data = notes.find(n => n.id === el.id);
            if (!data || data.imageData) return;
            // Always clear fixed height so text doesn't overflow
            el.style.height = '';
            delete data.h;
            if (data.manualResize) return; // preserve user-chosen width
            delete data.w;
            el.style.width = '';
            wrapNote(el, data);
        });
        save();
    }

    function applyNoteFont(key, noReflow = false) {
        const font = noteFonts[key];
        if (!font) return;
        document.documentElement.style.setProperty('--note-font', font);
        document.body.classList.toggle('note-font-sf-mono', key === 'sf-mono');
        localStorage.setItem('aura_note_font', key);
        if (!noReflow) reflowNotes();
    }


    // Text size
    const noteSizes   = { 'XS': '18px', 'S': '21px', 'M': '25px', 'L': '28px' };
    const noteSizes1x = { 'XS': '13px', 'S': '15px', 'M': '16px', 'L': '20px' };

    function applyNoteSize(size, noReflow = false) {
        const sizes = window.devicePixelRatio > 1 ? noteSizes : noteSizes1x;
        const px = sizes[size];
        if (!px) return;
        document.documentElement.style.setProperty('--note-size', px);
        document.querySelectorAll('#text-size-toggle .settings-toggle-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.size === size);
        });
        localStorage.setItem('aura_note_size', size);
        if (!noReflow) reflowNotes();
    }

    document.getElementById('text-size-toggle').addEventListener('click', (e) => {
        const btn = e.target.closest('.settings-toggle-btn');
        if (!btn) return;
        applyNoteSize(btn.dataset.size);
    });

    // Always apply valley theme
    document.documentElement.classList.add('theme-valley');

    applyBgGeo(currentGeo, true);


    // Restore saved settings
    if (!localStorage.getItem('aura_font_reset_v1')) {
        localStorage.setItem('aura_note_font', 'caveat');
        localStorage.setItem('aura_note_size', 'M');
        localStorage.setItem('aura_font_reset_v1', '1');
    }
    applyNoteFont(localStorage.getItem('aura_note_font') || 'caveat', true);
    applyNoteSize(localStorage.getItem('aura_note_size') || 'M', true);
    // Font-test switch wins over the main font picker if set
    (function reapplyFontTest() {
        const saved = localStorage.getItem('aura_font_test');
        if (!saved) return;
        try {
            const { family, weight } = JSON.parse(saved);
            document.documentElement.style.setProperty('--note-font', family);
            document.documentElement.style.setProperty('--note-weight', weight);
        } catch {}
    })();
    applyTempUnit(tempUnit, false);

    // Reveal body — wait for fonts then show immediately
    (function revealWhenReady() {
        const show = () => document.body.classList.add('ready');
        document.fonts.ready.then(() => requestAnimationFrame(show));
        setTimeout(show, 300); // fallback
    })();

    // Snap note widths once fonts are loaded so they're stable across refreshes
    document.fonts.ready.then(() => {
        document.querySelectorAll('.note').forEach(el => {
            const data = notes.find(n => n.id === el.id);
            if (!data || data.imageData || data.manualResize) return;
            wrapNote(el, data);
        });
        save();
    });

    (function() {
        const bar = document.createElement('div');
        bar.className = 'year-bar';
        bar.innerHTML = `
            <div class="year-bar-ghost"></div>
            <div class="year-bar-fill" id="year-bar-fill"></div>
            <div class="year-bar-pct-tooltip" id="year-bar-pct-tooltip"></div>
            <div class="year-bar-marker" id="year-bar-marker">
                <div class="year-bar-label" id="year-bar-label">
                    <div class="digit-scroll-container" id="digit-scroll-container">
                        <div class="digit-scroll" id="digit-hundreds"><span>0</span><span>1</span></div>
                        <div class="digit-scroll" id="digit-tens"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div>
                        <div class="digit-scroll" id="digit-ones"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div>
                        <span class="pct-sign">%</span>
                    </div>
                    <div class="week-label" id="week-label"></div>
                </div>
                <div class="year-bar-date-tooltip" id="year-bar-date-tooltip"></div>
            </div>`;
        document.body.appendChild(bar);

        // Populate date tooltip for year bar hover
        (function updateDateTooltip() {
            const tip = document.getElementById('year-bar-date-tooltip');
            if (tip) {
                const locale = (typeof lang !== 'undefined' && lang === 'es') ? 'es-ES' : (typeof lang !== 'undefined' && lang === 'pt') ? 'pt-BR' : 'en-US';
                const now = new Date();
                tip.textContent = now.toLocaleDateString(locale, { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            }
            setTimeout(updateDateTooltip, 60000);
        })();

        const setRollingNumber = (val) => {
            const n = Math.floor(val);
            const h = Math.floor(n / 100);
            const t = Math.floor((n % 100) / 10);
            const o = n % 10;
            const hEl = document.getElementById('digit-hundreds'), tEl = document.getElementById('digit-tens'), oEl = document.getElementById('digit-ones');
            const rowH = 22;
            if (hEl) { hEl.style.width = h > 0 ? '9px' : '0'; hEl.style.opacity = h > 0 ? '1' : '0'; hEl.style.transform = `translateY(-${h * rowH}px)`; }
            if (tEl) { const showT = (h > 0 || t > 0); tEl.style.width = showT ? '9px' : '0'; tEl.style.opacity = showT ? '1' : '0'; tEl.style.transform = `translateY(-${t * rowH}px)`; }
            if (oEl) { oEl.style.transform = `translateY(-${o * rowH}px)`; }
        };

        const getWeekNumber = (d) => {
            const target = new Date(d.valueOf());
            const dayNr = (d.getDay() + 6) % 7;
            target.setDate(target.getDate() - dayNr + 3);
            const firstThursday = target.valueOf();
            target.setMonth(0, 1);
            if (target.getDay() !== 4) {
                target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
            }
            return 1 + Math.ceil((firstThursday - target) / 604800000);
        };

        const yr = new Date().getFullYear();
        const start = new Date(yr, 0, 1).getTime(), end = new Date(yr + 1, 0, 1).getTime(), span = end - start;

        // Bar mode cycling: season → year → quarter
        const MODES = ['season', 'year', 'quarter'];
        let modeIdx = parseInt(localStorage.getItem('aura_year_bar_mode_idx') || '0', 10);
        if (isNaN(modeIdx) || modeIdx < 0 || modeIdx >= MODES.length) modeIdx = 0;
        function getModeRange() {
            const now = new Date();
            const mode = MODES[modeIdx];
            if (mode === 'month') {
                return {
                    s: new Date(now.getFullYear(), now.getMonth(), 1).getTime(),
                    e: new Date(now.getFullYear(), now.getMonth() + 1, 1).getTime(),
                };
            }
            if (mode === 'season') {
                // Full year range — fill represents year progress, labels show season boundaries
                return { s: start, e: end };
            }
            if (mode === 'quarter') {
                const q = Math.floor(now.getMonth() / 3);
                return {
                    s: new Date(now.getFullYear(), q * 3, 1).getTime(),
                    e: new Date(now.getFullYear(), q * 3 + 3, 1).getTime(),
                };
            }
            if (mode === 'day') {
                const sod = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                return { s: sod, e: sod + 86400000 };
            }
            return { s: start, e: end };
        }

        // Render seasons
        const sD = [new Date(yr, 2, 20).getTime(), new Date(yr, 5, 21).getTime(), new Date(yr, 8, 22).getTime(), new Date(yr, 11, 21).getTime()];
        const seasons = [
            { name: 'Winter', s: start, e: sD[0] }, { name: 'Spring', s: sD[0], e: sD[1] }, { name: 'Summer', s: sD[1], e: sD[2] }, { name: 'Fall', s: sD[2], e: sD[3] }, { name: 'Winter', s: sD[3], e: end }
        ];
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        function clearBarLabels() {
            bar.querySelectorAll('.season-bracket, .month-name, .month-divider, .bar-mode-label, .bar-mode-divider').forEach(el => el.remove());
        }

        function renderBarLabels() {
            clearBarLabels();
            const mode = MODES[modeIdx];
            const now = new Date();

            if (mode === 'year') {
                // 12 month labels + dividers
                const curM = now.getMonth();
                months.forEach((name, i) => {
                    const mS = new Date(yr, i, 1).getTime(), mE = new Date(yr, i + 1, 1).getTime();
                    const midPct = ((mS - start) + (mE - start)) / 2 / span * 100;
                    const lbl = document.createElement('div');
                    lbl.className = 'bar-mode-label' + (i === curM ? ' current' : (i < curM ? ' past' : ''));
                    lbl.style.left = midPct + '%';
                    lbl.textContent = name;
                    bar.appendChild(lbl);
                    if (i > 0) {
                        const mStart = (mS - start) / span * 100;
                        const div = document.createElement('div');
                        div.className = 'bar-mode-divider' + (i <= curM ? ' past' : '');
                        div.style.left = mStart + '%';
                        bar.appendChild(div);
                    }
                });
            } else if (mode === 'month') {
                // All days in current month
                const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                const curDay = now.getDate();
                for (let d = 1; d <= daysInMonth; d++) {
                    const pct = (d - 1) / daysInMonth * 100;
                    const midPct = (d - 0.5) / daysInMonth * 100;
                    if (d > 1) {
                        const div = document.createElement('div');
                        div.className = 'bar-mode-divider' + (d <= curDay ? ' past' : '');
                        div.style.left = pct + '%';
                        bar.appendChild(div);
                    }
                    const lbl = document.createElement('div');
                    lbl.className = 'bar-mode-label' + (d < curDay ? ' past' : '') + (d === curDay ? ' current' : '');
                    lbl.style.left = midPct + '%';
                    lbl.textContent = d;
                    bar.appendChild(lbl);
                }
            } else if (mode === 'season') {
                // Season labels + dividers using shared bar-mode elements
                const nowT = now.getTime();
                const curSi = nowT < sD[0] ? 0 : nowT < sD[1] ? 1 : nowT < sD[2] ? 2 : nowT < sD[3] ? 3 : 4;
                seasons.forEach((s, idx) => {
                    const sP = (s.s - start) / span * 100, eP = (s.e - start) / span * 100;
                    const midPct = (sP + eP) / 2;
                    // Divider at season boundary (skip first)
                    if (idx > 0) {
                        const div = document.createElement('div');
                        div.className = 'bar-mode-divider' + (idx <= curSi ? ' past' : '');
                        div.style.left = sP + '%';
                        bar.appendChild(div);
                    }
                    // Label (skip last Winter duplicate)
                    if (idx < seasons.length - 1) {
                        const lbl = document.createElement('div');
                        lbl.className = 'bar-mode-label' + (idx === curSi ? ' current' : (idx < curSi ? ' past' : ''));
                        lbl.style.left = midPct + '%';
                        lbl.textContent = s.name;
                        bar.appendChild(lbl);
                    }
                });
            } else if (mode === 'quarter') {
                // Q1–Q4 labels + dividers
                const curQ = Math.floor(now.getMonth() / 3);
                for (let q = 0; q < 4; q++) {
                    const qS = new Date(yr, q * 3, 1).getTime();
                    const qE = new Date(yr, q * 3 + 3, 1).getTime();
                    const sPct = (qS - start) / span * 100;
                    const ePct = (qE - start) / span * 100;
                    const midPct = (sPct + ePct) / 2;
                    if (q > 0) {
                        const div = document.createElement('div');
                        div.className = 'bar-mode-divider' + (q <= curQ ? ' past' : '');
                        div.style.left = sPct + '%';
                        bar.appendChild(div);
                    }
                    const lbl = document.createElement('div');
                    lbl.className = 'bar-mode-label' + (q === curQ ? ' current' : (q < curQ ? ' past' : ''));
                    lbl.style.left = midPct + '%';
                    lbl.textContent = 'Q' + (q + 1);
                    bar.appendChild(lbl);
                }
            } else if (mode === 'day') {
                // All 24 hour labels + dividers
                const curHour = now.getHours();
                for (let h = 0; h < 24; h++) {
                    const pct = h / 24 * 100;
                    const midPct = (h + 0.5) / 24 * 100;
                    // Divider at each hour (skip 0)
                    if (h > 0) {
                        const div = document.createElement('div');
                        div.className = 'bar-mode-divider' + (h <= curHour ? ' past' : '');
                        div.style.left = pct + '%';
                        bar.appendChild(div);
                    }
                        const lbl = document.createElement('div');
                    lbl.className = 'bar-mode-label' + (h < curHour ? ' past' : '') + (h === curHour ? ' current' : '');
                    lbl.style.left = midPct + '%';
                    lbl.textContent = h;
                    bar.appendChild(lbl);
                }
                // Sunrise & sunset markers
                if (window.allSunTimes) {
                    const rise = new Date(window.allSunTimes.sunrise[0]);
                    const set = new Date(window.allSunTimes.sunset[0]);
                    const risePct = (rise.getHours() + rise.getMinutes() / 60) / 24 * 100;
                    const setPct = (set.getHours() + set.getMinutes() / 60) / 24 * 100;
                    [{ pct: risePct, label: '☀↑' }, { pct: setPct, label: '☀↓' }].forEach(m => {
                        const marker = document.createElement('div');
                        marker.className = 'bar-mode-label bar-sun-marker';
                        marker.style.left = m.pct + '%';
                        marker.textContent = m.label;
                        bar.appendChild(marker);
                    });
                }
            }
        }

        renderBarLabels();

        function update(forceRolling = false) {
            const now = Date.now();
            const yearVal = Math.max(0, Math.min(100, ((now - start) / span) * 100));
            const range = getModeRange();
            const val = Math.max(0, Math.min(100, ((now - range.s) / (range.e - range.s)) * 100));
            const fillEl = document.getElementById('year-bar-fill');
            const markerEl = document.getElementById('year-bar-marker');
            const isYear = MODES[modeIdx] === 'year';
            if (fillEl) fillEl.style.width = val.toFixed(2) + '%';
            if (markerEl) {
                markerEl.style.left = val.toFixed(2) + '%';
                markerEl.style.opacity = isYear ? '0' : '1';
            }

            setRollingNumber(val);

            const pctTip = document.getElementById('year-bar-pct-tooltip');
            if (pctTip) {
                pctTip.textContent = val.toFixed(1) + '%';
                pctTip.style.left = val.toFixed(2) + '%';
            }
        }

        // Click to cycle mode: year → month → season → day → year
        const ghostEl = bar.querySelector('.year-bar-ghost');
        if (ghostEl) {
            function cycleMode(e) {
                e.stopPropagation();
                modeIdx = (modeIdx + 1) % MODES.length;
                localStorage.setItem('aura_year_bar_mode_idx', String(modeIdx));
                renderBarLabels();
                update();
            }
            ghostEl.addEventListener('click', cycleMode);
            ghostEl.title = 'Click to cycle: season → year → quarter';

            // Also allow clicking season labels / brackets to cycle
            bar.addEventListener('click', (e) => {
                if (e.target.closest('.season-bracket') || e.target.closest('.season-label') || e.target.closest('.bar-mode-label')) {
                    cycleMode(e);
                }
            });
        }

        // Initial animation — swift CSS scroll from 0% to actual value
        const actualVal = Math.max(0, Math.min(100, ((Date.now() - start) / span) * 100));
        const fillEl = document.getElementById('year-bar-fill');
        const markerEl = document.getElementById('year-bar-marker');
        const hEl = document.getElementById('digit-hundreds');
        const tEl = document.getElementById('digit-tens');
        const oEl = document.getElementById('digit-ones');

        // Set start state at 0 with no transition
        [hEl, tEl, oEl].forEach(el => el && (el.style.transition = 'none'));
        fillEl.style.transition = 'none';
        markerEl.style.transition = 'none';
        setRollingNumber(0);
        fillEl.style.width = '0%';
        markerEl.style.left = '0%';
        void (oEl && oEl.offsetWidth); // force reflow

        // Apply swift transition then scroll to actual value
        [hEl, tEl, oEl].forEach(el => el && (el.style.transition = 'transform 1.8s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease, opacity 0.3s ease'));
        fillEl.style.transition = 'width 1.8s cubic-bezier(0.4, 0, 0.2, 1)';
        markerEl.style.transition = 'left 1.8s cubic-bezier(0.4, 0, 0.2, 1)';

        setTimeout(() => {
            setRollingNumber(actualVal);
            fillEl.style.width = actualVal.toFixed(2) + '%';
            markerEl.style.left = actualVal.toFixed(2) + '%';
            update(); // also mark past seasons
        }, 500);
        setInterval(update, 60000);
        window.updateYearBarLang = function() {};
    })();

</script>
</body>
</html>
