    /* ============================================================
       NOTES — drag + RESIZE (macOS bottom-right handle)
    ============================================================ */
    function getDayCardAtPoint(x, y) {
        const cards = document.querySelectorAll('[data-date]');
        for (const card of cards) {
            const rect = card.getBoundingClientRect();
            if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                return { card, dateStr: card.dataset.date };
            }
        }
        return null;
    }

    function positionArrowBar(noteEl) {
        const bar = document.getElementById('note-arrow-bar');
        const noteRect = noteEl.getBoundingClientRect();
        const barW = bar.offsetWidth || 300;
        const barH = bar.offsetHeight || 50;
        const gap = 10;
        const vp = { w: window.innerWidth, h: window.innerHeight };

        // Horizontal: center on note, clamped to viewport
        let left = noteRect.left + noteRect.width / 2 - barW / 2;
        left = Math.max(8, Math.min(left, vp.w - barW - 8));

        // Vertical: below if space, else above
        const spaceBelow = vp.h - noteRect.bottom - gap;
        const top = spaceBelow >= barH
            ? noteRect.bottom + gap
            : noteRect.top - gap - barH;

        bar.style.left = left + 'px';
        bar.style.top  = Math.max(8, top) + 'px';
    }

function createNote(data, autoFocus = false) {
        const note = document.createElement('div');
        note.className = 'note';
        note.id = data.id;
        note.style.left = Math.max(data.x, 20) + 'px';
        note.style.top  = Math.max(data.y, 20) + 'px';
        requestAnimationFrame(() => {
            const margin = 20;
            const nx = parseFloat(note.style.left);
            const ny = parseFloat(note.style.top);
            note.style.left = Math.min(nx, window.innerWidth  - note.offsetWidth  - margin) + 'px';
            note.style.top  = Math.min(ny, window.innerHeight - note.offsetHeight - margin) + 'px';
        });
        if (data.w) note.style.width = data.w + 'px';
        if (data.manualResize && data.h) note.style.height = data.h + 'px';
        note.style.zIndex = data.zIndex || topZ;
        if (data.color && data.color !== 'default') note.setAttribute('data-note-color', data.color);

        const content = document.createElement('div');
        content.className = 'note-content';
        content.spellcheck = false;
        note.appendChild(content);
        renderNoteContent(content, data.text || '');

// ---- IMAGE NOTE ----
        if (data.imageData) {
            note.classList.add('image-note');
            const img = document.createElement('img');
            img.className = 'note-image';
            img.src = data.imageData;
            img.draggable = false;
            img.ondragstart = () => false;
            note.insertBefore(img, content);
        }


        // ---- RESIZE HANDLE (bottom-right, iOS style) ----
        const resizeHandle = document.createElement('div');
        resizeHandle.className = 'note-resize-handle';
        // SVG arc — quarter circle matching note's 30px border-radius, convex toward corner
        // Arc: center at (4,4), radius 30, from (34,4) to (4,34), sweep clockwise
        resizeHandle.innerHTML = `<svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 33.0,11.8 A 30,30 0 0,1 11.8,33.0" stroke="transparent" stroke-width="20" stroke-linecap="round" style="pointer-events:stroke;cursor:nwse-resize"/>
          <path class="rh-fill" d="M 33.0,11.8 A 30,30 0 0,1 11.8,33.0" stroke="rgba(255,255,255,0.92)" stroke-width="7" stroke-linecap="round" style="pointer-events:none"/>
        </svg>`;
        note.appendChild(resizeHandle);

        // ---- CLOSE BUTTON (top-right) ----
        const closeBtn = document.createElement('div');
        closeBtn.className = 'note-close';
        closeBtn.innerHTML = `<svg viewBox="0 0 6 6"><line x1="1" y1="1" x2="5" y2="5"/><line x1="5" y1="1" x2="1" y2="5"/></svg>`;
        note.appendChild(closeBtn);

        closeBtn.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            data._deleted = true;
            note.remove();
            notes = notes.filter(n => n.id !== data.id);
            document.body.classList.remove('note-editing-mode');
            activeNoteRef = { note: null, data: null };
            document.querySelectorAll('.note').forEach(n => n.style.opacity = '');
            document.querySelectorAll('.note-edit-tip').forEach(el => el.remove());
            save();
        });

        document.body.appendChild(note);

        // ---- CLAMP NOTE TO VIEWPORT ----
        const clampNote = (x, y) => {
            const margin = 20;
            const w = note.offsetWidth;
            const h = note.offsetHeight;
            return {
                x: Math.min(Math.max(x, margin), window.innerWidth  - w - margin),
                y: Math.min(Math.max(y, margin), window.innerHeight - h - margin)
            };
        };

        // ---- DRAG (mouse + touch) ----
        const startDrag = (clientX, clientY) => {
            const origOx = clientX - note.offsetLeft;
            const origOy = clientY - note.offsetTop;
            note.style.zIndex = ++topZ;
            note.classList.add('dragging');
            let isNearDock = false;
            const dockEl = document.getElementById('dock');
            const SCALE_MINI = 0.65;

            const move = (cx, cy) => {
                const dockRect = dockEl.getBoundingClientRect();
                const pad = 40;
                const nearDock = cx >= dockRect.left - pad && cx <= dockRect.right + pad &&
                                 cy >= dockRect.top - pad && cy <= dockRect.bottom + pad;
                if (nearDock && !isNearDock) { isNearDock = true; note.classList.add('near-dock'); }
                else if (!nearDock && isNearDock) { isNearDock = false; note.classList.remove('near-dock'); }
                if (isNearDock) {
                    note.style.left = (cx - note.offsetWidth / 2) + 'px';
                    note.style.top  = (cy - note.offsetHeight / 2) + 'px';
                    note.style.transform = `scale(${SCALE_MINI})`;
                } else {
                    note.style.left = (cx - origOx) + 'px';
                    note.style.top  = (cy - origOy) + 'px';
                    note.style.transform = `scale(1.02)`;
                }
                document.querySelectorAll('.day-card.drag-over').forEach(c => c.classList.remove('drag-over'));
                const hit = getDayCardAtPoint(cx, cy);
                if (hit && !hit.card.classList.contains('past')) hit.card.classList.add('drag-over');
            };

            const stop = (cx, cy) => {
                note.classList.remove('dragging', 'near-dock');
                note.style.transform = '';
                document.querySelectorAll('.day-card.drag-over').forEach(c => c.classList.remove('drag-over'));
                note.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease';
                setTimeout(() => { note.style.transition = ''; }, 500);
                const clamped = clampNote(parseFloat(note.style.left), parseFloat(note.style.top));
                note.style.left = clamped.x + 'px';
                note.style.top  = clamped.y + 'px';
                save();
            };
            return { move, stop };
        };

        note.onmousedown = (e) => {
            if (e.button !== 0) return;
            if (e.target.closest('.note-resize-handle')) return;
            if (e.target.closest('.note-close')) return;
            if (note.querySelector('.note-edit-ta')) return;
            if (e.target.tagName === 'A') return;
            if (window._lastFileDrop && Date.now() - window._lastFileDrop < 400) return;
            e.preventDefault();
            const { move, stop } = startDrag(e.clientX, e.clientY);
            const cleanup = (cx, cy) => { stop(cx, cy); window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
            const onMove  = (me) => { if (me.buttons === 0) { cleanup(me.clientX, me.clientY); return; } me.preventDefault(); move(me.clientX, me.clientY); };
            const onUp    = (me) => cleanup(me.clientX, me.clientY);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        };

        note.addEventListener('touchstart', (e) => {
            if (e.target.closest('.note-resize-handle')) return;
            if (e.target.closest('.note-close')) return;
            if (note.querySelector('.note-edit-ta')) return;
            if (e.target.tagName === 'A') return;
            if (window._lastFileDrop && Date.now() - window._lastFileDrop < 400) return;
            const t = e.touches[0];
            const { move, stop } = startDrag(t.clientX, t.clientY);
            const onMove   = (te) => { te.preventDefault(); const t = te.touches[0]; move(t.clientX, t.clientY); };
            const cleanup  = () => { window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onEnd); window.removeEventListener('touchcancel', onEnd); };
            const onEnd    = (te) => { const t = te.changedTouches[0]; stop(t.clientX, t.clientY); cleanup(); };
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);
            window.addEventListener('touchcancel', onEnd);
        }, { passive: true });

        // ---- RESIZE (mousedown + touchstart on handle) ----
        function startResize(clientX, clientY) {
            const startX = clientX;
            const startY = clientY;
            const startRect = note.getBoundingClientRect();
            const startW = Math.ceil(startRect.width);
            const startH = Math.ceil(startRect.height);

            note.style.height = startH + 'px';

            const minW = 80;
            const minH = 40;
            const onMove = (me) => {
                if (me.buttons === 0) { onUp(); return; }
                const newW = Math.max(minW, startW + (me.clientX - startX));
                const newH = Math.max(minH, startH + (me.clientY - startY));
                note.style.width = newW + 'px';
                note.style.height = newH + 'px';
            };
            const onTouchMove = (te) => {
                te.preventDefault();
                const t = te.touches[0];
                const newW = Math.max(minW, startW + (t.clientX - startX));
                const newH = Math.max(minH, startH + (t.clientY - startY));
                note.style.width = newW + 'px';
                note.style.height = newH + 'px';
            };
            const onUp = () => {
                const endRect = note.getBoundingClientRect();
                data.w = Math.ceil(endRect.width);
                data.h = Math.ceil(endRect.height);
                data.manualResize = true;
                save();
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
                window.removeEventListener('touchmove', onTouchMove);
                window.removeEventListener('touchend', onUp);
                window.removeEventListener('touchcancel', onUp);
            };
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', onUp);
            window.addEventListener('touchcancel', onUp);
        }

        const rhPath = resizeHandle.querySelector('path');
        rhPath.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            startResize(e.clientX, e.clientY);
        });

        rhPath.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            e.preventDefault();
            const t = e.touches[0];
            startResize(t.clientX, t.clientY);
        }, { passive: false });

        // ---- DOUBLE CLICK TO EDIT ----
        note.ondblclick = (e) => {
            if (e.target.closest('.note-resize-handle')) return;
            if (e.target.closest('.note-delete')) return;
            if (data.imageData) { e.stopPropagation(); return; }
            if (note.classList.contains('editing')) return;
            e.stopPropagation();
            note.classList.add('editing');
            document.body.classList.add('note-editing-mode');
            activeNoteRef = { note, data };
            const activeColor = data.color || 'default';
            document.querySelectorAll('#note-arrow-bar .bar-color-dot').forEach(d =>
                d.classList.toggle('active', d.dataset.color === activeColor)
            );

            const ta = document.createElement('textarea');
            ta.className = 'note-edit-ta';
            ta.rows = 1;
            ta.value = data.text || '';
            ta.spellcheck = false;
            content.style.display = 'none';
            note.insertBefore(ta, content);

            // Tip shown only on new (empty) notes
            let tipEl = null;
            if (!data.text) {
                tipEl = document.createElement('div');
                tipEl.className = 'note-edit-tip';
                tipEl.textContent = 'shift + enter for new line';
                document.body.appendChild(tipEl);
                ta.addEventListener('input', () => { if (tipEl) { tipEl.remove(); tipEl = null; } }, { once: true });
            }

            // Mirror div to measure natural text width (longest line)
            const mirror = document.createElement('div');
            mirror.style.cssText = 'position:fixed;top:-9999px;left:-9999px;white-space:pre;visibility:hidden;pointer-events:none;';
            const taCs = getComputedStyle(ta);
            mirror.style.fontFamily = taCs.fontFamily;
            mirror.style.fontSize   = taCs.fontSize;
            mirror.style.lineHeight = taCs.lineHeight;
            document.body.appendChild(mirror);

            const NOTE_PAD = 52; // 26px padding each side
            const NOTE_MAX = 574; // max-width 600 - padding
            const NOTE_MIN = 80;

            const taResize = () => {
                if (!data.manualResize) {
                    const longestLine = (ta.value || ' ').split('\n').reduce((a, b) => a.length > b.length ? a : b, '');
                    mirror.textContent = longestLine || ' ';
                    const naturalW = mirror.getBoundingClientRect().width;
                    const edgeMax = Math.max(NOTE_MIN, window.innerWidth - data.x - 16);
                    note.style.width = Math.max(Math.min(Math.ceil(naturalW) + NOTE_PAD, NOTE_MAX + NOTE_PAD, edgeMax), NOTE_MIN) + 'px';
                }
                ta.style.height = 'auto';
                ta.style.height = ta.scrollHeight + 'px';
            };
            taResize();
            ta.focus();
            ta.setSelectionRange(ta.value.length, ta.value.length);

            ta.oninput = () => {
                taResize();
                const pos = ta.selectionStart;
                const before = ta.value.slice(0, pos);
                if (before.endsWith('- ')) {
                    ta.value = ta.value.slice(0, pos - 2) + '→ ' + ta.value.slice(pos);
                    ta.selectionStart = ta.selectionEnd = pos;
                } else if (before.endsWith('/ ')) {
                    ta.value = ta.value.slice(0, pos - 2) + '↗ ' + ta.value.slice(pos);
                    ta.selectionStart = ta.selectionEnd = pos;
                } else if (before.endsWith('->')) {
                    ta.value = ta.value.slice(0, pos - 2) + '→' + ta.value.slice(pos);
                    ta.selectionStart = ta.selectionEnd = pos - 1;
                }
            };

            ta.onkeydown = (e) => {
                if (e.key === 'Escape') { e.preventDefault(); ta.blur(); return; }
                if (e.key === 'Enter') {
                    if (e.shiftKey) {
                        // Shift+Enter: new line (with list continuation)
                        const listMode = ta.value.trimStart().startsWith('→');
                        if (listMode) {
                            e.preventDefault();
                            const pos = ta.selectionStart;
                            const currentLine = ta.value.slice(0, pos).split('\n').pop();
                            const prefix = currentLine.match(/^(→\s*)/) ? currentLine.match(/^(→\s*)/)[1] : '→ ';
                            const insert = '\n' + prefix;
                            ta.value = ta.value.slice(0, pos) + insert + ta.value.slice(ta.selectionEnd);
                            ta.selectionStart = ta.selectionEnd = pos + insert.length;
                            taResize();
                        }
                        // non-list shift+enter: browser default (inserts newline)
                    } else {
                        // Enter alone: finish editing
                        e.preventDefault();
                        ta.blur();
                    }
                }
            };

            ta.onblur = () => {
                mirror.remove();
                if (tipEl) { tipEl.remove(); tipEl = null; }
                if (data._deleted) {
                    document.body.classList.remove('note-editing-mode');
                    activeNoteRef = { note: null, data: null };
                    document.querySelectorAll('.note').forEach(n => n.style.opacity = '');
                    return;
                }
                const plainText = ta.value.trimEnd();
                ta.remove();
                content.style.display = '';
                note.classList.remove('editing');
                document.body.classList.remove('note-editing-mode');
                activeNoteRef = { note: null, data: null };
                data.text = plainText;
                renderNoteContent(content, plainText);
                document.querySelectorAll('.note').forEach(n => n.style.opacity = '');
                if (!plainText.trim()) {
                    note.remove();
                    notes = notes.filter(n => n.id !== data.id);
                    save();
                    return;
                }
                if (note.classList.contains('spotify-note')) {
                    save();
                    return;
                }
                if (!data.manualResize) {
                    note.style.width = '';
                    delete data.w;
                    requestAnimationFrame(() => {
                        if (document.getElementById(data.id)) {
                            data.w = Math.ceil(note.getBoundingClientRect().width);
                            note.style.width = data.w + 'px';
                            save();
                        }
                    });
                } else {
                    save();
                }
            };
        };

        if (autoFocus) {
            // Append to DOM first so getBoundingClientRect works, then open editor
            requestAnimationFrame(() => note.ondblclick({ target: note, stopPropagation: () => {}, closest: () => null }));
        }
    }

    // ---- IMAGE DROP FROM FILE SYSTEM ----
    window.addEventListener('dragover', (e) => {
        if (e.dataTransfer.types.includes('Files')) e.preventDefault();
    });

    window.addEventListener('drop', (e) => {
        if (e.target.closest('.dock-wrapper')) return;
        const file = Array.from(e.dataTransfer.files).find(f => f.type.startsWith('image/'));
        if (!file) return;
        e.preventDefault();

        const reader = new FileReader();
        reader.onload = (ev) => {
            const tempImg = new Image();
            tempImg.onload = () => {
                const maxW = 320, maxH = 320;
                let w = tempImg.naturalWidth, h = tempImg.naturalHeight;
                if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
                const data = {
                    id: 'n' + Date.now(),
                    x: Math.round(e.clientX - w / 2),
                    y: Math.round(e.clientY - h / 2),
                    text: '',
                    imageData: ev.target.result,
                    w, h,
                    manualResize: true,
                    zIndex: ++topZ
                };
                notes.push(data);
                window._lastFileDrop = Date.now();
                createNote(data);
                save();
            };
            tempImg.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    function spawnNote(x, y, target) {
        if (
            !target.closest('.note') &&
            !target.closest('.dock-wrapper') &&
            !target.closest('.settings-panel') &&
            !target.closest('.settings-btn') &&
            !target.closest('.bg-toggle') &&
            !target.closest('.city-tooltip') &&
            !target.closest('.weather-tooltip') &&
            !target.closest('.note-arrow-bar') &&
            !target.closest('.search-overlay') &&
            !target.closest('.dev-modal') &&
            !target.closest('.capsule') &&
            !target.closest('.year-bar') &&
            target.tagName !== 'BUTTON' &&
            target.tagName !== 'INPUT' &&
            target.tagName !== 'A'
        ) {
            const n = {
                id: 'n' + Date.now(),
                x: x - 40,
                y: y - 30,
                text: '',
                zIndex: ++topZ
            };
            notes.push(n);
            createNote(n, true);
        }
    }

    window.addEventListener('dblclick', (e) => spawnNote(e.clientX, e.clientY, e.target));

    // Double-tap to create note on touch devices
    let lastTap = 0, lastTapTarget = null;
    window.addEventListener('touchend', (e) => {
        const now = Date.now();
        const t = e.changedTouches[0];
        if (now - lastTap < 300 && lastTapTarget === e.target) {
            spawnNote(t.clientX, t.clientY, e.target);
            lastTap = 0;
        } else {
            lastTap = now;
            lastTapTarget = e.target;
        }
    });

    // Escape key: exit note editing as if you clicked away
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const active = document.querySelector('.note-edit-ta');
            if (active) active.blur();
            if (document.body.classList.contains('screenshot-mode')) {
                document.body.classList.remove('screenshot-mode');
            }
        }

        // Option+D — dev mode
        if (e.altKey && (e.key.toLowerCase() === 'd' || e.key === '∂')) {
            e.preventDefault();
            document.body.classList.toggle('dev-mode');
        }
    });


    function save() {
        document.querySelectorAll('.note').forEach(el => {
            const d = notes.find(x => x.id === el.id);
            if (d) {
                d.x = parseInt(el.style.left);
                d.y = parseInt(el.style.top);
                if (d.manualResize) {
                    const rect = el.getBoundingClientRect();
                    d.w = Math.ceil(rect.width);
                    d.h = Math.ceil(rect.height);
                }
                d.zIndex = el.style.zIndex;
            }
        });
        localStorage.setItem('aura_notes_v3', JSON.stringify(notes));
    }

    /* ============================================================
       MISC
    ============================================================ */
    function clearNotes() {
        document.querySelectorAll('.note').forEach(n => n.remove());
        notes = [];
        localStorage.removeItem('aura_notes_v3');
    }

    // Track which note is being edited for the color bar
    let activeNoteRef = { note: null, data: null };

    // Arrow bar — insert characters or change color
    document.getElementById('note-arrow-bar').addEventListener('mousedown', (e) => {
        e.preventDefault(); // don't blur the textarea
        const btn = e.target.closest('.note-arrow-btn');
        const dot = e.target.closest('.bar-color-dot');
        if (btn) {
            const ta = document.querySelector('.note-edit-ta');
            if (!ta) return;
            const pos = ta.selectionStart;
            const char = btn.dataset.insert;
            ta.value = ta.value.slice(0, pos) + char + ta.value.slice(ta.selectionEnd);
            ta.selectionStart = ta.selectionEnd = pos + char.length;
            ta.focus();
            ta.dispatchEvent(new Event('input'));
        } else if (dot && activeNoteRef.note) {
            const c = dot.dataset.color;
            const { note, data } = activeNoteRef;
            data.color = c;
            if (c && c !== 'default') {
                note.setAttribute('data-note-color', c);
            } else {
                note.removeAttribute('data-note-color');
                delete data.color;
            }
            document.querySelectorAll('#note-arrow-bar .bar-color-dot').forEach(d =>
                d.classList.toggle('active', d.dataset.color === (c || 'default'))
            );
            save();
        }
    });

    // Dev mode — activate with ?dev in URL or Shift+F
    if (location.search.includes('dev')) {
        document.body.classList.add('dev-mode');
    }
    const devBtn    = document.getElementById('dev-export-btn');
    const devModal  = document.getElementById('dev-modal');
    const devOutput = document.getElementById('dev-modal-output');
    const devCopy   = document.getElementById('dev-modal-copy');
    const devClose  = document.getElementById('dev-modal-close');

    devBtn.addEventListener('click', () => {
        const snapshot = notes.map(d => {
            const el = document.getElementById(d.id);
            const rect = el ? el.getBoundingClientRect() : null;
            return {
                id: d.id,
                x: Math.round(d.x),
                y: Math.round(d.y),
                w: rect ? Math.round(rect.width) : d.w,
                text: d.text,
                ...(d.color && d.color !== 'default' ? { color: d.color } : {}),
            };
        });
        devOutput.value = JSON.stringify(snapshot, null, 4);
        devModal.classList.add('open');
    });
    devCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(devOutput.value);
        devCopy.textContent = 'copied!';
        setTimeout(() => devCopy.textContent = 'copy', 1500);
    });
    devClose.addEventListener('click', () => devModal.classList.remove('open'));
    devModal.addEventListener('click', e => { if (e.target === devModal) devModal.classList.remove('open'); });

    // City display click → open settings
    document.getElementById('city-display').addEventListener('mousedown', (e) => {
        e.preventDefault();
        toggleSettings(true);
    });

    function toISO(date) {
        return date.getFullYear() + '-' +
            String(date.getMonth() + 1).padStart(2, '0') + '-' +
            String(date.getDate()).padStart(2, '0');
    }


</script>
<script src="js/weather.js"></script>
<script>
// Init — paint UI immediately, defer network calls
    initDock();
    initWeatherRow();

    updateTimeline();
    updateHeader();
    updateWatermark();
    applyLang(lang);
    initWeatherPlaceholder();
    notes.filter(n => !n.archived).forEach(n => {
        createNote(n);
    });
    setInterval(() => {
        updateTimeline();
        updateHeader();
    }, 10000);


    // Kick off location + weather after first frame so UI is visible first
    requestAnimationFrame(() => {
        setTimeout(startLocationProcess, 0);
    });

/* ============================================================
       SETTINGS PANEL
    ============================================================ */
    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const settingsLocation = document.getElementById('settings-location');
    const settingsLocationStatus = document.getElementById('settings-location-status');

    function toggleSettings(forceOpen) {
        const willOpen = forceOpen !== undefined ? forceOpen : !settingsPanel.classList.contains('show');
        settingsPanel.classList.toggle('show', willOpen);
        settingsBtn.classList.toggle('open', willOpen);
        if (willOpen) {
            // Show current city in the input
            const cache = getLocationCache();
            settingsLocation.value = cache ? cache.city : '';
            settingsLocationStatus.textContent = cache ? cache.city : '';
        }
    }

    settingsBtn.addEventListener('click', () => toggleSettings());

    // Close settings on click outside
    document.addEventListener('mousedown', (e) => {
        if (settingsPanel.classList.contains('show') &&
            !settingsPanel.contains(e.target) &&
            !settingsBtn.contains(e.target) &&
            e.target.id !== 'city-display') {
            toggleSettings(false);
        }
    });

    // Location search
    settingsLocation.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const query = settingsLocation.value.trim();
            if (query) {
                settingsLocationStatus.textContent = 'Searching...';
                searchCity(query);
            }
        }
        if (e.key === 'Escape') toggleSettings(false);
    });

    // Temperature unit
    let tempUnit = localStorage.getItem('aura_temp_unit') || 'C';

    function applyTempUnit(unit, refetch = true) {
        tempUnit = unit;
        localStorage.setItem('aura_temp_unit', unit);
        document.querySelectorAll('#temp-toggle .settings-toggle-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.unit === unit);
        });
        if (refetch && currentLat && currentLon) fetchWeather(currentLat, currentLon, true);
    }

    document.getElementById('temp-toggle').addEventListener('click', (e) => {
        const btn = e.target.closest('.settings-toggle-btn');
        if (!btn) return;
        applyTempUnit(btn.dataset.unit);
    });

    // Note font
    const noteFonts = {
        'caveat':   "'Caveat', cursive",
        'sf-mono': "'SF Mono', 'SFMono-Regular', ui-monospace, monospace",
        'lora':     "'Lora', serif",
        'dm-mono':  "'DM Mono', monospace",
        'jetbrains-mono': "'JetBrains Mono', monospace",
    };

    function reflowNotes() {
        document.querySelectorAll('.note').forEach(el => {
            const data = notes.find(n => n.id === el.id);
            if (data && data.imageData) return; // skip image notes
            el.style.width = '';
            el.style.height = '';
            if (data) { data.manualResize = false; delete data.w; delete data.h; }
        });
        save();
        // Re-snap widths after layout settles with new font/size
        requestAnimationFrame(() => snapNoteWidths());
    }

    function snapNoteWidths() {
        let dirty = false;
        document.querySelectorAll('.note').forEach(el => {
            const data = notes.find(n => n.id === el.id);
            if (data && data.imageData) return; // skip image notes
            if (data && !data.w) {
                data.w = Math.ceil(el.getBoundingClientRect().width);
                el.style.width = data.w + 'px';
                dirty = true;
            }
        });
        if (dirty) save();
    }

    function applyNoteFont(key, noReflow = false) {
        const font = noteFonts[key];
        if (!font) return;
        document.documentElement.style.setProperty('--note-font', font);
        document.body.classList.toggle('note-font-sf-mono', key === 'sf-mono');
        document.querySelectorAll('.font-pick').forEach(p => p.classList.remove('active'));
        document.querySelector(`.font-pick[data-font="${key}"]`)?.classList.add('active');
        localStorage.setItem('aura_note_font', key);
        if (!noReflow) reflowNotes();
    }

    document.getElementById('font-picker').addEventListener('click', (e) => {
        const pick = e.target.closest('.font-pick');
        if (!pick) return;
        applyNoteFont(pick.dataset.font);
    });

    // Text size
    const noteSizes   = { 'S': '25px', 'M': '28px', 'L': '36px' };
    const noteSizes1x = { 'S': '16px', 'M': '20px', 'L': '26px' };

    function applyNoteSize(size, noReflow = false) {
        const sizes = window.devicePixelRatio > 1 ? noteSizes : noteSizes1x;
        const px = sizes[size];
        if (!px) return;
        document.documentElement.style.setProperty('--note-size', px);
        document.querySelectorAll('#text-size-toggle .settings-toggle-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.size === size);
        });
        localStorage.setItem('aura_note_size', size);
        if (!noReflow) reflowNotes();
    }

    document.getElementById('text-size-toggle').addEventListener('click', (e) => {
        const btn = e.target.closest('.settings-toggle-btn');
        if (!btn) return;
        applyNoteSize(btn.dataset.size);
    });

    // Theme Toggle (default / cove / valley)
    const themeQuickToggle = document.getElementById('theme-quick-toggle');
    const THEMES = ['default', 'cove', 'valley', 'tahoe'];
    function applyTheme(theme) {
        document.documentElement.classList.remove('theme-cove', 'theme-valley', 'theme-tahoe');
        if (theme === 'cove') document.documentElement.classList.add('theme-cove');
        if (theme === 'valley') document.documentElement.classList.add('theme-valley');
        if (theme === 'tahoe') document.documentElement.classList.add('theme-tahoe');
        document.querySelectorAll('#ruler-toggle-picker .settings-toggle-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.theme === theme);
        });
        if (themeQuickToggle) {
            themeQuickToggle.classList.remove('toggle-cove', 'toggle-valley', 'toggle-tahoe');
            if (theme === 'cove') themeQuickToggle.classList.add('toggle-cove');
            if (theme === 'valley') themeQuickToggle.classList.add('toggle-valley');
            if (theme === 'tahoe') themeQuickToggle.classList.add('toggle-tahoe');
        }
        localStorage.setItem('aura_theme', theme);
    }

    document.getElementById('ruler-toggle-picker').addEventListener('click', (e) => {
        const btn = e.target.closest('.settings-toggle-btn');
        if (!btn || !btn.dataset.theme) return;
        applyTheme(btn.dataset.theme);
    });



    if (themeQuickToggle) {
        themeQuickToggle.addEventListener('click', () => {
            const current = localStorage.getItem('aura_theme') || 'default';
            const next = THEMES[(THEMES.indexOf(current) + 1) % THEMES.length];
            applyTheme(next);
        });
    }

    applyTheme(localStorage.getItem('aura_theme') || 'valley');

    // Geo switch handler
    const geoSwitch = document.getElementById('geo-switch');
    if (geoSwitch) {
        geoSwitch.addEventListener('click', (e) => {
            const btn = e.target.closest('.geo-switch-btn');
            if (btn) applyBgGeo(btn.dataset.geo);
        });
    }
    applyBgGeo(currentGeo, true);


    // Restore saved settings
    applyNoteFont(localStorage.getItem('aura_note_font') || 'caveat', true);
    applyNoteSize(localStorage.getItem('aura_note_size') || 'M', true);
    applyTempUnit(tempUnit, false);

    // Reveal body — wait for fonts then show immediately
    (function revealWhenReady() {
        const show = () => document.body.classList.add('ready');
        document.fonts.ready.then(() => requestAnimationFrame(show));
        setTimeout(show, 300); // fallback
    })();

    // Snap note widths once fonts are loaded so they're stable across refreshes
    document.fonts.ready.then(() => snapNoteWidths());

    /* ============================================================
       SEARCH OVERLAY — Google, ChatGPT, Claude
    ============================================================ */
    const searchOverlay = document.getElementById('search-overlay');
    const searchInput = document.getElementById('search-input');
    const engineBtns = document.querySelectorAll('.engine-btn');
    
    let currentEngine = localStorage.getItem('aura_search_engine') || 'google';

    function applyEngine(engine) {
        currentEngine = engine;
        localStorage.setItem('aura_search_engine', engine);
        engineBtns.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.engine === engine);
        });
        searchInput.placeholder = `Search with ${engine.charAt(0).toUpperCase() + engine.slice(1)}...`;
    }

    engineBtns.forEach(btn => {
        btn.addEventListener('click', () => applyEngine(btn.dataset.engine));
    });

    applyEngine(currentEngine);

    function openSearch() {
        searchOverlay.classList.add('show');
        searchInput.value = '';
        setTimeout(() => searchInput.focus(), 50);
    }

    function closeSearch() {
        searchOverlay.classList.remove('show');
    }

    function performSearch() {
        const text = searchInput.value.trim();
        if (!text) return;

        let url = '';
        const q = encodeURIComponent(text);
        if (currentEngine === 'google') {
            url = `https://www.google.com/search?q=${q}`;
        } else if (currentEngine === 'chatgpt') {
            url = `https://chatgpt.com/?q=${q}`;
        } else if (currentEngine === 'claude') {
            url = `https://claude.ai/new?q=${q}`;
        }

        if (url) {
            window.open(url, '_blank');
            closeSearch();
        }
    }

    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            performSearch();
        }
        if (e.key === 'Escape') {
            closeSearch();
        }
    });

    // Spacebar opens search — only when nothing is focused/editable
    window.addEventListener('keydown', (e) => {
        if (e.code !== 'Space') return;
        if (searchOverlay.classList.contains('show')) return;

        const tag = document.activeElement.tagName;
        const editable = document.activeElement.contentEditable === 'true';
        if (tag === 'INPUT' || tag === 'TEXTAREA' || editable) return;

        e.preventDefault();
        openSearch();
    });

    // Click outside input area closes
    searchOverlay.addEventListener('mousedown', (e) => {
        if (!e.target.closest('.search-container')) closeSearch();
    });

    (function() {
        const bar = document.createElement('div');
        bar.className = 'year-bar';
        bar.innerHTML = `
            <div class="year-bar-fill" id="year-bar-fill"></div>
            <div class="year-bar-marker" id="year-bar-marker">
                <div class="year-bar-label" id="year-bar-label">
                    <div class="digit-scroll" id="digit-hundreds"><span>0</span><span>1</span></div>
                    <div class="digit-scroll" id="digit-tens"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div>
                    <div class="digit-scroll" id="digit-ones"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div>
                    <span class="pct-sign">%</span>
                </div>
            </div>`;
        document.body.appendChild(bar);

        const setRollingNumber = (val) => {
            const n = Math.floor(val);
            const h = Math.floor(n / 100);
            const t = Math.floor((n % 100) / 10);
            const o = n % 10;
            const hEl = document.getElementById('digit-hundreds'), tEl = document.getElementById('digit-tens'), oEl = document.getElementById('digit-ones');
            if (hEl) { hEl.style.width = h > 0 ? '9px' : '0'; hEl.style.opacity = h > 0 ? '1' : '0'; hEl.style.transform = `translateY(-${h * 22}px)`; }
            if (tEl) { const showT = (h > 0 || t > 0); tEl.style.width = showT ? '9px' : '0'; tEl.style.opacity = showT ? '1' : '0'; tEl.style.transform = `translateY(-${t * 22}px)`; }
            if (oEl) { oEl.style.transform = `translateY(-${o * 22}px)`; }
        };

        const yr = new Date().getFullYear();
        const start = new Date(yr, 0, 1).getTime(), end = new Date(yr + 1, 0, 1).getTime(), span = end - start;

        // Render seasons
        const sD = [new Date(yr, 2, 20).getTime(), new Date(yr, 5, 21).getTime(), new Date(yr, 8, 22).getTime(), new Date(yr, 11, 21).getTime()];
        const seasons = [
            { name: 'Winter', s: start, e: sD[0] }, { name: 'Spring', s: sD[0], e: sD[1] }, { name: 'Summer', s: sD[1], e: sD[2] }, { name: 'Fall', s: sD[2], e: sD[3] }, { name: 'Winter', s: sD[3], e: end }
        ];
        seasons.forEach(s => {
            const sP = (s.s - start) / span * 100, eP = (s.e - start) / span * 100;
            const bracket = document.createElement('div');
            bracket.className = 'season-bracket';
            bracket.style.left = sP + '%'; bracket.style.width = (eP - sP) + '%';
            bracket.dataset.startPct = sP;
            bracket.innerHTML = `<div class="season-tick"></div><span class="season-label">${s.name}</span>`;
            bar.appendChild(bracket);
        });

        // Render months
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const curM = new Date().getMonth();
        months.forEach((name, i) => {
            const mS = new Date(yr, i, 1).getTime(), mE = new Date(yr, i + 1, 1).getTime();
            const mMid = ((mS - start) + (mE - start)) / 2 / span * 100;
            const lbl = document.createElement('div');
            lbl.className = 'month-name' + (i === curM ? ' current' : (i < curM ? ' past' : ''));
            lbl.style.left = mMid + '%'; lbl.textContent = name;
            bar.appendChild(lbl);
        });

        function update(forceRolling = false) {
            const val = Math.max(0, Math.min(100, ((Date.now() - start) / span) * 100));
            document.getElementById('year-bar-fill').style.width = val.toFixed(2) + '%';
            document.getElementById('year-bar-marker').style.left = val.toFixed(2) + '%';
            setRollingNumber(val);
            document.querySelectorAll('.season-bracket').forEach(el => {
                if (parseFloat(el.dataset.startPct) <= val) el.classList.add('past');
                else el.classList.remove('past');
            });
        }

        // Initial animation — rAF counter from 0 → actual value (slot-machine spin then decelerate)
        const actualVal = Math.max(0, Math.min(100, ((Date.now() - start) / span) * 100));
        const fillEl = document.getElementById('year-bar-fill');
        const markerEl = document.getElementById('year-bar-marker');
        const hEl = document.getElementById('digit-hundreds');
        const tEl = document.getElementById('digit-tens');
        const oEl = document.getElementById('digit-ones');

        // Disable CSS transitions — JS owns the animation
        [hEl, tEl, oEl].forEach(el => el && (el.style.transition = 'none'));
        fillEl.style.transition = 'none';
        markerEl.style.transition = 'none';
        setRollingNumber(0);
        fillEl.style.width = '0%';
        markerEl.style.left = '0%';
        void (oEl && oEl.offsetWidth); // force reflow before starting

        setTimeout(() => {
            const dur = 1600;
            const t0 = performance.now();
            const easeOut = t => t >= 1 ? 1 : 1 - Math.pow(2, -10 * t);
            (function frame(now) {
                const p = Math.min(1, (now - t0) / dur);
                const val = easeOut(p) * actualVal;
                fillEl.style.width = val.toFixed(2) + '%';
                markerEl.style.left = val.toFixed(2) + '%';
                setRollingNumber(val);
                if (p < 1) {
                    requestAnimationFrame(frame);
                } else {
                    // Snap to exact final value and re-enable transitions for minute updates
                    setRollingNumber(actualVal);
                    fillEl.style.width = actualVal.toFixed(2) + '%';
                    markerEl.style.left = actualVal.toFixed(2) + '%';
                    [hEl, tEl, oEl].forEach(el => el && (el.style.transition = ''));
                    fillEl.style.transition = '';
                    markerEl.style.transition = '';
                }
            })(performance.now());
        }, 500);
        setInterval(update, 60000);
        window.updateYearBarLang = function() {};
    })();

    // ── Sun Arc ──
    (function() {
        const NS = 'http://www.w3.org/2000/svg';
        const f  = n => n.toFixed(2);

        // ── Color helpers ──
        function lerpColor(a, b, v) {
            return [0,1,2].map(i => Math.round(a[i] + (b[i] - a[i]) * v));
        }
        const DAWN_COLOR   = [255,  88, 28];   // deep amber at horizon
        const GOLDEN_COLOR = [255, 150, 40];   // golden hour
        const PEAK_COLOR   = [255, 215, 65];   // bright yellow at noon

        function sunColor(arc) {
            // Two-stop: horizon→golden (0–0.3), golden→peak (0.3–1)
            if (arc < 0.3) return lerpColor(DAWN_COLOR,   GOLDEN_COLOR, arc / 0.3);
            return             lerpColor(GOLDEN_COLOR, PEAK_COLOR,   (arc - 0.3) / 0.7);
        }

        // ── Split quadratic bezier at t (de Casteljau) ──
        function splitQ(P0, P1, P2, t) {
            const Q0 = { x: P0.x + t*(P1.x-P0.x), y: P0.y + t*(P1.y-P0.y) };
            const Q1 = { x: P1.x + t*(P2.x-P1.x), y: P1.y + t*(P2.y-P1.y) };
            const M  = { x: Q0.x + t*(Q1.x-Q0.x), y: Q0.y + t*(Q1.y-Q0.y) };
            return { head: [P0, Q0, M], tail: [M, Q1, P2] };
        }

        // ── Extract sub-segment [ta..tb] of a quadratic bezier ──
        function bezierSeg(P0, P1, P2, ta, tb) {
            if (ta <= 0 && tb >= 1) return [P0, P1, P2];
            if (ta <= 0) return splitQ(P0, P1, P2, tb).head;
            if (tb >= 1) return splitQ(P0, P1, P2, ta).tail;
            const tail = splitQ(P0, P1, P2, ta).tail;
            return splitQ(tail[0], tail[1], tail[2], (tb - ta) / (1 - ta)).head;
        }

        // ── Arc guide SVG ──
        const bgSvg = document.createElementNS(NS, 'svg');
        bgSvg.id    = 'sun-arc-bg';
        bgSvg.setAttribute('fill', 'none');
        bgSvg.style.left = '0';
        bgSvg.style.top  = '0';

        // SVG defs — gradients for arc fade
        const defs = document.createElementNS(NS, 'defs');
        bgSvg.appendChild(defs);

        function makeGrad(id, x1pct, x2pct) {
            const g = document.createElementNS(NS, 'linearGradient');
            g.id = id;
            g.setAttribute('gradientUnits', 'userSpaceOnUse');
            g.setAttribute('x1', x1pct); g.setAttribute('y1', '0');
            g.setAttribute('x2', x2pct); g.setAttribute('y2', '0');
            const s0 = document.createElementNS(NS, 'stop');
            s0.setAttribute('offset', '0');
            const s1 = document.createElementNS(NS, 'stop');
            s1.setAttribute('offset', '1');
            g.appendChild(s0); g.appendChild(s1);
            defs.appendChild(g);
            return { grad: g, s0, s1 };
        }

        const pastGrad   = makeGrad('sa-past',   '0', '100%');
        const futureGrad = makeGrad('sa-future', '0', '100%');

        // Sky dome gradient (vertical — peak color fading down to transparent)
        const domeGrad = document.createElementNS(NS, 'linearGradient');
        domeGrad.id = 'sa-dome';
        domeGrad.setAttribute('gradientUnits', 'userSpaceOnUse');
        domeGrad.setAttribute('x1', '0'); domeGrad.setAttribute('x2', '0');
        const domeS0 = document.createElementNS(NS, 'stop');
        domeS0.setAttribute('offset', '0');
        const domeS1 = document.createElementNS(NS, 'stop');
        domeS1.setAttribute('offset', '1'); domeS1.setAttribute('stop-opacity', '0');
        domeGrad.appendChild(domeS0); domeGrad.appendChild(domeS1);
        defs.appendChild(domeGrad);

        // Clip-path for stars
        const starClip = document.createElementNS(NS, 'clipPath');
        starClip.id = 'star-clip';
        const clipPath = document.createElementNS(NS, 'path');
        starClip.appendChild(clipPath);
        defs.appendChild(starClip);

        // Sky dome fill — sits behind everything
        const domePath = document.createElementNS(NS, 'path');
        domePath.setAttribute('stroke', 'none');
        domePath.setAttribute('fill', 'url(#sa-dome)');
        bgSvg.appendChild(domePath);

        // Star group for night sky
        const starGroup = document.createElementNS(NS, 'g');
        starGroup.id = 'sky-stars';
        starGroup.style.pointerEvents = 'none';
        starGroup.setAttribute('clip-path', 'url(#star-clip)');
        bgSvg.appendChild(starGroup);

        function createStars(width, height) {
            starGroup.innerHTML = '';
            return; // No stars
            const count = 130;
            for (let i = 0; i < count; i++) {
                const star = document.createElementNS(NS, 'circle');
                const x = Math.random() * width;
                const y = Math.random() * height;
                star.setAttribute('cx', x.toFixed(1));
                star.setAttribute('cy', y.toFixed(1));
                // Mix of faint background stars and a few prominent bright ones
                const isBright = i < 8;
                star.setAttribute('r', isBright ? (Math.random() * 0.8 + 1.2).toFixed(1) : (Math.random() * 0.8 + 0.4).toFixed(1));
                star.setAttribute('fill', '#fff');
                const op = isBright ? (Math.random() * 0.35 + 0.6).toFixed(2) : (Math.random() * 0.5 + 0.15).toFixed(2);
                star.setAttribute('opacity', op);
                starGroup.appendChild(star);
            }
        }

        // Endpoint anchor dots
        const endDot0 = document.createElementNS(NS, 'circle');
        endDot0.setAttribute('r', '2'); endDot0.setAttribute('fill-opacity', '0');
        bgSvg.appendChild(endDot0);
        const endDot1 = document.createElementNS(NS, 'circle');
        endDot1.setAttribute('r', '2'); endDot1.setAttribute('fill-opacity', '0');
        bgSvg.appendChild(endDot1);

        // Hour tick group
        const tickGroup = document.createElementNS(NS, 'g');
        bgSvg.appendChild(tickGroup);

        // Glow layer (wide soft) + crisp layer for past and future wing arcs
        function makeArcPath(stroke, strokeWidth, linecap) {
            const p = document.createElementNS(NS, 'path');
            p.setAttribute('fill', 'none');
            p.setAttribute('stroke', stroke);
            p.setAttribute('stroke-width', strokeWidth);
            p.setAttribute('stroke-linecap', linecap || 'round');
            return p;
        }
        const pastPath   = makeArcPath('url(#sa-past)',   '1.6', 'round');
        const futurePath = makeArcPath('url(#sa-future)', '1.6', 'round');
        bgSvg.appendChild(pastPath);
        bgSvg.appendChild(futurePath);

        document.documentElement.appendChild(bgSvg);

        // ── Sun & Moon icon ──
        const SIZE = 28, C = SIZE / 2;
        const astroSvg = document.createElementNS(NS, 'svg');
        astroSvg.setAttribute('width', SIZE); astroSvg.setAttribute('height', SIZE);
        astroSvg.setAttribute('viewBox', `0 0 ${SIZE} ${SIZE}`);
        astroSvg.setAttribute('fill', 'none');
        astroSvg.style.display = 'block';

        // Mask for crescent moon
        const astroDefs = document.createElementNS(NS, 'defs');
        astroDefs.innerHTML = `
            <mask id="moon-mask">
                <circle cx="${C}" cy="${C}" r="${C * 0.42}" fill="white" />
                <circle cx="${(C + C * 0.38).toFixed(1)}" cy="${(C - C * 0.28).toFixed(1)}" r="${C * 0.42}" fill="black" />
            </mask>
        `;
        astroSvg.appendChild(astroDefs);

        const halo = document.createElementNS(NS, 'circle');
        halo.setAttribute('cx', C); halo.setAttribute('cy', C);
        halo.setAttribute('r', C * 0.65);
        halo.setAttribute('opacity', '0.12');
        astroSvg.appendChild(halo);

        const core = document.createElementNS(NS, 'circle');
        core.setAttribute('cx', C); core.setAttribute('cy', C);
        core.setAttribute('r', C * 0.42);
        astroSvg.appendChild(core);

        const rayGroup = document.createElementNS(NS, 'g');
        rayGroup.setAttribute('class', 'sa-rays');
        const R1 = C * 0.44, R2 = C * 0.78;
        for (let i = 0; i < 8; i++) {
            const a   = (i * Math.PI / 4) - Math.PI / 2;
            const r2i = (i % 2 === 0) ? R2 : R2 * 0.88;
            const ray = document.createElementNS(NS, 'line');
            ray.setAttribute('x1', (C + Math.cos(a) * R1).toFixed(2));
            ray.setAttribute('y1', (C + Math.sin(a) * R1).toFixed(2));
            ray.setAttribute('x2', (C + Math.cos(a) * r2i).toFixed(2));
            ray.setAttribute('y2', (C + Math.sin(a) * r2i).toFixed(2));
            ray.setAttribute('stroke-width', i % 2 === 0 ? '1.3' : '1.0');
            ray.setAttribute('stroke-linecap', 'round');
            rayGroup.appendChild(ray);
        }
        astroSvg.appendChild(rayGroup);

        const astroEl = document.createElement('div');
        astroEl.id = 'sun-arc';
        astroEl.style.opacity = '0';
        astroEl.appendChild(astroSvg);
        document.documentElement.appendChild(astroEl);

        // Atmospheric sky glow
        const skyGlow = document.createElement('div');
        skyGlow.style.cssText = 'position:fixed;pointer-events:none;z-index:596;border-radius:50%;transform:translate(-50%,-55%);transition:opacity 3s ease;opacity:0;';
        document.documentElement.appendChild(skyGlow);

        // Horizon glow
        const horizGlow = document.createElement('div');
        horizGlow.style.cssText = 'position:fixed;pointer-events:none;z-index:597;transform:translateX(-50%);transition:opacity 2.5s ease;opacity:0;';
        document.documentElement.appendChild(horizGlow);

        const starClipPath = document.querySelector('#star-clip path');

        function updateAstroArc(animate) {
            let start, end, type = 'sun';
            const now = new Date();

            if (window.allSunTimes) {
                const todayRise = new Date(window.allSunTimes.sunrise[0]);
                const todaySet  = new Date(window.allSunTimes.sunset[0]);
                const tomRise   = new Date(window.allSunTimes.sunrise[1]);
                
                if (now >= todayRise && now <= todaySet) {
                    start = todayRise; end = todaySet; type = 'sun';
                } else {
                    type = 'moon';
                    if (now > todaySet) {
                        start = todaySet; end = tomRise;
                    } else {
                        start = new Date(todayRise.getTime() - (todayRise - todaySet));
                        if (isNaN(start.getTime())) start = new Date(todayRise.getTime() - 12 * 3600000);
                        end = todayRise;
                    }
                }
            } else if (window.todaySunTimes) {
                const rise = new Date(window.todaySunTimes.rise);
                const set  = new Date(window.todaySunTimes.set);
                if (now >= rise && now <= set) {
                    start = rise; end = set; type = 'sun';
                } else {
                    type = 'moon';
                    // Approximations if we only have today's times
                    if (now > set) {
                        start = set; end = new Date(set.getTime() + 12 * 3600000);
                    } else {
                        start = new Date(rise.getTime() - 12 * 3600000); end = rise;
                    }
                }
            } else {
                return;
            }

            const dock = document.getElementById('dock');
            if (!dock) return;
            const dr = dock.getBoundingClientRect();

            const INSET = 28, LIFT = 20, GAP = 0.028;
            const effW  = dr.width - INSET * 2;
            let H       = Math.min(effW * 0.38, 160);

            // Squeeze the moon arc to be flatter
            if (type === 'moon') H *= 0.7;

            // Use transform instead of left/top for smoother resizing
            bgSvg.style.transform = `translate(${dr.left + INSET}px, ${dr.top - H - 14}px)`;
            bgSvg.setAttribute('width',  effW);
            bgSvg.setAttribute('height', H + 8);

            let t = (now - start) / (end - start);
            t = Math.max(0, Math.min(1, t));
            const arc = Math.sin(t * Math.PI);

            // Re-populate stars if needed (or if dimensions changed significantly)
            const lastH = parseFloat(starGroup.dataset.h || 0);
            if (starGroup.children.length === 0 ||
                Math.abs(parseFloat(starGroup.dataset.w || 0) - effW) > 10 ||
                Math.abs(lastH - H) > 5) {
                createStars(effW, H);
                starGroup.dataset.w = effW;
                starGroup.dataset.h = H;
            }
            starGroup.style.opacity = type === 'moon' ? (0.4 + arc * 0.5).toFixed(2) : '0';

            const P0 = { x: 0,      y: H - LIFT },
                  P1 = { x: effW/2, y: 0         },
                  P2 = { x: effW,   y: H - LIFT  };

            const DAY_COLORS   = { dawn: [255, 88, 28],   golden: [255, 150, 40],  peak: [255, 215, 65]  };
            const NIGHT_COLORS = { dawn: [130, 155, 210], golden: [175, 195, 232], peak: [212, 226, 248] };

            const C_set = type === 'sun' ? DAY_COLORS : NIGHT_COLORS;
            const color = arc < 0.3 ? lerpColor(C_set.dawn, C_set.golden, arc / 0.3) : lerpColor(C_set.golden, C_set.peak, (arc - 0.3) / 0.7);
            const colorStr = `rgb(${color})`;

            // Curved wing arcs — follow bezier, gap at icon, taper from thick→thin at tip
            const WING  = 0.32; // length of each wing in t-space
            const GAP_T = 0.038; // break around the icon
            const tA      = Math.max(0.001, t - WING - GAP_T);
            const tB      = Math.min(0.999, t + WING + GAP_T);
            const tInnerL = Math.max(0.001, t - GAP_T);
            const tInnerR = Math.min(0.999, t + GAP_T);
            const qd = seg => `M ${f(seg[0].x)},${f(seg[0].y)} Q ${f(seg[1].x)},${f(seg[1].y)} ${f(seg[2].x)},${f(seg[2].y)}`;
            pastPath.setAttribute('d',   qd(bezierSeg(P0, P1, P2, tA, tInnerL)));
            futurePath.setAttribute('d', qd(bezierSeg(P0, P1, P2, tInnerR, tB)));

            // Gradients: transparent at tip → opaque at sun-facing end
            const maxOp = type === 'moon' ? 0.45 : 0.62;
            pastGrad.s0.setAttribute('stop-color', colorStr); pastGrad.s0.setAttribute('stop-opacity', '0');
            pastGrad.s1.setAttribute('stop-color', colorStr); pastGrad.s1.setAttribute('stop-opacity', f(maxOp));
            pastGrad.grad.setAttribute('x1', f(tA * effW));      pastGrad.grad.setAttribute('x2', f(tInnerL * effW));
            futureGrad.s0.setAttribute('stop-color', colorStr); futureGrad.s0.setAttribute('stop-opacity', f(maxOp));
            futureGrad.s1.setAttribute('stop-color', colorStr); futureGrad.s1.setAttribute('stop-opacity', '0');
            futureGrad.grad.setAttribute('x1', f(tInnerR * effW)); futureGrad.grad.setAttribute('x2', f(tB * effW));

            bgSvg.style.opacity = '1';
            const domeBottom = H + 6;
            domeGrad.setAttribute('y1', '0'); domeGrad.setAttribute('y2', f(H - LIFT));
            domeS0.setAttribute('stop-color', colorStr);
            // Night dome slightly more atmospheric; day keeps a soft amber wash
            domeS0.setAttribute('stop-opacity', f(type === 'moon' ? 0.08 + arc * 0.05 : 0.1 + arc * 0.05));
            const dPath = `M ${f(P0.x)},${f(P0.y)} Q ${f(P1.x)},${f(P1.y)} ${f(P2.x)},${f(P2.y)} L ${f(P2.x)},${domeBottom} L ${f(P0.x)},${domeBottom} Z`;
            domePath.setAttribute('d', dPath);
            if (starClipPath) starClipPath.setAttribute('d', dPath);

            if (type === 'sun') {
                rayGroup.style.display = 'block';
                core.removeAttribute('mask');
                halo.style.display = 'block';
                halo.setAttribute('r', (SIZE/2) * 0.52);
                halo.setAttribute('opacity', '0.12');
            } else {
                rayGroup.style.display = 'none';
                core.setAttribute('mask', 'url(#moon-mask)');
                // Soft silver-blue halo around the moon
                halo.style.display = 'none';
                halo.setAttribute('r', (SIZE/2) * 0.80);
                halo.setAttribute('opacity', '0.18');
            }

            const x  = dr.left + INSET + t * effW;
            const By = (H - LIFT) * (1 - 2 * t * (1 - t));
            const y  = (dr.top - H - 14) + By;

            skyGlow.style.opacity   = '0';
            horizGlow.style.opacity = '0';

            halo.setAttribute('fill', colorStr);
            core.setAttribute('fill', colorStr);
            astroSvg.querySelectorAll('line').forEach(l => l.setAttribute('stroke', colorStr));

            const ga = (0.52 + arc * 0.3).toFixed(2);
            const scale = (0.76 + 0.24 * arc).toFixed(3);
            if (!animate) { astroEl.style.transition = 'none'; }
            astroEl.style.transform = `translate(${x.toFixed(1)}px, ${y.toFixed(1)}px) translate(-50%,-50%) scale(${scale})`;
            astroEl.style.filter    = `drop-shadow(0 0 ${(type === 'moon' ? 5 + arc * 8 : 6 + arc * 12).toFixed(1)}px rgba(${color},${ga}))`;
            astroEl.style.opacity   = (0.6 + arc * 0.4).toFixed(2);
            if (!animate) {
                // Force reflow so Chrome commits the current position before
                // transition is restored — prevents the fly-from-top-left glitch
                void astroEl.getBoundingClientRect();
                requestAnimationFrame(() => { astroEl.style.transition = ''; });
            }
        }

        updateAstroArc(false);
        setInterval(() => updateAstroArc(true), 60000);

        let resizeTimer;
        let resizePending = false;
        window.addEventListener('resize', () => {
            if (resizePending) return;
            resizePending = true;
            requestAnimationFrame(() => {
                updateAstroArc(false);
                resizePending = false;
            });
            
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                starGroup.innerHTML = '';
                updateAstroArc(false);
            }, 250);
        });

        const _orig = window.drawSunriseSunset;
        window.drawSunriseSunset = function() {
            if (_orig) _orig();
            setTimeout(() => updateAstroArc(false), 50);
            setTimeout(() => updateAstroArc(true),  150);
        };
    })();

    // ── Time Capsule ──
    (function() {
        const STORE = 'aura_capsules';
        const capsuleEl  = document.getElementById('capsule');
        const pill       = document.getElementById('capsule-pill');
        const textarea   = document.getElementById('capsule-textarea');
        const sendBtn    = document.getElementById('capsule-send');
        let selectedDays = 30;

        function load() { try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; } }
        function persist(arr) { localStorage.setItem(STORE, JSON.stringify(arr)); }

        // Deliver due capsules as sticky notes
        function deliver() {
            const now = Date.now();
            const all = load();
            const due = all.filter(c => c.deliverAt <= now);
            if (!due.length) return;
            persist(all.filter(c => c.deliverAt > now));
            due.forEach(c => {
                const sent = new Date(c.sentAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                const id = 'note-' + Date.now() + Math.random().toString(36).slice(2, 7);
                const note = {
                    id, archived: false, color: null,
                    x: Math.round(window.innerWidth  * 0.3 + Math.random() * window.innerWidth  * 0.3),
                    y: Math.round(window.innerHeight * 0.2 + Math.random() * window.innerHeight * 0.35),
                    text: `from ${sent}:\n\n${c.text}`
                };
                notes.push(note);
                createNote(note);
                save();
            });
        }

        // Dot indicator when pending capsules exist
        function refreshDot() {
            capsuleEl.classList.toggle('has-pending', load().length > 0);
        }

        // Toggle
        pill.addEventListener('click', () => {
            capsuleEl.classList.toggle('open');
            if (capsuleEl.classList.contains('open')) textarea.focus();
        });

        // Day selection
        document.querySelectorAll('.capsule-day-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedDays = parseInt(btn.dataset.days);
                document.querySelectorAll('.capsule-day-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Send
        sendBtn.addEventListener('click', () => {
            const text = textarea.value.trim();
            if (!text) return;
            const all = load();
            all.push({ text, sentAt: Date.now(), deliverAt: Date.now() + selectedDays * 864e5 });
            persist(all);
            textarea.value = '';
            capsuleEl.classList.remove('open');
            refreshDot();
            const label = pill.querySelector('.capsule-label');
            label.textContent = 'sealed ✓';
            setTimeout(() => label.textContent = 'capsule', 2000);
        });

        deliver();
        refreshDot();
    })();
</script>
</body>
</html>
