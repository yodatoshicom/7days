function createNote(data, autoFocus = false) {
        const note = document.createElement('div');
        note.className = 'note';
        note.id = data.id;
        note.style.left = Math.max(data.x, 20) + 'px';
        note.style.top  = Math.max(data.y, 20) + 'px';
        requestAnimationFrame(() => {
            const margin = 20;
            const nx = parseFloat(note.style.left);
            const ny = parseFloat(note.style.top);
            note.style.left = Math.min(nx, window.innerWidth  - note.offsetWidth  - margin) + 'px';
            note.style.top  = Math.min(ny, window.innerHeight - note.offsetHeight - margin) + 'px';
        });
        if (data.w) note.style.width = data.w + 'px';
        if (data.manualResize && data.h) note.style.height = data.h + 'px';
        note.style.zIndex = data.zIndex || topZ;
        if (data.color && data.color !== 'default') note.setAttribute('data-note-color', data.color);

        const content = document.createElement('div');
        content.className = 'note-content';
        content.spellcheck = false;
        note.appendChild(content);
        renderNoteContent(content, data.text || '');
        if (data.alerts && data.alerts.length) {
            requestAnimationFrame(() => renderAlertChips(note, data));
        }

// ---- IMAGE NOTE ----
        if (data.imageData) {
            note.classList.add('image-note');
            const isVideoSrc = data.imageData.startsWith('data:video/') || /\.(mov|mp4|webm|ogv|ogg)(\?.*)?$/i.test(data.imageData);
            if (isVideoSrc) {
                const vid = document.createElement('video');
                vid.className = 'note-image';
                vid.src = data.imageData;
                vid.loop = true;
                vid.muted = true;
                vid.playsInline = true;
                vid.autoplay = false;
                vid.draggable = false;
                vid.ondragstart = () => false;
                note.insertBefore(vid, content);

                const playBtn = document.createElement('button');
                playBtn.className = 'video-play-btn';
                const pauseIcon = `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>`;
                const playIcon = `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
                playBtn.innerHTML = playIcon;
                playBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (vid.paused) {
                        vid.play();
                        playBtn.innerHTML = pauseIcon;
                    } else {
                        vid.pause();
                        playBtn.innerHTML = playIcon;
                    }
                });
                note.insertBefore(playBtn, content);
            } else {
                const img = document.createElement('img');
                img.className = 'note-image';
                img.src = data.imageData;
                img.draggable = false;
                img.ondragstart = () => false;
                note.insertBefore(img, content);
            }
        }


        // ---- RESIZE HANDLE (bottom-right, iOS style) ----
        const resizeHandle = document.createElement('div');
        resizeHandle.className = 'note-resize-handle';
        // SVG arc — quarter circle matching note's 30px border-radius, convex toward corner
        // Arc: center at (4,4), radius 30, from (34,4) to (4,34), sweep clockwise
        resizeHandle.innerHTML = `<svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 33.0,11.8 A 30,30 0 0,1 11.8,33.0" stroke="transparent" stroke-width="20" stroke-linecap="round" style="pointer-events:stroke;cursor:nwse-resize"/>
          <path class="rh-fill" d="M 33.0,11.8 A 30,30 0 0,1 11.8,33.0" stroke="rgba(255,255,255,0.92)" stroke-width="7" stroke-linecap="round" style="pointer-events:none"/>
        </svg>`;
        note.appendChild(resizeHandle);

        // ---- CLOSE BUTTON (top-right) ----
        const closeBtn = document.createElement('div');
        closeBtn.className = 'note-close';
        closeBtn.innerHTML = `<svg viewBox="0 0 6 6"><line x1="1" y1="1" x2="5" y2="5"/><line x1="5" y1="1" x2="1" y2="5"/></svg>`;
        note.appendChild(closeBtn);

        closeBtn.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            cancelAlertsFor(data);
            if (data.imageData) mediaDB.del('media_' + data.id);
            data._deleted = true;
            note.remove();
            notes = notes.filter(n => n.id !== data.id);
            document.body.classList.remove('note-editing-mode');
            activeNoteRef = { note: null, data: null };
            document.querySelectorAll('.note').forEach(n => n.style.opacity = '');
            save();
        });

        document.body.appendChild(note);

        // ---- CLAMP NOTE TO VIEWPORT ----
        const clampNote = (x, y) => {
            const margin = 20;
            const w = note.offsetWidth;
            const h = note.offsetHeight;
            return {
                x: Math.min(Math.max(x, margin), window.innerWidth  - w - margin),
                y: Math.min(Math.max(y, margin), window.innerHeight - h - margin)
            };
        };

        // ---- DRAG (mouse + touch) ----
        const startDrag = (clientX, clientY) => {
            const origOx = clientX - note.offsetLeft;
            const origOy = clientY - note.offsetTop;
            note.style.zIndex = ++topZ;
            note.classList.add('dragging');
            let isNearDock = false;
            const dockEl = document.getElementById('dock');
            const SCALE_MINI = 0.65;

            // Track offsets for all selected notes
            const selectedOffsets = [];
            if (selectedNoteIds.size > 1) {
                selectedNoteIds.forEach(id => {
                    if (id === data.id) return;
                    const el = document.getElementById(id);
                    if (el) {
                        selectedOffsets.push({
                            el,
                            ox: clientX - el.offsetLeft,
                            oy: clientY - el.offsetTop
                        });
                    }
                });
            }

            const move = (cx, cy) => {
                const dockRect = dockEl.getBoundingClientRect();
                const pad = 40;
                const nearDock = cx >= dockRect.left - pad && cx <= dockRect.right + pad &&
                                 cy >= dockRect.top - pad && cy <= dockRect.bottom + pad;
                if (nearDock && !isNearDock) { isNearDock = true; note.classList.add('near-dock'); }
                else if (!nearDock && isNearDock) { isNearDock = false; note.classList.remove('near-dock'); }
                if (isNearDock) {
                    note.style.left = (cx - note.offsetWidth / 2) + 'px';
                    note.style.top  = (cy - note.offsetHeight / 2) + 'px';
                    note.style.transform = `scale(${SCALE_MINI})`;
                } else {
                    note.style.left = (cx - origOx) + 'px';
                    note.style.top  = (cy - origOy) + 'px';
                    note.style.transform = `scale(1.02)`;
                    
                    // Move all other selected notes together
                    selectedOffsets.forEach(({ el, ox, oy }) => {
                        el.style.left = (cx - ox) + 'px';
                        el.style.top = (cy - oy) + 'px';
                    });
                }
                document.querySelectorAll('.day-card.drag-over').forEach(c => c.classList.remove('drag-over'));
                const hit = getDayCardAtPoint(cx, cy);
                if (hit && !hit.card.classList.contains('past')) hit.card.classList.add('drag-over');
            };

            const stop = (cx, cy) => {
                note.classList.remove('dragging', 'near-dock');
                note.style.transform = '';
                document.querySelectorAll('.day-card.drag-over').forEach(c => c.classList.remove('drag-over'));
                note.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease';
                setTimeout(() => { note.style.transition = ''; }, 500);
                
                // Clamp all selected notes
                selectedNoteIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        const clamped = clampNote(parseFloat(el.style.left), parseFloat(el.style.top));
                        el.style.left = clamped.x + 'px';
                        el.style.top = clamped.y + 'px';
                    }
                });
                save();
            };
            return { move, stop };
        };

        note.onmousedown = (e) => {
            if (e.button !== 0) return;
            if (e.target.closest('.note-resize-handle')) return;
            if (e.target.closest('.note-close')) return;
            if (e.target.closest('.video-play-btn')) return;
            if (note.querySelector('.note-edit-ta')) return;
            if (e.target.tagName === 'A') return;
            if (window._lastFileDrop && Date.now() - window._lastFileDrop < 400) return;
            e.preventDefault();
            
            // Shift+click to toggle selection
            if (e.shiftKey) {
                toggleNoteSelection(data.id);
            } else if (!selectedNoteIds.has(data.id)) {
                // Click on unselected note - clear others and select this one
                clearSelection();
                selectedNoteIds.add(data.id);
                note.classList.add('selected');
            }
            
            const { move, stop } = startDrag(e.clientX, e.clientY);
            const cleanup = (cx, cy) => { stop(cx, cy); window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
            const onMove  = (me) => { if (me.buttons === 0) { cleanup(me.clientX, me.clientY); return; } me.preventDefault(); move(me.clientX, me.clientY); };
            const onUp    = (me) => cleanup(me.clientX, me.clientY);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        };

        note.addEventListener('touchstart', (e) => {
            if (e.target.closest('.note-resize-handle')) return;
            if (e.target.closest('.note-close')) return;
            if (e.target.closest('.video-play-btn')) return;
            if (note.querySelector('.note-edit-ta')) return;
            if (e.target.tagName === 'A') return;
            if (window._lastFileDrop && Date.now() - window._lastFileDrop < 400) return;
            const t = e.touches[0];
            const { move, stop } = startDrag(t.clientX, t.clientY);
            const onMove   = (te) => { te.preventDefault(); const t = te.touches[0]; move(t.clientX, t.clientY); };
            const cleanup  = () => { window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onEnd); window.removeEventListener('touchcancel', onEnd); };
            const onEnd    = (te) => { const t = te.changedTouches[0]; stop(t.clientX, t.clientY); cleanup(); };
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);
            window.addEventListener('touchcancel', onEnd);
        }, { passive: true });

        note.oncontextmenu = (e) => {
            e.preventDefault();
            e.stopPropagation();
            openContextMenu(e.clientX, e.clientY, note, data);
        };

        // ---- RESIZE (mousedown + touchstart on handle) ----
        function startResize(clientX, clientY) {
            const startX = clientX;
            const startY = clientY;
            const startRect = note.getBoundingClientRect();
            const startW = Math.ceil(startRect.width);
            const startH = Math.ceil(startRect.height);

            note.style.height = startH + 'px';

            const minW = 20;
            const minH = 20;
            const onMove = (me) => {
                if (me.buttons === 0) { onUp(); return; }
                const newW = Math.max(minW, startW + (me.clientX - startX));
                const newH = Math.max(minH, startH + (me.clientY - startY));
                note.style.width = newW + 'px';
                note.style.height = newH + 'px';
            };
            const onTouchMove = (te) => {
                te.preventDefault();
                const t = te.touches[0];
                const newW = Math.max(minW, startW + (t.clientX - startX));
                const newH = Math.max(minH, startH + (t.clientY - startY));
                note.style.width = newW + 'px';
                note.style.height = newH + 'px';
            };
            const onUp = () => {
                const endRect = note.getBoundingClientRect();
                data.w = Math.ceil(endRect.width);
                data.h = Math.ceil(endRect.height);
                data.manualResize = true;
                save();
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
                window.removeEventListener('touchmove', onTouchMove);
                window.removeEventListener('touchend', onUp);
                window.removeEventListener('touchcancel', onUp);
            };
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', onUp);
            window.addEventListener('touchcancel', onUp);
        }

        const rhPath = resizeHandle.querySelector('path');
        rhPath.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            startResize(e.clientX, e.clientY);
        });

        rhPath.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            e.preventDefault();
            const t = e.touches[0];
            startResize(t.clientX, t.clientY);
        }, { passive: false });

        // ---- DOUBLE CLICK TO EDIT ----
        note.ondblclick = (e) => {
            if (e.target.closest('.note-resize-handle')) return;
            if (e.target.closest('.note-delete')) return;
            if (data.imageData) { e.stopPropagation(); return; }
            if (note.classList.contains('editing')) return;
            e.stopPropagation();
            note.classList.add('editing');
            document.body.classList.add('note-editing-mode');
            activeNoteRef = { note, data };

            const ta = document.createElement('textarea');
            ta.className = 'note-edit-ta';
            ta.rows = 1;
            ta.value = data.text || '';
            ta.spellcheck = false;
            content.style.display = 'none';
            note.insertBefore(ta, content);

            // Mirror div to measure natural text width (longest line)
            const mirror = document.createElement('div');
            mirror.style.cssText = 'position:fixed;top:-9999px;left:-9999px;white-space:pre;visibility:hidden;pointer-events:none;';
            const taCs = getComputedStyle(ta);
            mirror.style.fontFamily = taCs.fontFamily;
            mirror.style.fontSize   = taCs.fontSize;
            mirror.style.lineHeight = taCs.lineHeight;
            document.body.appendChild(mirror);

            const NOTE_PAD = 32; // 16px padding each side
            const NOTE_MAX = 568; // max-width 600 - padding
            const NOTE_MIN = 80;

            const taResize = () => {
                if (!data.manualResize) {
                    const lines = (ta.value || ' ').split('\n');
                    let maxW = 0;
                    lines.forEach(line => {
                        mirror.textContent = line || ' ';
                        maxW = Math.max(maxW, mirror.getBoundingClientRect().width);
                    });
                    const edgeMax = Math.max(NOTE_MIN, window.innerWidth - data.x - 16);
                    note.style.width = Math.max(Math.min(Math.ceil(maxW) + NOTE_PAD, NOTE_MAX + NOTE_PAD, edgeMax), NOTE_MIN) + 'px';
                }
                ta.style.height = 'auto';
                ta.style.height = ta.scrollHeight + 'px';
            };
            taResize();
            ta.focus();
            ta.setSelectionRange(ta.value.length, ta.value.length);

            ta.oninput = () => {
                taResize();
                const pos = ta.selectionStart;
                const before = ta.value.slice(0, pos);
                if (before.endsWith('- ')) {
                    ta.value = ta.value.slice(0, pos - 2) + '→ ' + ta.value.slice(pos);
                    ta.selectionStart = ta.selectionEnd = pos;
                } else if (before.endsWith('/ ')) {
                    ta.value = ta.value.slice(0, pos - 2) + '↗ ' + ta.value.slice(pos);
                    ta.selectionStart = ta.selectionEnd = pos;
                } else if (before.endsWith('->')) {
                    ta.value = ta.value.slice(0, pos - 2) + '→' + ta.value.slice(pos);
                    ta.selectionStart = ta.selectionEnd = pos - 1;
                }
            };

            ta.onkeydown = (e) => {
                if (e.key === 'Escape') { e.preventDefault(); ta.blur(); return; }
                if (e.key === 'Enter') {
                    if (e.shiftKey) {
                        // Shift+Enter: new line (with list continuation)
                        const listMode = ta.value.trimStart().startsWith('→');
                        if (listMode) {
                            e.preventDefault();
                            const pos = ta.selectionStart;
                            const currentLine = ta.value.slice(0, pos).split('\n').pop();
                            const prefix = currentLine.match(/^(→\s*)/) ? currentLine.match(/^(→\s*)/)[1] : '→ ';
                            const insert = '\n' + prefix;
                            ta.value = ta.value.slice(0, pos) + insert + ta.value.slice(ta.selectionEnd);
                            ta.selectionStart = ta.selectionEnd = pos + insert.length;
                            taResize();
                        }
                        // non-list shift+enter: browser default (inserts newline)
                    } else {
                        // Enter alone: finish editing
                        e.preventDefault();
                        ta.blur();
                    }
                }
            };

            ta.onblur = () => {
                mirror.remove();
                if (data._deleted) {
                    document.body.classList.remove('note-editing-mode');
                    activeNoteRef = { note: null, data: null };
                    document.querySelectorAll('.note').forEach(n => n.style.opacity = '');
                    return;
                }
                const plainText = ta.value.trimEnd();
                ta.remove();
                content.style.display = '';
                note.classList.remove('editing');
                document.body.classList.remove('note-editing-mode');
                activeNoteRef = { note: null, data: null };
                data.text = plainText;
                processAlerts(data);
                renderNoteContent(content, data.text);
                renderAlertChips(note, data);
                document.querySelectorAll('.note').forEach(n => n.style.opacity = '');
                if (!data.text.trim() && !(data.alerts && data.alerts.length)) {
                    cancelAlertsFor(data);
                    note.remove();
                    notes = notes.filter(n => n.id !== data.id);
                    save();
                    return;
                }
                if (note.classList.contains('spotify-note')) {
                    save();
                    return;
                }
                wrapNote(note, data);
                save();
            };
        };

        if (autoFocus) {
            // Append to DOM first so getBoundingClientRect works, then open editor
            requestAnimationFrame(() => note.ondblclick({ target: note, stopPropagation: () => {}, closest: () => null }));
        }
        
        return note;
    }

    // ---- VIDEO FRAME RECOVERY ON TAB SWITCH ----
    // Primary fix: .note.image-note has backdrop-filter:none to avoid the
    // Chromium/WebKit compositing bug where video layers go blank on tab resume.
    // This handler is a secondary safety net for paused videos that still drop
    // their frame — play()+pause() forces the browser to decode and paint a frame.
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState !== 'visible') return;
        document.querySelectorAll('.note video').forEach(vid => {
            if (!vid.paused) return;
            const t = vid.currentTime;
            vid.play().then(() => {
                requestAnimationFrame(() => {
                    vid.pause();
                    vid.currentTime = t;
                });
            }).catch(() => {
                // play() blocked (e.g. no user gesture yet) — try a nudge seek
                try { vid.currentTime = t + 0.001; vid.currentTime = t; } catch (_) {}
            });
        });
    });

    // ---- IMAGE DROP FROM FILE SYSTEM ----
    window.addEventListener('dragover', (e) => {
        if (e.dataTransfer.types.includes('Files')) e.preventDefault();
    });

    window.addEventListener('drop', (e) => {
        if (e.target.closest('.dock-wrapper')) return;
        const file = Array.from(e.dataTransfer.files).find(f => f.type.startsWith('image/') || f.type.startsWith('video/'));
        if (!file) return;
        e.preventDefault();

        const reader = new FileReader();

        // Show upload progress indicator for videos
        let uploadIndicator = null;
        if (file.type.startsWith('video/')) {
            uploadIndicator = document.createElement('div');
            uploadIndicator.className = 'video-upload-indicator';
            uploadIndicator.innerHTML = `
                <div class="vui-label">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                    Reading video…
                </div>
                <div class="vui-track"><div class="vui-bar" id="vui-bar-active"></div></div>`;
            const indicatorW = 180;
            const indicatorH = 60;
            uploadIndicator.style.left = Math.min(e.clientX - indicatorW / 2, window.innerWidth - indicatorW - 16) + 'px';
            uploadIndicator.style.top  = Math.min(e.clientY - indicatorH / 2, window.innerHeight - indicatorH - 16) + 'px';
            document.body.appendChild(uploadIndicator);

            reader.onprogress = (pe) => {
                if (!pe.lengthComputable) return;
                const bar = uploadIndicator.querySelector('.vui-bar');
                if (bar) bar.style.width = Math.round((pe.loaded / pe.total) * 100) + '%';
            };
        }

        const removeIndicator = () => {
            if (!uploadIndicator) return;
            const bar = uploadIndicator.querySelector('.vui-bar');
            if (bar) bar.style.width = '100%';
            uploadIndicator.classList.add('done');
            uploadIndicator.addEventListener('animationend', () => uploadIndicator.remove(), { once: true });
            uploadIndicator = null;
        };

        reader.onload = (ev) => {
            if (file.type.startsWith('video/')) {
                const vid = document.createElement('video');
                vid.onerror = removeIndicator;
                vid.onloadedmetadata = () => {
                    removeIndicator();
                    const maxW = 320, maxH = 320;
                    let w = vid.videoWidth, h = vid.videoHeight;
                    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
                    const data = {
                        id: 'n' + Date.now(),
                        x: Math.round(e.clientX - w / 2),
                        y: Math.round(e.clientY - h / 2),
                        text: '',
                        imageData: ev.target.result,
                        w, h,
                        manualResize: true,
                        zIndex: ++topZ,
                        page: currentPage
                    };
                    notes.push(data);
                    window._lastFileDrop = Date.now();
                    createNote(data);
                    save();
                };
                vid.src = ev.target.result;
            } else {
                const tempImg = new Image();
                tempImg.onload = () => {
                    const maxW = 320, maxH = 320;
                    let w = tempImg.naturalWidth, h = tempImg.naturalHeight;
                    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
                    const data = {
                        id: 'n' + Date.now(),
                        x: Math.round(e.clientX - w / 2),
                        y: Math.round(e.clientY - h / 2),
                        text: '',
                        imageData: ev.target.result,
                        w, h,
                        manualResize: true,
                        zIndex: ++topZ,
                        page: currentPage
                    };
                    notes.push(data);
                    window._lastFileDrop = Date.now();
                    createNote(data);
                    save();
                };
                tempImg.src = ev.target.result;
            }
        };
        reader.readAsDataURL(file);
    });

    function spawnNote(x, y, target) {
        if (
            !target.closest('.note') &&
            !target.closest('.dock-wrapper') &&
            !target.closest('.settings-panel') &&
            !target.closest('.settings-btn') &&
            !target.closest('.city-tooltip') &&
            !target.closest('.weather-tooltip') &&
            !target.closest('.note-arrow-bar') &&
            !target.closest('.search-overlay') &&
            !target.closest('.dev-modal') &&
            !target.closest('.page-dots') &&
            target.tagName !== 'BUTTON' &&
            target.tagName !== 'INPUT' &&
            target.tagName !== 'A'
        ) {
            const n = {
                id: 'n' + Date.now(),
                x: x - 40,
                y: y - 30,
                text: '',
                zIndex: ++topZ,
                page: currentPage
            };
            notes.push(n);
            createNote(n, true);
        }
    }

    window.addEventListener('dblclick', (e) => spawnNote(e.clientX, e.clientY, e.target));

    // Double-tap to create note on touch devices
    let lastTap = 0, lastTapTarget = null;
    window.addEventListener('touchend', (e) => {
        const now = Date.now();
        const t = e.changedTouches[0];
        if (now - lastTap < 300 && lastTapTarget === e.target) {
            spawnNote(t.clientX, t.clientY, e.target);
            lastTap = 0;
        } else {
            lastTap = now;
            lastTapTarget = e.target;
        }
    });

    // Escape key: exit note editing as if you clicked away
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const active = document.querySelector('.note-edit-ta');
            if (active) active.blur();
            if (document.body.classList.contains('screenshot-mode')) {
                document.body.classList.remove('screenshot-mode');
            }
            return;
        }

        // Option+D — dev mode
        if (e.altKey && (e.key.toLowerCase() === 'd' || e.key === '∂')) {
            e.preventDefault();
            document.body.classList.toggle('dev-mode');
            return;
        }

        // Direct typing — create note and start typing
        if (
            e.key.length === 1 &&
            !e.ctrlKey &&
            !e.metaKey &&
            !e.altKey &&
            !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) &&
            document.activeElement.contentEditable !== 'true' &&
            !document.body.classList.contains('screenshot-mode') &&
            !document.getElementById('search-overlay').classList.contains('show')
        ) {
            e.preventDefault();
            const cx = mousePos.x || window.innerWidth / 2;
            const cy = mousePos.y || window.innerHeight / 2;
            const n = {
                id: 'n' + Date.now(),
                x: cx - 60,
                y: cy - 30,
                text: '',
                zIndex: ++topZ,
                page: currentPage
            };
            notes.push(n);
            const noteEl = createNote(n, true);
            
            // Insert the typed character after edit mode opens
            requestAnimationFrame(() => {
                const ta = noteEl.querySelector('.note-edit-ta');
                if (ta) {
                    ta.value = e.key;
                    ta.dispatchEvent(new Event('input'));
                    ta.selectionStart = ta.selectionEnd = ta.value.length;
                    ta.focus();
                }
            });
        }
    });

    /* ============================================================
       NOTE ALERTS — slash-command reminders
    ============================================================ */
    const scheduledTimers = new Map();
    const MAX_SETTIMEOUT = 24 * 24 * 60 * 60 * 1000;

    let alertAudioCtx = null;
    function playAlertChime() {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        if (!alertAudioCtx) alertAudioCtx = new Ctx();
        if (alertAudioCtx.state === 'suspended') alertAudioCtx.resume().catch(() => {});
        const ctx = alertAudioCtx;
        const t0 = ctx.currentTime;
        [880, 1320].forEach((freq, i) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'sine';
            o.frequency.value = freq;
            const start = t0 + i * 0.18;
            g.gain.setValueAtTime(0, start);
            g.gain.linearRampToValueAtTime(0.18, start + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0008, start + 0.55);
            o.connect(g).connect(ctx.destination);
            o.start(start);
            o.stop(start + 0.6);
        });
    }

    function makeAlertId() {
        return 'a' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    function parseHourSpec(h, ap) {
        h = parseInt(h, 10);
        if (!ap) return h;
        const pm = ap.toLowerCase() === 'pm';
        if (pm && h < 12) h += 12;
        if (!pm && h === 12) h = 0;
        return h;
    }

    function parseAlertsFromText(text) {
        const alerts = [];

        // /everyday at 6am [message...]  (recurring)
        text = text.replace(
            /(^|\s)\/everyday\s+at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\b([^\n]*)/gi,
            (_, pre, h, mm, ap, rest) => {
                alerts.push({
                    id: makeAlertId(), kind: 'daily',
                    hour: parseHourSpec(h, ap),
                    minute: mm ? parseInt(mm, 10) : 0,
                    text: rest.trim() || undefined
                });
                return pre;
            }
        );

        // /6am, /6:30am, /6pm tomorrow
        text = text.replace(
            /(^|\s)\/(\d{1,2})(?::(\d{2}))?(am|pm)\b(\s+tomorrow\b)?/gi,
            (_, pre, h, mm, ap, tom) => {
                const hour = parseHourSpec(h, ap);
                const minute = mm ? parseInt(mm, 10) : 0;
                const d = new Date();
                d.setHours(hour, minute, 0, 0);
                if (tom || d.getTime() <= Date.now()) d.setDate(d.getDate() + 1);
                alerts.push({ id: makeAlertId(), kind: 'once', at: d.getTime() });
                return pre;
            }
        );

        // /5s /5sec /6m /6min /2h /2hr
        text = text.replace(
            /(^|\s)\/(\d+)(sec|s|min|m|hr|h)\b/gi,
            (whole, pre, n, u) => {
                n = parseInt(n, 10);
                u = u.toLowerCase();
                const ms =
                    (u === 'sec' || u === 's') ? n * 1000 :
                    (u === 'min' || u === 'm') ? n * 60000 :
                    (u === 'hr'  || u === 'h') ? n * 3600000 : 0;
                if (!ms) return whole;
                alerts.push({ id: makeAlertId(), kind: 'once', at: Date.now() + ms });
                return pre;
            }
        );

        // /5 (bare number → minutes)
        text = text.replace(
            /(^|\s)\/(\d+)\b/g,
            (_, pre, n) => {
                alerts.push({
                    id: makeAlertId(), kind: 'once',
                    at: Date.now() + parseInt(n, 10) * 60000
                });
                return pre;
            }
        );

        text = text.replace(/[ \t]+\n/g, '\n').replace(/\n[ \t]+/g, '\n').replace(/[ \t]{2,}/g, ' ').trim();
        return { text, alerts };
    }

    function nextDailyAt(hour, minute) {
        const d = new Date();
        d.setHours(hour, minute || 0, 0, 0);
        if (d.getTime() <= Date.now()) d.setDate(d.getDate() + 1);
        return d.getTime();
    }

    function cancelAlertById(id) {
        const tid = scheduledTimers.get(id);
        if (tid) { clearTimeout(tid); scheduledTimers.delete(id); }
    }

    function cancelAlertsFor(noteData) {
        (noteData.alerts || []).forEach(a => cancelAlertById(a.id));
    }

    function fireAlert(noteData, alert) {
        const noteText = (noteData.text || '').trim();
        const detail = (alert.text || noteText.split('\n')[0] || '').trim();
        const body = detail ? detail : (noteText || 'Reminder');
        if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
            try {
                new Notification('Week Dash Reminder', {
                    body,
                    icon: 'img/favicon-192.png',
                    badge: 'img/favicon-64.png',
                    tag: 'wd-' + alert.id
                });
            } catch (_) {}
        }
        playAlertChime();
        if (alert.kind === 'daily') {
            scheduleAlert(noteData, alert);
        } else {
            noteData.alerts = (noteData.alerts || []).filter(a => a.id !== alert.id);
            const el = document.getElementById(noteData.id);
            if (el) renderAlertChips(el, noteData);
            save();
        }
    }

    function scheduleAlert(noteData, alert) {
        cancelAlertById(alert.id);
        const target = alert.kind === 'daily' ? nextDailyAt(alert.hour, alert.minute) : alert.at;
        const delay = target - Date.now();
        if (delay <= 0) {
            fireAlert(noteData, alert);
            return;
        }
        const safe = Math.min(delay, MAX_SETTIMEOUT);
        const tid = setTimeout(() => {
            scheduledTimers.delete(alert.id);
            if (safe < delay) scheduleAlert(noteData, alert);
            else              fireAlert(noteData, alert);
        }, safe);
        scheduledTimers.set(alert.id, tid);
    }

    function ensureNotifPermission() {
        if (!('Notification' in window)) return;
        if (Notification.permission === 'default') {
            Notification.requestPermission().catch(() => {});
        }
    }

    function processAlerts(noteData) {
        const { text, alerts } = parseAlertsFromText(noteData.text || '');
        if (!alerts.length) return;
        noteData.text = text;
        noteData.alerts = (noteData.alerts || []).concat(alerts);
        ensureNotifPermission();
        alerts.forEach(a => scheduleAlert(noteData, a));
    }

    function formatTime12(h, m) {
        const ap = h >= 12 ? 'pm' : 'am';
        let h12 = h % 12; if (h12 === 0) h12 = 12;
        return h12 + ':' + String(m).padStart(2, '0') + ap;
    }

    function describeAlert(a) {
        if (a.kind === 'daily') {
            return 'daily ' + formatTime12(a.hour, a.minute || 0)
                + (a.text ? ' • ' + a.text.slice(0, 24) : '');
        }
        const ms = a.at - Date.now();
        if (ms <= 0)        return 'now';
        if (ms < 60000)     return Math.round(ms / 1000) + 's';
        if (ms < 3600000)   return Math.round(ms / 60000) + 'm';
        if (ms < 86400000)  return new Date(a.at).toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
        return new Date(a.at).toLocaleString([], { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
    }

    function renderAlertChips(noteEl, noteData) {
        let dock = noteEl.querySelector('.note-alerts');
        const list = noteData.alerts || [];
        if (!list.length) {
            if (dock) dock.remove();
            return;
        }
        if (!dock) {
            dock = document.createElement('div');
            dock.className = 'note-alerts';
            noteEl.appendChild(dock);
        }
        dock.innerHTML = '';
        list.forEach(a => {
            const chip = document.createElement('span');
            chip.className = 'note-alert-chip';
            const icon = document.createElement('span');
            icon.className = 'note-alert-icon';
            icon.textContent = '⏰';
            const lbl = document.createElement('span');
            lbl.className = 'note-alert-text';
            lbl.textContent = describeAlert(a);
            chip.appendChild(icon);
            chip.appendChild(lbl);
            const x = document.createElement('button');
            x.className = 'note-alert-x';
            x.type = 'button';
            x.textContent = '×';
            x.title = 'Remove alert';
            x.addEventListener('mousedown', e => e.stopPropagation());
            x.addEventListener('click', e => {
                e.stopPropagation();
                cancelAlertById(a.id);
                noteData.alerts = (noteData.alerts || []).filter(al => al.id !== a.id);
                renderAlertChips(noteEl, noteData);
                save();
            });
            chip.appendChild(x);
            dock.appendChild(chip);
        });
    }

    function save() {
        document.querySelectorAll('.note').forEach(el => {
            const d = notes.find(x => x.id === el.id);
            if (d) {
                // Skip hidden notes (other pages) — their rect is 0
                if (el.style.display === 'none') return;
                d.x = parseInt(el.style.left);
                d.y = parseInt(el.style.top);
                if (d.manualResize) {
                    const rect = el.getBoundingClientRect();
                    d.w = Math.ceil(rect.width);
                    d.h = Math.ceil(rect.height);
                }
                d.zIndex = el.style.zIndex;
            }
        });
        // Store media blobs in IndexedDB, keep only ref key in localStorage
        const toSave = notes.map(n => {
            if (n.imageData && n.imageData.startsWith('data:')) {
                const key = 'media_' + n.id;
                mediaDB.put(key, n.imageData);
                return { ...n, imageData: key };
            }
            return n;
        });
        localStorage.setItem('aura_notes_v3', JSON.stringify(toSave));
    }

    /* ============================================================
       MISC
    ============================================================ */
    function clearNotes() {
        notes.forEach(n => { if (n.imageData) mediaDB.del('media_' + n.id); });
        document.querySelectorAll('.note').forEach(n => n.remove());
        notes = [];
        localStorage.removeItem('aura_notes_v3');
    }

    // Track which note is being edited for the color bar
    let activeNoteRef = { note: null, data: null };

    // Dev mode — activate with ?dev in URL or Shift+F
    if (location.search.includes('dev')) {
        document.body.classList.add('dev-mode');
    }
    const devBtn    = document.getElementById('dev-export-btn');
    const devModal  = document.getElementById('dev-modal');
    const devOutput = document.getElementById('dev-modal-output');
    const devCopy   = document.getElementById('dev-modal-copy');
    const devClose  = document.getElementById('dev-modal-close');

    devBtn.addEventListener('click', () => {
        const snapshot = notes.filter(d => (d.page || 0) === currentPage).map(d => {
            const el = document.getElementById(d.id);
            const rect = el ? el.getBoundingClientRect() : null;
            return {
                id: d.id,
                x: Math.round(d.x),
                y: Math.round(d.y),
                w: rect ? Math.round(rect.width) : d.w,
                ...(d.h ? { h: d.h } : {}),
                ...(d.manualResize ? { manualResize: true } : {}),
                text: d.text,
                ...(d.color && d.color !== 'default' ? { color: d.color } : {}),
                ...(d.imageData ? { hasImage: true } : {}),
            };
        });
        devOutput.value = JSON.stringify(snapshot, null, 4);
        devModal.classList.add('open');
    });
    devCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(devOutput.value);
        devCopy.textContent = 'copied!';
        setTimeout(() => devCopy.textContent = 'copy', 1500);
    });
    devClose.addEventListener('click', () => devModal.classList.remove('open'));
    devModal.addEventListener('click', e => { if (e.target === devModal) devModal.classList.remove('open'); });

    // City display click → open settings
    document.getElementById('city-display').addEventListener('mousedown', (e) => {
        e.preventDefault();
        toggleSettings(true);
    });

    function toISO(date) {
        return date.getFullYear() + '-' +
            String(date.getMonth() + 1).padStart(2, '0') + '-' +
            String(date.getDate()).padStart(2, '0');
    }


</script>
<script src="js/weather.js"></script>
<script>
// Init — paint UI immediately, defer network calls
    initDock();
    initWeatherRow();

    updateHeader();
    updateWatermark();
    applyLang(lang);
    initWeatherPlaceholder();
    // Hydrate media from IndexedDB, then create notes
    (async function() {
        for (const n of notes.filter(n => !n.archived)) {
            if (n.imageData && n.imageData.startsWith('media_')) {
                const blob = await mediaDB.get(n.imageData);
                if (blob) n.imageData = blob;
                else n.imageData = null; // media lost
            }
            createNote(n);
            if (n.alerts && n.alerts.length) {
                n.alerts.forEach(a => scheduleAlert(n, a));
            }
            // Hide notes not on current page
            if (n.page !== currentPage) {
                const el = document.getElementById(n.id);
                if (el) el.style.display = 'none';
            }
        }
    })();
    setInterval(() => {
        updateHeader();
    }, 60000);


    // Kick off location + weather after first frame so UI is visible first
    requestAnimationFrame(() => {
        setTimeout(startLocationProcess, 0);
    });

/* ============================================================
       SETTINGS PANEL
    ============================================================ */
    // App logo click — spawn a new note at the viewport center
    (function() {
        const logo = document.getElementById('app-logo');
        if (!logo) return;
        logo.addEventListener('click', () => {
            const n = {
                id: 'n' + Date.now(),
                x: window.innerWidth / 2 - 40,
                y: window.innerHeight / 2 - 30,
                text: '',
                zIndex: ++topZ,
                page: currentPage
            };
            notes.push(n);
            createNote(n, true);
        });
    })();

    // Old dock toggle (shows greeting + weather row from legacy dock)
    (function() {
        const btn = document.getElementById('old-dock-toggle-btn');
        const key = 'aura_show_old_dock';
        let on = localStorage.getItem(key) !== 'false'; // Default to true if not explicitly disabled
        function apply() {
            document.documentElement.classList.toggle('show-old-dock', on);
            if (btn) btn.classList.toggle('active', on);
        }
        apply();
        btn.addEventListener('click', () => {
            on = !on;
            localStorage.setItem(key, on);
            apply();
        });
    })();

    // Clear legacy week-hidden state that could leave dock hidden
    localStorage.removeItem('aura_week_visible');

    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const settingsLocation = document.getElementById('settings-location');
    const settingsLocationStatus = document.getElementById('settings-location-status');

    function toggleSettings(forceOpen) {
        const willOpen = forceOpen !== undefined ? forceOpen : !settingsPanel.classList.contains('show');
        settingsPanel.classList.toggle('show', willOpen);
        settingsBtn.classList.toggle('open', willOpen);
        if (willOpen) {
            // Show current city in the input
            const cache = getLocationCache();
            settingsLocation.value = cache ? cache.city : '';
            settingsLocationStatus.textContent = cache ? cache.city : '';
        }
    }

    settingsBtn.addEventListener('click', () => toggleSettings());

    // Close settings on click outside
    document.addEventListener('mousedown', (e) => {
        if (settingsPanel.classList.contains('show') &&
            !settingsPanel.contains(e.target) &&
            !settingsBtn.contains(e.target) &&
            e.target.id !== 'city-display') {
            toggleSettings(false);
        }
    });

    // Location search
    settingsLocation.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const query = settingsLocation.value.trim();
            if (query) {
                settingsLocationStatus.textContent = 'Searching...';
                searchCity(query);
            }
        }
        if (e.key === 'Escape') toggleSettings(false);
    });

    // Custom background — import / reset (IndexedDB-backed)
    const bgImportBtn = document.getElementById('bg-import-btn');
    const bgResetBtn  = document.getElementById('bg-reset-btn');
    const bgFileInput = document.getElementById('bg-file-input');

    // Minimal IndexedDB helpers — single store keyed by string
    const IDB_NAME = 'aura', IDB_STORE = 'prefs', IDB_KEY = 'customBg';
    function openIdb() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(IDB_NAME, 1);
            req.onupgradeneeded = () => {
                const db = req.result;
                if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror   = () => reject(req.error);
        });
    }
    function idbGet(key) {
        return openIdb().then(db => new Promise((resolve, reject) => {
            const tx = db.transaction(IDB_STORE, 'readonly');
            const r  = tx.objectStore(IDB_STORE).get(key);
            r.onsuccess = () => resolve(r.result);
            r.onerror   = () => reject(r.error);
        }));
    }
    function idbPut(key, value) {
        return openIdb().then(db => new Promise((resolve, reject) => {
            const tx = db.transaction(IDB_STORE, 'readwrite');
            tx.objectStore(IDB_STORE).put(value, key);
            tx.oncomplete = () => resolve();
            tx.onerror    = () => reject(tx.error);
        }));
    }
    function idbDel(key) {
        return openIdb().then(db => new Promise((resolve, reject) => {
            const tx = db.transaction(IDB_STORE, 'readwrite');
            tx.objectStore(IDB_STORE).delete(key);
            tx.oncomplete = () => resolve();
            tx.onerror    = () => reject(tx.error);
        }));
    }

    const bgVideoEl = document.getElementById('custom-bg-video');
    let customBgUrl = null; // active object URL, kept for revocation
    function applyCustomBgBlob(blob) {
        const url = URL.createObjectURL(blob);
        if (customBgUrl && customBgUrl !== url) URL.revokeObjectURL(customBgUrl);
        customBgUrl = url;
        const isVideo = (blob.type || '').startsWith('video/');
        if (isVideo) {
            document.documentElement.classList.add('has-custom-bg-video');
            document.documentElement.style.backgroundImage = 'none';
            bgVideoEl.src = url;
            // Best-effort autoplay; muted+playsinline keep this allowed in modern browsers.
            const p = bgVideoEl.play();
            if (p && p.catch) p.catch(() => {});
        } else {
            document.documentElement.classList.remove('has-custom-bg-video');
            bgVideoEl.removeAttribute('src');
            bgVideoEl.load();
            document.documentElement.style.backgroundImage = `url("${url}")`;
        }
        localStorage.setItem('aura_custom_bg_kind', isVideo ? 'video' : 'image');
        bgResetBtn.disabled = false;
    }
    function clearCustomBgUrl() {
        if (customBgUrl) { URL.revokeObjectURL(customBgUrl); customBgUrl = null; }
        document.documentElement.classList.remove('has-custom-bg-video');
        bgVideoEl.removeAttribute('src');
        bgVideoEl.load();
        document.documentElement.style.backgroundImage = ''; // restore default wallpaper
        localStorage.removeItem('aura_custom_bg_kind');
        bgResetBtn.disabled = true;
    }

    // One-time migration: old data URL in localStorage → Blob in IndexedDB
    async function migrateLegacyCustomBg() {
        const old = localStorage.getItem('aura_custom_bg');
        if (!old) return;
        try {
            const comma = old.indexOf(',');
            const meta  = old.slice(0, comma);
            const b64   = old.slice(comma + 1);
            const mime  = (meta.match(/data:([^;]+)/) || [])[1] || 'image/png';
            const bin   = atob(b64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            await idbPut(IDB_KEY, new Blob([bytes], { type: mime }));
            localStorage.setItem('aura_has_custom_bg', '1');
        } catch (_) { /* malformed — drop it */ }
        localStorage.removeItem('aura_custom_bg');
    }

    async function initCustomBg() {
        await migrateLegacyCustomBg();
        try {
            const blob = await idbGet(IDB_KEY);
            if (blob instanceof Blob) {
                localStorage.setItem('aura_has_custom_bg', '1');
                applyCustomBgBlob(blob);
            } else {
                // No saved bg — make sure the default wallpaper is visible
                // (pre-paint may have hidden it via the flag from a stale state)
                localStorage.removeItem('aura_has_custom_bg');
                clearCustomBgUrl();
            }
        } catch (_) {
            localStorage.removeItem('aura_has_custom_bg');
            clearCustomBgUrl();
        }
    }
    initCustomBg();

    bgImportBtn.addEventListener('click', () => bgFileInput.click());

    bgFileInput.addEventListener('change', async () => {
        const file = bgFileInput.files && bgFileInput.files[0];
        bgFileInput.value = ''; // allow re-picking the same file later
        if (!file) return;
        const isImage = file.type.startsWith('image/');
        const isVideo = file.type.startsWith('video/');
        if (!isImage && !isVideo) {
            alert('Please choose an image or video file.');
            return;
        }
        try {
            // Drop the previous blob first so the browser can reclaim its disk
            // space immediately rather than waiting for the put to overwrite.
            try { await idbDel(IDB_KEY); } catch (_) {}
            await idbPut(IDB_KEY, file); // File is a Blob, store as-is
            localStorage.setItem('aura_has_custom_bg', '1');
            applyCustomBgBlob(file);
        } catch (err) {
            console.error(err);
            alert(isVideo ? 'Could not save that video.' : 'Could not save that image.');
        }
    });

    bgResetBtn.addEventListener('click', async () => {
        try {
            await idbDel(IDB_KEY); // delete the blob from IndexedDB
        } catch (err) {
            console.error(err);
        }
        localStorage.removeItem('aura_has_custom_bg');
        clearCustomBgUrl();
    });

    // Temperature unit
    let tempUnit = localStorage.getItem('aura_temp_unit') || 'C';

    function applyTempUnit(unit, refetch = true) {
        tempUnit = unit;
        localStorage.setItem('aura_temp_unit', unit);
        document.querySelectorAll('#temp-toggle .settings-toggle-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.unit === unit);
        });
        if (refetch && currentLat && currentLon) fetchWeather(currentLat, currentLon, true);
    }

    document.getElementById('temp-toggle').addEventListener('click', (e) => {
        const btn = e.target.closest('.settings-toggle-btn');
        if (!btn) return;
        applyTempUnit(btn.dataset.unit);
    });

    function reflowNotes() {
        document.querySelectorAll('.note').forEach(el => {
            const data = notes.find(n => n.id === el.id);
            if (!data || data.imageData) return;
            // Always clear fixed height so text doesn't overflow
            el.style.height = '';
            delete data.h;
            if (data.manualResize) return; // preserve user-chosen width
            delete data.w;
            el.style.width = '';
            wrapNote(el, data);
        });
        save();
    }


    // Text size
    const noteSizes = { 'S': '21px', 'M': '25px', 'L': '28px' };

    function applyNoteSize(size, noReflow = false) {
        const px = noteSizes[size];
        if (!px) return;
        document.documentElement.style.setProperty('--note-size', px);
        document.querySelectorAll('#text-size-toggle .settings-toggle-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.size === size);
        });
        localStorage.setItem('aura_note_size', size);
        if (!noReflow) reflowNotes();
    }

    document.getElementById('text-size-toggle').addEventListener('click', (e) => {
        const btn = e.target.closest('.settings-toggle-btn');
        if (!btn) return;
        applyNoteSize(btn.dataset.size);
    });

    // Always apply valley theme
    document.documentElement.classList.add('theme-valley');

    applyBgGeo(currentGeo, true);


    // Restore saved settings
    if (!localStorage.getItem('aura_font_reset_v2')) {
        localStorage.setItem('aura_note_size', 'S');
        localStorage.setItem('aura_font_reset_v2', '1');
    }
    applyNoteSize(localStorage.getItem('aura_note_size') || 'S', true);
    applyTempUnit(tempUnit, false);

    // Reveal body — wait for fonts then show immediately
    (function revealWhenReady() {
        const show = () => document.body.classList.add('ready');
        document.fonts.ready.then(() => requestAnimationFrame(show));
        setTimeout(show, 300); // fallback
    })();

    // Snap note widths once fonts are loaded so they're stable across refreshes
    document.fonts.ready.then(() => {
        document.querySelectorAll('.note').forEach(el => {
            const data = notes.find(n => n.id === el.id);
            if (!data || data.imageData || data.manualResize) return;
            wrapNote(el, data);
        });
        save();
    });


    (function setupTimebar() {
        const bar = document.createElement('div');
        bar.className = 'timebar';
        const inner = document.createElement('div');
        inner.className = 'timebar-inner';
        bar.appendChild(inner);
        document.body.appendChild(bar);

        const BASE_H = 30;
        const TODAY_H = 44;
        const MAX_H = 56;
        const RADIUS_DAYS = 2.6; // half-width of magnifier in day-widths
        const EVENT_COLORS = ['#6aa9ff', '#7dd3fc', '#60a5fa', '#818cf8', '#a5b4fc'];

        let days = [];
        let pointerX = 0;
        let magnifying = false;
        let raf = null;
        let builtKey = '';

        // Saved day-range events (vacations, etc.)
        let timebarEvents = [];
        try { timebarEvents = JSON.parse(localStorage.getItem('aura_timebar_events') || '[]'); } catch (_) {}
        const saveEvents = () => localStorage.setItem('aura_timebar_events', JSON.stringify(timebarEvents));

        const ymdFor = (y, m, d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const eventsCovering = (ymd) => timebarEvents.filter(e => ymd >= e.start && ymd <= e.end);
        const colorForEvent = (id) => {
            let h = 0;
            for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
            return EVENT_COLORS[h % EVENT_COLORS.length];
        };
        const hexToRgba = (hex, a) => {
            const n = parseInt(hex.slice(1), 16);
            return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
        };

        // Drag-select state
        let selecting = false;
        let selectAnchor = -1, selectCurrent = -1;
        let selectStartX = 0, selectStartY = 0;

        // Single shared popover + tooltip
        let popover = null;
        let tooltipEl = null;

        const dayKey = () => {
            const n = new Date();
            return `${n.getFullYear()}-${n.getMonth()}-${n.getDate()}`;
        };
        function rebuildIfDateChanged() {
            if (dayKey() !== builtKey) build();
        }

        function build() {
            const now = new Date();
            const todayDate = now.getDate();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const locale = (typeof lang !== 'undefined' && lang === 'es') ? 'es-ES' : (typeof lang !== 'undefined' && lang === 'pt') ? 'pt-BR' : 'en-US';
            const fmtWd = (date) => date.toLocaleDateString(locale, { weekday: 'short' })
                .replace(/\.$/, '').slice(0, 3).toUpperCase();
            inner.innerHTML = '';
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(now.getFullYear(), now.getMonth(), d);
                const wdShort = fmtWd(date);
                const el = document.createElement('div');
                el.className = 'timebar-day';
                el.dataset.wd = wdShort;
                const num = document.createElement('span');
                num.className = 'timebar-day-num';
                num.textContent = d;
                const wd = document.createElement('span');
                wd.className = 'timebar-day-wd';
                wd.textContent = wdShort;
                el.append(num, wd);
                if (d === todayDate) el.classList.add('is-today');
                // Current-week band — today + the next 6 days (clipped to month end).
                // Each week day also gets a weather-emoji slot that floats above the
                // pill; setupWeather() fills these in once the forecast lands.
                const isThisWeek = (d >= todayDate && d < todayDate + 7);
                if (isThisWeek) {
                    el.classList.add('is-this-week');
                    const wx = document.createElement('span');
                    wx.className = 'timebar-day-weather';
                    wx.dataset.ymd = ymdFor(now.getFullYear(), now.getMonth(), d);
                    el.appendChild(wx);
                }
                inner.appendChild(el);
            }
            days = Array.from(inner.querySelectorAll('.timebar-day'));
            builtKey = dayKey();
            applyEventStyles();
            applyHeights();
            if (window.applyTimebarWeather) window.applyTimebarWeather();
            bar.classList.add('ready');
        }
        window.updateTimebarLang = build;

        function applyEventStyles() {
            const now = new Date();
            days.forEach((dayEl, idx) => {
                const ymd = ymdFor(now.getFullYear(), now.getMonth(), idx + 1);
                const evs = eventsCovering(ymd);
                if (evs.length) {
                    const hex = colorForEvent(evs[0].id);
                    dayEl.classList.add('has-event');
                    dayEl.style.setProperty('--event-bg',      hexToRgba(hex, 0.36));
                    dayEl.style.setProperty('--event-bg-fade', hexToRgba(hex, 0.14));
                    dayEl.style.setProperty('--event-border',  hexToRgba(hex, 0.75));
                    dayEl.style.setProperty('--event-glow',    hexToRgba(hex, 0.32));
                } else {
                    dayEl.classList.remove('has-event');
                    dayEl.style.removeProperty('--event-bg');
                    dayEl.style.removeProperty('--event-bg-fade');
                    dayEl.style.removeProperty('--event-border');
                    dayEl.style.removeProperty('--event-glow');
                }
            });
        }

        function clearSelectionMarks() {
            days.forEach(d => d.classList.remove('is-selecting'));
        }
        function paintSelection() {
            clearSelectionMarks();
            const lo = Math.min(selectAnchor, selectCurrent);
            const hi = Math.max(selectAnchor, selectCurrent);
            for (let i = lo; i <= hi; i++) days[i]?.classList.add('is-selecting');
        }

        function ensureTooltip() {
            if (tooltipEl) return tooltipEl;
            tooltipEl = document.createElement('div');
            tooltipEl.className = 'timebar-event-tooltip';
            document.body.appendChild(tooltipEl);
            return tooltipEl;
        }
        function showTooltip(text, anchorEl, accentHex) {
            const t = ensureTooltip();
            t.textContent = text;
            // Apply accent color before measuring so width is final
            if (accentHex) {
                t.style.setProperty('--tt-accent', hexToRgba(accentHex, 0.95));
            } else {
                t.style.removeProperty('--tt-accent');
            }
            t.classList.add('visible');
            const r = anchorEl.getBoundingClientRect();
            // Measure after content + styles set
            const tw = t.offsetWidth;
            const anchorCx = r.left + r.width / 2;
            const left = Math.max(8, Math.min(window.innerWidth - tw - 8, anchorCx - tw / 2));
            t.style.left = left + 'px';
            t.style.bottom = (window.innerHeight - r.top + 8) + 'px';
            // Keep caret pointed at the pill even when tooltip is clipped to viewport edge
            const caretX = Math.max(10, Math.min(tw - 10, anchorCx - left));
            t.style.setProperty('--caret-x', caretX + 'px');
        }
        function hideTooltip() {
            if (tooltipEl) tooltipEl.classList.remove('visible');
        }

        function closePopover() {
            if (popover) { popover.remove(); popover = null; }
        }
        function openEventPopover(ev, anchorEl, isNew) {
            closePopover();
            hideTooltip();
            popover = document.createElement('div');
            popover.className = 'timebar-event-popover';

            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Event title';
            input.value = ev.text || '';
            popover.appendChild(input);

            const del = document.createElement('button');
            del.type = 'button';
            del.textContent = '×';
            del.title = isNew ? 'Cancel' : 'Delete event';
            popover.appendChild(del);

            document.body.appendChild(popover);
            const r = anchorEl.getBoundingClientRect();
            const pw = popover.offsetWidth;
            popover.style.left = Math.max(8, Math.min(window.innerWidth - pw - 8, r.left + r.width/2 - pw/2)) + 'px';
            popover.style.bottom = (window.innerHeight - r.top + 8) + 'px';
            requestAnimationFrame(() => input.focus());

            let committed = false;
            const commit = () => {
                if (committed) return;
                committed = true;
                const text = input.value.trim();
                if (!text) {
                    timebarEvents = timebarEvents.filter(e => e.id !== ev.id);
                } else {
                    const existing = timebarEvents.find(e => e.id === ev.id);
                    if (existing) existing.text = text;
                    else { ev.text = text; timebarEvents.push(ev); }
                }
                saveEvents();
                applyEventStyles();
                clearSelectionMarks();
                closePopover();
            };
            const cancel = () => {
                if (committed) return;
                committed = true;
                if (isNew) timebarEvents = timebarEvents.filter(e => e.id !== ev.id);
                clearSelectionMarks();
                closePopover();
            };
            const remove = () => {
                committed = true;
                timebarEvents = timebarEvents.filter(e => e.id !== ev.id);
                saveEvents();
                applyEventStyles();
                clearSelectionMarks();
                closePopover();
            };

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter')      { e.preventDefault(); commit(); }
                else if (e.key === 'Escape'){ e.preventDefault(); cancel(); }
            });
            input.addEventListener('blur', () => {
                // Defer so a click on the delete button can run first
                setTimeout(() => { if (!committed) commit(); }, 0);
            });
            del.addEventListener('mousedown', (e) => e.preventDefault());
            del.addEventListener('click', () => { isNew ? cancel() : remove(); });
        }

        function applyHeights() {
            if (!days.length) return;
            const refDay = days[0];
            const dayW = refDay.getBoundingClientRect().width;
            const radius = RADIUS_DAYS * dayW;
            for (const day of days) {
                const r = day.getBoundingClientRect();
                const cx = r.left + r.width / 2;
                const minH = day.classList.contains('is-today') ? TODAY_H : BASE_H;
                let h = minH;
                if (magnifying) {
                    const d = Math.abs(cx - pointerX);
                    if (d < radius) {
                        const factor = (1 + Math.cos(Math.PI * d / radius)) / 2;
                        h = Math.max(minH, BASE_H + (MAX_H - BASE_H) * factor);
                    }
                }
                day.style.height = h + 'px';
            }
        }

        function schedule() {
            if (raf) return;
            raf = requestAnimationFrame(() => {
                raf = null;
                applyHeights();
            });
        }

        inner.addEventListener('pointermove', e => {
            // Treat coarse pointers (touch) as taps — don't engage magnifier
            if (e.pointerType === 'touch') return;
            pointerX = e.clientX;
            if (!selecting) {
                if (!magnifying) {
                    magnifying = true;
                    inner.classList.add('is-magnifying');
                }
                schedule();

                // Hover tooltip for event days (weekday is shown inside the pill itself)
                const dayEl = e.target.closest && e.target.closest('.timebar-day');
                if (dayEl && dayEl.classList.contains('has-event')) {
                    const idx = days.indexOf(dayEl);
                    if (idx !== -1) {
                        const now = new Date();
                        const ymd = ymdFor(now.getFullYear(), now.getMonth(), idx + 1);
                        const evs = eventsCovering(ymd);
                        if (evs.length) showTooltip(evs.map(ev => ev.text).join(' • '), dayEl, colorForEvent(evs[0].id));
                        else hideTooltip();
                    }
                } else {
                    hideTooltip();
                }
            }
        });
        inner.addEventListener('pointerleave', () => {
            hideTooltip();
            if (!magnifying) return;
            magnifying = false;
            inner.classList.remove('is-magnifying');
            schedule();
        });

        // Drag-select to create/edit event
        inner.addEventListener('pointerdown', (e) => {
            if (e.button !== undefined && e.button !== 0) return;
            const dayEl = e.target.closest && e.target.closest('.timebar-day');
            if (!dayEl) return;
            const idx = days.indexOf(dayEl);
            if (idx === -1) return;
            selecting = true;
            selectAnchor = idx;
            selectCurrent = idx;
            selectStartX = e.clientX;
            selectStartY = e.clientY;
            magnifying = false;
            inner.classList.remove('is-magnifying');
            hideTooltip();
            paintSelection();
            try { inner.setPointerCapture(e.pointerId); } catch (_) {}
        });
        document.addEventListener('pointermove', (e) => {
            if (!selecting) return;
            for (let i = 0; i < days.length; i++) {
                const r = days[i].getBoundingClientRect();
                if (e.clientX >= r.left && e.clientX <= r.right) {
                    if (i !== selectCurrent) {
                        selectCurrent = i;
                        paintSelection();
                    }
                    break;
                }
            }
        });
        document.addEventListener('pointerup', (e) => {
            if (!selecting) return;
            selecting = false;
            const moved = Math.abs(e.clientX - selectStartX) > 4
                       || Math.abs(e.clientY - selectStartY) > 4
                       || selectCurrent !== selectAnchor;
            const lo = Math.min(selectAnchor, selectCurrent);
            const hi = Math.max(selectAnchor, selectCurrent);
            const now = new Date();
            const start = ymdFor(now.getFullYear(), now.getMonth(), lo + 1);
            const end   = ymdFor(now.getFullYear(), now.getMonth(), hi + 1);

            if (!moved) {
                // Single click — edit existing event if any, else start a new 1-day event
                const ymd = start;
                const existing = eventsCovering(ymd)[0];
                clearSelectionMarks();
                if (existing) {
                    openEventPopover(existing, days[lo], false);
                } else {
                    const ev = { id: 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2,5), start, end, text: '' };
                    days[lo].classList.add('is-selecting');
                    openEventPopover(ev, days[lo], true);
                }
            } else {
                // Range — if it covers an existing event entirely, edit it; else create new
                const inRange = timebarEvents.find(ev => ev.start >= start && ev.end <= end);
                if (inRange) {
                    clearSelectionMarks();
                    openEventPopover(inRange, days[lo], false);
                } else {
                    const ev = { id: 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2,5), start, end, text: '' };
                    openEventPopover(ev, days[lo], true);
                }
            }
        });
        window.addEventListener('resize', schedule);

        build();
        requestAnimationFrame(() => requestAnimationFrame(() => bar.classList.add('ready')));

        // Refresh at midnight so today moves. setTimeout alone is unreliable
        // (background-tab throttling, system sleep), so we also re-check on
        // visibility/focus and via a low-frequency poll.
        function scheduleMidnight() {
            const now = new Date();
            const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
            setTimeout(() => {
                rebuildIfDateChanged();
                scheduleMidnight();
            }, next - now);
        }
        scheduleMidnight();
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) rebuildIfDateChanged();
        });
        window.addEventListener('focus', rebuildIfDateChanged);
        setInterval(rebuildIfDateChanged, 60000);
    })();


    // ── Timebar weather — mirrors the dock's forecast (owned by js/weather.js).
    // We don't fetch ourselves; we just read the shared cache and re-paint
    // whenever populateDockWeather runs so the timebar emojis stay in sync.
    (function setupTimebarWeather() {
        // Match the icon set used by js/weather.js so dock + timebar agree
        const ICON = (code) => {
            if (code === 0)   return '☀️';
            if (code <= 3)    return '🌤️';
            if (code <= 48)   return '☁️';
            if (code <= 67)   return '🌧️';
            if (code <= 77)   return '🌨️';
            if (code <= 82)   return '🌧️';
            if (code <= 86)   return '🌨️';
            return '⛈️';
        };

        function paint() {
            const slots = document.querySelectorAll('.timebar-day-weather');
            if (!slots.length) return;
            let daily = null;
            try {
                const cached = JSON.parse(localStorage.getItem('aura_weather_cache') || 'null');
                if (cached && cached.data) daily = cached.data;
            } catch (_) {}
            if (!daily || !daily.time) return;

            const byDate = {};
            for (let i = 0; i < daily.time.length; i++) {
                byDate[daily.time[i]] = {
                    code: daily.weathercode[i],
                    tMax: daily.temperature_2m_max && daily.temperature_2m_max[i],
                    tMin: daily.temperature_2m_min && daily.temperature_2m_min[i],
                };
            }
            slots.forEach(el => {
                const d = byDate[el.dataset.ymd];
                if (d && d.code != null) {
                    el.textContent = ICON(d.code);
                    if (d.tMax != null && d.tMin != null) {
                        el.title = `${Math.round(d.tMax)}° / ${Math.round(d.tMin)}°`;
                    }
                } else {
                    el.textContent = '';
                    el.removeAttribute('title');
                }
            });
        }

        window.applyTimebarWeather = paint;
        paint();

        // Wrap populateDockWeather so timebar repaints whenever fresh data lands
        const orig = window.populateDockWeather;
        window.populateDockWeather = function() {
            if (orig) orig.apply(this, arguments);
            paint();
        };
    })();

</script>
</body>
</html>
