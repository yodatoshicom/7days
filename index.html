<script>
// Apply persisted font/size settings before first paint to prevent flash
(function() {
    var fonts = { 'caveat':"'Caveat', cursive", 'sf-mono':"'SF Mono', 'SFMono-Regular', ui-monospace, monospace", 'lora':"'Lora', serif", 'dm-mono':"'DM Mono', monospace", 'jetbrains-mono':"'JetBrains Mono', monospace" };
    var sizes   = { 'S':'22px', 'M':'28px', 'L':'36px' };
    var sizes1x = { 'S':'16px', 'M':'20px', 'L':'26px' };
    var r = document.documentElement;
    // Ruler visibility
    var showRuler = localStorage.getItem('aura_show_ruler') || 'true';
    if (showRuler === 'false') {
        r.classList.add('hide-ruler');
    }

    window.addEventListener('DOMContentLoaded', () => {
        const rToggle = document.getElementById('ruler-quick-toggle');
        if (rToggle && showRuler === 'false') rToggle.classList.add('ruler-off');
    });
    
    var f = localStorage.getItem('aura_note_font');
    if (f && fonts[f]) r.style.setProperty('--note-font', fonts[f]);
    var s = localStorage.getItem('aura_note_size');
    if (s) r.style.setProperty('--note-size', (window.devicePixelRatio > 1 ? sizes : sizes1x)[s] || sizes[s]);
})();
</script>
<style>
:root {
    --sf-easing: cubic-bezier(0.32, 0.72, 0, 1);
    --spring-easing: cubic-bezier(0.34, 1.56, 0.64, 1);
    --bg-color: #e3dde6;
    --text-color: #1d1d1f;
    --accent-color: #007AFF;
    --card-bg: rgba(255, 255, 255, 0.3);
    --separator-color: rgba(0, 0, 0, 0.06);
    --note-font: 'Caveat', cursive;
    --note-size: 28px;
}


/* Note color bar — shown below note in editing mode */
.note-color-dot[data-color="default"] { background: rgba(0,0,0,0.08); }
.note-color-dot[data-color="yellow"] { background: #fbbf24; }
.note-color-dot[data-color="blue"] { background: #60a5fa; }
.note-color-dot[data-color="mint"] { background: #34d399; }
.note-color-dot[data-color="pink"] { background: #f472b6; }

.bar-color-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s var(--spring-easing), border-color 0.15s;
    flex-shrink: 0;
}
.bar-color-dot:hover { transform: scale(1.25); }
.bar-color-dot.active { border-color: var(--text-color); }
.bar-color-dot[data-color="default"] { background: rgba(128,128,128,0.25); }
.bar-color-dot[data-color="yellow"] { background: #fbbf24; }
.bar-color-dot[data-color="blue"] { background: #60a5fa; }
.bar-color-dot[data-color="mint"] { background: #34d399; }
.bar-color-dot[data-color="pink"] { background: #f472b6; }


/* Note color tints */
.note[data-note-color="yellow"] {
    background: rgba(251, 191, 36, 0.18);
    border-color: rgba(251, 191, 36, 0.3);
}
.note[data-note-color="blue"] {
    background: rgba(96, 165, 250, 0.18);
    border-color: rgba(96, 165, 250, 0.3);
}
.note[data-note-color="mint"] {
    background: rgba(52, 211, 153, 0.18);
    border-color: rgba(52, 211, 153, 0.3);
}
.note[data-note-color="pink"] {
    background: rgba(244, 114, 182, 0.18);
    border-color: rgba(244, 114, 182, 0.3);
}

.header-container {
    text-align: center;
    margin-top: 110px;
    margin-bottom: 0px;
    z-index: 500;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
    top: 25px;
}

.time-display {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.4;
    margin-bottom: 8px;
    color: var(--text-color);
}

.greeting {
    font-size: 68px;
    font-weight: 700;
    letter-spacing: -0.05em;
    background: linear-gradient(to bottom, var(--text-color) 70%, transparent);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 0.2s ease, transform 0.3s var(--spring-easing);
    display: inline-block;
    position: relative;
}

.greeting:hover {
    opacity: 0.8;
    transform: scale(1.02);
}

.greeting:active {
    transform: scale(0.97);
}


/* Greeting sub-line (funny text) — shares position with weather tooltip */
.greeting-sub {
    position: fixed;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Caveat', cursive;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.01em;
    opacity: 0.4;
    color: var(--text-color);
    min-height: 20px;
    z-index: 597;
    pointer-events: none;
    text-align: center;
    white-space: nowrap;
    transition: opacity 0.2s ease;
}

.greeting-sub.hidden {
    opacity: 0;
}

/* Lang flash animation on greeting */
@keyframes greetingPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.03); }
    100% { transform: scale(1); }
}

.greeting.lang-switch {
    animation: greetingPulse 0.4s var(--spring-easing);
}

.lang-btn {
    background: none;
    border: none;
    color: var(--text-color);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    opacity: 0.3;
    cursor: pointer;
    transition: opacity 0.3s;
}

.lang-btn:hover {
    opacity: 1;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
}

/* Background geometry modes */

html {
    background-color: #fbfbfb;
    background-image: url('bg2.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

body {
    background: none;
    color: var(--text-color);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease;
}

body.ready {
    opacity: 1;
}




/* Sunrise / sunset markers on time ruler */
.sun-label {
    position: absolute;
    bottom: 17px;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    color: #F59E0B;
    opacity: 0.65;
    white-space: nowrap;
    transform: translateX(-50%);
    pointer-events: auto;
    letter-spacing: 0.02em;
    cursor: default;
}
.sun-label:hover { opacity: 1; }
.sun-tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%) translateY(3px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
    white-space: nowrap;
}
.sun-tooltip-icon { opacity: 0.5; display: flex; color: var(--text-color); }
.sun-tooltip-bubble {
    background: rgba(245,158,11,0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 0.5px solid rgba(245,158,11,0.25);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #F59E0B;
}
.sun-label:hover .sun-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* Time ruler — sits above the dock */
.time-ruler {
    position: relative;
    width: calc((100% - 32px) * 0.756);
    height: 44px;
    margin-bottom: -14px;
    user-select: none;
    -webkit-user-select: none;
}

.time-ruler-track {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, var(--text-color) 50%, transparent 100%);
    opacity: 0.15;
}

.time-ruler-past {
    position: relative;
    height: 100%;
    background: linear-gradient(to right, rgba(167,139,202,0.08), rgba(167,139,202,0.5));
    border-radius: 1px;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: visible;
}
.time-ruler-past::before {
    content: '';
    position: absolute;
    top: 0;
    left: 20%;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.5));
    border-radius: 1px;
    pointer-events: none;
}
.time-ruler-past::after {
    content: '';
    position: absolute;
    right: -10px;
    top: -5px;
    width: 20px;
    height: 11px;
    background: rgba(167,139,202,0.55);
    filter: blur(6px);
    border-radius: 50%;
    pointer-events: none;
}

.time-ruler-tick {
    position: absolute;
    bottom: 1px;
    width: 1px;
    transform: translateX(-50%);
    border-radius: 1px;
}

.time-ruler-tick.hour    { height: 14px; }
.time-ruler-tick.half    { height: 7px; }
.time-ruler-tick.quarter { height: 3px; }

.time-ruler-now {
    position: absolute;
    top: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    transform: translateX(-50%);
    filter: drop-shadow(0 0 5px rgba(167,139,202,0.4));
}

.time-ruler-now-line {
    flex: 1;
    width: 1.5px;
    position: relative;
    background: linear-gradient(to bottom, rgba(167,139,202,0.0), rgba(167,139,202,0.95));
    border-radius: 1px;
    margin: 2px 0 2px;
}

.time-ruler-now-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #A78BCA;
    border: 1.5px solid rgba(255,255,255,0.65);
    box-shadow: 0 0 0 3px rgba(167,139,202,0.25), 0 0 14px rgba(167,139,202,0.7);
    animation: yearDotPulse 3s ease-in-out infinite;
    flex-shrink: 0;
}

.time-ruler-hover-label {
    position: absolute;
    top: 0;
    pointer-events: none;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 3px 10px;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 20;
}
.time-ruler-hover-label.visible { opacity: 1; }

.time-ruler-now-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    margin-top: 10px;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    color: #7B52B0;
    white-space: nowrap;
    flex-shrink: 0;
    background: rgba(167,139,202,0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(167,139,202,0.3);
    border-radius: 20px;
    padding: 3px 10px;
    cursor: pointer;
    user-select: none;
    pointer-events: auto;
}


/* THE PRO STUDIO DOCK */
.dock-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.dock-row {
    display: flex;
    align-items: center;
    gap: 5px;
    position: relative;
}

.dock-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: none;
    color: var(--text-color);
    cursor: pointer;
    opacity: 0.25;
    transition: opacity 0.25s ease, transform 0.25s var(--sf-easing);
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    -webkit-tap-highlight-color: transparent;
}

.dock-nav:hover {
    opacity: 0.6;
}

.dock-nav:active {
    transform: scale(0.75);
    opacity: 0.4;
}

.dock-container {
    position: relative;
    padding: 9px;
    background: var(--card-bg);
    backdrop-filter: blur(60px) saturate(210%);
    -webkit-backdrop-filter: blur(60px) saturate(210%);
    border-radius: 36px;
    border: 0.5px solid rgba(255, 255, 255, 0.15);
    
    box-shadow: 
        inset 0 2px 0 0 rgba(255, 255, 255, 0.4),
        0 30px 60px rgba(0,0,0,0.12);
        
    display: flex;
    gap: 4px;
    align-items: center;
    user-select: none;
    z-index: 1000;
}


.day-separator {
    width: 1px;
    height: 34px;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.15) 20%, rgba(0,0,0,0.15) 80%, transparent);
    flex-shrink: 0;
    transition: opacity 0.4s var(--sf-easing);
}

.day-card {
    width: 64px;
    height: 76px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: transparent;
    border-radius: 30px;
    transition: 
        transform 0.5s var(--sf-easing), 
        background 0.3s var(--sf-easing), 
        box-shadow 0.3s var(--sf-easing);
    cursor: default;
    position: relative;
}


.day-card:hover {
    background: rgba(0, 0, 0, 0.03);
    transform: translateY(-4px);
}

.day-card:active {
    transform: scale(0.92) translateY(0);
    transition: transform 0.1s var(--sf-easing);
}

.day-card.active {
    background: var(--text-color);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    color: var(--bg-color);
    transform: none;
    z-index: 10;
}

.day-card.active::after {
    content: none;
}

.day-name {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    opacity: 0.45;
    margin-bottom: 2px;
    letter-spacing: 0.04em;
}

.day-card.active .day-name { opacity: 0.6; }

.day-card.weekend .day-number {
    background: linear-gradient(to bottom, var(--text-color) 20%, #A0A0A8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.day-card.weekend.active .day-number {
    background: none;
    -webkit-background-clip: unset;
    -webkit-text-fill-color: unset;
    background-clip: unset;
}

.day-number {
    font-size: 28px; 
    font-weight: 700;
    letter-spacing: -0.06em;
    font-variant-numeric: tabular-nums;
    transition: font-weight 0.4s var(--sf-easing);
}

.day-card.active .day-number {
    font-weight: 850;
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    -webkit-text-fill-color: var(--bg-color);
    color: var(--bg-color);
}

.day-card.active .day-weather { opacity: 0.75; }

/* WEATHER ROW — below the dock */
.weather-row {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 54px; /* 9px (dock pad) + 40px (nav btn) + 5px (gap) = 54px to align exactly */
    opacity: 0.7;
}

/* Inline weather inside day cards */
.day-main-row {
    display: flex;
    align-items: center;
    gap: 4px;
}
.day-weather {
    /* Hidden inside card now */
    display: none;
}

.weather-day {
    width: 58px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: 0.3s;
    pointer-events: auto;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-color);
}

.weather-day:hover { opacity: 1; transform: translateY(-1px); }

.weather-day .weather-icon { font-size: 15px; margin-bottom: 0; margin-right: 4px; }
.weather-day .weather-temp { font-size: 11px; font-weight: 700; opacity: 0.8; }

.weather-separator {
    width: 1px;
    height: 10px;
    background: linear-gradient(to bottom, transparent, rgba(120,120,128,0.3) 50%, transparent);
    flex-shrink: 0;
}

.weather-day.today {
    filter: drop-shadow(0 0 6px rgba(0, 122, 255, 0.5));
}

@media (max-width: 430px) {
    .weather-row {
        width: 100%;
        padding: 0 16px; /* Match dock-wrapper padding? No, dock-container has padding 8px 6px */
        padding: 0 6px; /* Match dock-container mobile padding */
        gap: 4px;
    }
    .weather-day {
        flex: 1;
        width: auto;
    }
    .weather-separator { display: none; }
}
.weather-day:not(:last-child) {
    border-right: none;
}

.weather-icon {
    font-size: 14px;
    margin-bottom: 1px;
    position: relative;
    z-index: 1;
}

.weather-temp { 
    font-size: 10px; 
    font-weight: 700; 
}

.weather-day.highlight-light::after {
    content: ''; 
    position: absolute; 
    top: 0%; 
    left: 50%; 
    transform: translateX(-50%);
    width: 40px; 
    height: 40px; 
    background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
    opacity: 0.4; 
    filter: blur(10px); 
    z-index: 0; 
    animation: pulseLight 2s infinite ease-in-out;
}

@keyframes pulseLight { 
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.3; } 
    50% { transform: translateX(-50%) scale(1.3); opacity: 0.5; } 
}

.weather-tooltip {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Caveat', cursive;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.01em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 9998;
    color: var(--text-color);
    text-align: center;
    white-space: nowrap;
}

.weather-tooltip.show {
    opacity: 0.4;
}

.bottom-controls {
    display: none;
    position: fixed;
    bottom: max(16px, calc(16px + env(safe-area-inset-bottom)));
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
}

.lang-btn {
    background: none;
    border: none;
    color: var(--text-color);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    opacity: 0.3;
    cursor: pointer;
    transition: opacity 0.3s;
}

.lang-btn:hover {
    opacity: 1;
}

.city-tooltip {
    display: none;
    position: fixed;
    bottom: max(16px, calc(16px + env(safe-area-inset-bottom)));
    right: 30px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.2;
    z-index: 9999;
    pointer-events: auto;
    cursor: pointer;
    transition: 0.3s;
}

.city-tooltip:hover {
    opacity: 0.6;
    transform: scale(1.05);
}



.note {
    position: absolute;
    width: fit-content;
    min-width: 80px;
    max-width: 600px;
    min-height: 40px;
    background: var(--card-bg);
    backdrop-filter: blur(50px) saturate(180%);
    -webkit-backdrop-filter: blur(50px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 30px;
    padding: 18px 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    z-index: 1100;
    cursor: grab;
    transition: transform 0.4s var(--spring-easing), box-shadow 0.3s var(--sf-easing), opacity 0.3s ease;
    overflow: visible;
    resize: none;
}

.note:active:not(:has(.note-resize-handle:active)) {
    transform: none;
}

.note.dragging {
    cursor: grabbing;
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.15);
    transition: transform 0.4s var(--spring-easing), padding 0.3s var(--sf-easing),
                border-radius 0.3s var(--sf-easing), opacity 0.25s ease;
}

.note.dragging.near-dock {
    padding: 6px 14px;
    border-radius: 30px;
    opacity: 0.85;
    pointer-events: none;
    transform-origin: center center;
    transition: transform 0.35s var(--spring-easing), padding 0.3s var(--sf-easing),
                border-radius 0.3s var(--sf-easing), opacity 0.25s ease;
}

.note.dragging.near-dock .note-content {
    transition: font-size 0.3s var(--sf-easing), max-height 0.3s var(--sf-easing);
    font-size: 13px;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
    max-height: 1.1em;
}

.note.dragging.near-dock .note-resize-handle,
.note.dragging.near-dock .note-close,
.note.dragging.near-dock .note-color-bar {
    opacity: 0;
    pointer-events: none;
}

/* Note close button — top right corner */
.note-close {
    position: absolute;
    top: -2px;
    right: -6px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #FF5F57;
    border: 0.5px solid rgba(0, 0, 0, 0.12);
    box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transform: scale(0);
    transition: transform 0.3s var(--spring-easing), opacity 0.2s ease, filter 0.15s ease;
}

.note:hover .note-close,
.note.editing .note-close {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
}

.note-close:active {
    filter: brightness(0.8);
}

.note-close svg {
    width: 8px;
    height: 8px;
    stroke: rgba(255, 255, 255, 0.9);
    stroke-width: 1.6;
    fill: none;
    transition: stroke 0.1s ease;
}

.note-close:hover svg {
    stroke: rgba(77, 0, 0, 0.9);
}


.note-content {
    font-family: var(--note-font);
    font-size: var(--note-size);
    line-height: 1.1;
    outline: none;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: normal;
}
body.note-font-sf-mono .note-content {
    font-size: calc(var(--note-size) * 0.72);
    outline: none;
    color: var(--text-color);
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: normal;
}

.note-edit-ta {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--note-font);
    font-size: var(--note-size);
    line-height: 1.1;
    color: inherit;
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    overflow: hidden;
    field-sizing: content;
}
body.note-font-sf-mono .note-edit-ta {
    font-size: calc(var(--note-size) * 0.72);
}

.note-edit-tip {
    position: fixed;
    bottom: max(86px, calc(86px + env(safe-area-inset-bottom)));
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-color);
    opacity: 0.3;
    pointer-events: none;
    user-select: none;
    z-index: 3000;
    white-space: nowrap;
}

.note-content a {
    color: var(--accent-color);
    text-decoration: none;
    border-bottom: 2px solid rgba(0, 122, 255, 0.2);
    font-family: inherit !important;
}

/* Image notes */
.note.image-note {
    padding: 0;
    overflow: visible;
    background: #000;
    border: 1px solid rgba(0,0,0,0.12);
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
}

.note.image-note .note-content,
.note.image-note .note-color-bar {
    display: none;
}

.note.spotify-note {
    width: 300px !important;
    padding: 6px;
    border-radius: 16px;
}
.note.spotify-note .note-content {
    padding: 0;
    overflow: hidden;
    border-radius: 10px;
    height: 152px;
    line-height: 0;
}
.note.spotify-note .note-content iframe {
    display: block;
    width: 100%;
    height: 152px;
    border: none;
    border-radius: 10px;
}
.note.spotify-note .note-color-bar { display: none; }

.note-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 30px;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
}


/* ── Screenshot mode (Option+D) ── */
.screenshot-overlay {
    position: fixed;
    inset: 0;
    z-index: 1098;
    backdrop-filter: blur(28px) saturate(120%) brightness(0.88);
    -webkit-backdrop-filter: blur(28px) saturate(120%) brightness(0.88);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}
body.screenshot-mode .screenshot-overlay { opacity: 1; }
body.screenshot-mode .note,
body.screenshot-mode .settings-btn,
body.screenshot-mode .capsule,
body.screenshot-mode .bottom-watermark,
body.screenshot-mode .dev-export-btn,
body.screenshot-mode .note-edit-overlay,
body.screenshot-mode .note-arrow-bar {
    opacity: 0 !important;
    pointer-events: none !important;
    transition: opacity 0.3s ease !important;
}
body.screenshot-mode .dock-wrapper {
    z-index: 1200;
}

/* ── Note editing mode — page blur + arrow bar ── */
.note-edit-overlay {
    display: none;
}
body.note-editing-mode .note-edit-overlay { display: none; }
body.note-editing-mode .note.editing { z-index: 2000 !important; }
body.note-editing-mode .note:not(.editing) { z-index: 50 !important; }

.note-arrow-bar {
    position: fixed;
    bottom: max(28px, calc(28px + env(safe-area-inset-bottom)));
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--card-bg);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border: 0.5px solid rgba(255,255,255,0.35);
    border-radius: 18px;
    padding: 6px 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.25s var(--spring-easing);
}
body.note-editing-mode .note-arrow-bar {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0px);
}
.note-arrow-btn {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text-color);
    opacity: 0.7;
    transition: background 0.15s, opacity 0.15s;
    user-select: none;
    font-family: 'Inter', sans-serif;
}
.note-arrow-btn:hover { background: rgba(128,128,128,0.12); opacity: 1; }
.note-arrow-btn:active { transform: scale(0.88); }
.note-arrow-sep {
    width: 1px;
    height: 18px;
    background: rgba(128,128,128,0.18);
    margin: 0 4px;
    flex-shrink: 0;
}

/* SVG arc resize handle */
.note-resize-handle {
    position: absolute;
    bottom: -5px;
    right: -5px;
    width: 38px;
    height: 38px;
    cursor: nwse-resize;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s var(--sf-easing);
}

.note:hover .note-resize-handle { opacity: 1; }

.note-resize-handle .rh-fill { }



html.hide-ruler .time-ruler {
    display: none !important;
}
html.hide-ruler .dock-wrapper {
    margin-top: 30px;
}


/* BG TOGGLE — Apple Designer Edition */
.bg-toggle {
    position: fixed;
    top: 24px;
    right: 76px;
    z-index: 10001;
    width: 52px;
    height: 30px;
    border-radius: 100px;
    border: 0.5px solid rgba(0, 0, 0, 0.08);
    background: rgba(120, 120, 128, 0.12);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.3s var(--spring-easing), background 0.3s;
    padding: 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: inset 0 0.5px 1px rgba(0,0,0,0.05);
}

.bg-toggle.ruler-toggle {
    right: 76px;
}

body:hover .bg-toggle { opacity: 1; }
.bg-toggle:hover { background: rgba(120, 120, 128, 0.18); transform: translateY(-1px); }
.bg-toggle:active { transform: translateY(0) scale(0.96); }


.bg-toggle-icon {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.4;
    transition: opacity 0.3s;
    z-index: 1;
}

.bg-toggle.ruler-off .icon-ruler-off,
.bg-toggle:not(.ruler-off) .icon-ruler-on {
    opacity: 0.9;
}

.bg-toggle-knob {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.04);
    transition: transform 0.4s var(--spring-easing);
    z-index: 0;
}

.bg-toggle.ruler-off .bg-toggle-knob {
    transform: translateX(22px);
}

.bg-toggle-icon svg {
    width: 12px;
    height: 12px;
    stroke: var(--text-color);
}

/* SETTINGS — top right */
.settings-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10001;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    opacity: 0.35;
    transition: opacity 0.4s ease, transform 0.4s var(--spring-easing);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-color);
    padding: 0;
}

.settings-btn:hover { opacity: 1; }
.settings-btn:active { transform: scale(0.92); }
.settings-btn.open { opacity: 1; }


.settings-btn svg {
    transition: transform 0.5s var(--spring-easing);
}
.settings-btn:hover svg { transform: rotate(45deg); }

/* Dev export */
.dev-export-btn {
    position: fixed;
    top: 70px;
    right: 20px;
    z-index: 10001;
    display: none;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    opacity: 0.8;
    letter-spacing: 0.02em;
}
.dev-export-btn:hover { opacity: 1; }
body.dev-mode .dev-export-btn { display: block; }
.dev-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
}
.dev-modal.open { display: flex; }
.dev-modal-box {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 20px;
    width: 560px;
    max-width: 90vw;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.dev-modal-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.05em;
}
.dev-modal textarea {
    background: #111;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #a8ff78;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 12px;
    resize: none;
    height: 280px;
    width: 100%;
    box-sizing: border-box;
    line-height: 1.6;
}
.dev-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.dev-modal-copy {
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
}
.dev-modal-close {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
}

.settings-panel {
    position: fixed;
    top: 58px;
    right: 20px;
    z-index: 10000;
    background: rgba(22, 22, 24, 0.88);
    backdrop-filter: blur(60px) saturate(180%);
    -webkit-backdrop-filter: blur(60px) saturate(180%);
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 18px;
    padding: 18px;
    box-shadow:
        0 20px 50px rgba(0,0,0,0.4),
        inset 0 1px 0 0 rgba(255,255,255,0.08);
    width: 220px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-12px) scale(0.92);
    transform-origin: top right;
    transition: opacity 0.3s ease, transform 0.5s var(--spring-easing);
    user-select: none;
}

.settings-panel.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0) scale(1);
}

.settings-section-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.4;
    color: rgba(255,255,255,0.9);
    margin-bottom: 6px;
}

.settings-row {
    display: flex;
    gap: 6px;
    align-items: center;
}

.settings-location-input {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.settings-location-input::placeholder { color: rgba(255,255,255,0.3); }

.settings-location-input:focus {
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
}

.settings-toggle {
    display: flex;
    gap: 2px;
    padding: 2px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
}

.settings-toggle-btn {
    flex: 1;
    padding: 6px 0;
    border: none;
    border-radius: 8px;
    background: transparent;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    opacity: 0.4;
    cursor: pointer;
    transition: opacity 0.2s, background 0.2s, box-shadow 0.2s;
}

.settings-toggle-btn.active {
    opacity: 1;
    background: rgba(255,255,255,0.12);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}


.font-pick {
    width: 34px;
    height: 30px;
    border-radius: 8px;
    border: 1.5px solid transparent;
    background: rgba(255,255,255,0.06);
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s, transform 0.2s var(--spring-easing), border-color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    line-height: 1;
}

.font-pick:hover {
    opacity: 0.8;
    transform: scale(1.06);
}

.font-pick.active {
    opacity: 1;
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.12);
}

/* DAY NOTE POPUP */
.day-note-popup {
    position: fixed;
    transform: translateX(-50%) scale(0.9);
    background: var(--card-bg);
    backdrop-filter: blur(50px) saturate(200%);
    -webkit-backdrop-filter: blur(50px) saturate(200%);
    border: 0.5px solid rgba(255, 255, 255, 0.3);
    border-radius: 20px;
    padding: 14px 16px 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.1);
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.25s var(--spring-easing);
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 200px;
}

.day-note-popup.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) scale(1);
}

.day-note-popup textarea {
    font-family: var(--note-font);
    font-size: 22px;
    line-height: 1.2;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-color);
    resize: none;
    width: 200px;
    min-height: 50px;
}

.day-note-popup textarea::placeholder {
    color: var(--text-color);
    opacity: 0.3;
}


/* PAST DAY CARDS */
.day-card.past {
    cursor: default !important;
    opacity: 0.5;
}

.day-card.past:hover {
    background: transparent;
    transform: none;
}

/* DAY NOTE LIST inside popup */
.day-note-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 150px;
    overflow-y: auto;
}

.day-note-item {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 4px 0;
}

.day-note-item-text {
    font-family: var(--note-font);
    font-size: 20px;
    line-height: 1.2;
    color: var(--text-color);
    flex: 1;
    white-space: pre-wrap;
    word-break: break-word;
}

.day-note-item-delete {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 59, 48, 0.15);
    color: #FF3B30;
    font-size: 10px;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s ease;
}

.day-note-item:hover .day-note-item-delete {
    opacity: 1;
}

.day-note-item-delete:hover {
    background: rgba(255, 59, 48, 0.3);
}

.day-note-separator {
    height: 0.5px;
    background: var(--text-color);
    opacity: 0.08;
    margin: 2px 0;
}

/* DAY NOTE DOT */
.day-note-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;

/* Year progress bar — full width bottom */
.year-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 7px;
    z-index: 500;
    background: rgba(0,0,0,0.07);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);

    overflow: visible;
}
.year-bar-fill {
    height: 100%;

    position: relative;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}
.year-bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;

}
.year-bar-marker {

.year-bar-tick {

}
.year-bar-label {

    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;

.season-tick {

}
.season-tick::before {
    content: '';
    position: absolute;
    left: -14px; right: -14px;
    top: -28px; bottom: -6px;
}
.season-tick::after {
    content: '';
    position: absolute;
    top: -3.6px; left: 50%;
    transform: translateX(-50%);
    width: 3.6px; height: 3.6px;
    border-radius: 50%;

.season-tick:hover { height: 24px; filter: drop-shadow(0 0 4px rgba(167,139,202,0.5)); }

.season-zone {

.month-tick {

/* ── Time Capsule ── */
.capsule {
    display: none !important;
    position: fixed;
    bottom: 16px;
    left: 30px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
}
.capsule-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--card-bg);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border-radius: 20px;
    border: 0.5px solid rgba(255,255,255,0.3);
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.4), 0 8px 24px rgba(0,0,0,0.08);
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.3s, border-radius 0.4s var(--sf-easing);
    user-select: none;
}
.capsule-pill:hover { opacity: 1; }
.capsule.open .capsule-pill { opacity: 1; border-radius: 0 0 20px 20px; }
.capsule-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-color); opacity: 0.3;
    transition: background 0.3s, opacity 0.3s; flex-shrink: 0;
}
.capsule.has-pending .capsule-dot { background: #A78BCA; opacity: 1; }
.capsule-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.15em; opacity: 0.5; color: var(--text-color);
}
.capsule-panel {
    width: 240px;
    background: var(--card-bg);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border-radius: 20px 20px 20px 0;
    border: 0.5px solid rgba(255,255,255,0.3);
    border-bottom: none;
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.4), 0 12px 32px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    pointer-events: none;
    padding: 0 20px;
    transition: max-height 0.4s var(--sf-easing), opacity 0.3s ease, padding 0.4s var(--sf-easing);
}
.capsule.open .capsule-panel { max-height: 320px; opacity: 1; pointer-events: auto; padding: 20px; }
.capsule-title {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.2em; opacity: 0.35; color: var(--text-color);
}
.capsule-textarea {
    width: 100%; min-height: 80px; resize: none; border: none;
    background: rgba(0,0,0,0.04); border-radius: 12px;
    padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 13px;
    color: var(--text-color); outline: none; line-height: 1.5;
}
.capsule-textarea::placeholder { opacity: 0.3; }
.capsule-days { display: flex; gap: 6px; }
.capsule-day-btn {
    flex: 1; height: 26px; border-radius: 13px;
    border: 0.5px solid rgba(0,0,0,0.15); background: transparent;
    color: var(--text-color); font-size: 10px; font-weight: 700;
    letter-spacing: 0.06em; cursor: pointer; opacity: 0.35;
    transition: opacity 0.2s, background 0.2s, color 0.2s;
}
.capsule-day-btn.active { background: var(--text-color); color: var(--bg-color); opacity: 1; }
.capsule-day-btn:hover { opacity: 0.7; }
.capsule-send {

}

/* Sun arc */

/* ── Scale down on smaller desktop/laptop screens (< 1260px) ── */
@media (max-width: 1260px) and (min-width: 431px) {
    .day-card        { width: 52px; height: 54px; border-radius: 28px; }
    .day-number      { font-size: 22px; }
    .day-name        { font-size: 9px; }
    .dock-container  { padding: 7px; gap: 3px; border-radius: 30px; }

    .weather-icon    { font-size: 12px; }
    .weather-temp    { font-size: 9px; }
    .time-ruler      { height: 35px; margin-bottom: -11px; }

}

/* ── 1x (non-retina) screens: thicken hairline borders + scale down fonts ── */
@media (-webkit-max-device-pixel-ratio: 1), (max-resolution: 1dppx) {
    .dock-container,
    .note,
    .settings-panel,
    .note-arrow-bar,
    .day-note-popup,
    .time-ruler-now-label,
    .sun-tooltip-bubble {
        border-width: 1px;
    }
    body            { justify-content: flex-end; }
    .dock-wrapper   { padding-bottom: 32px; }
    :root           { --note-size: 20px; }
    .day-number     { font-size: 18px; }
    .day-name       { font-size: 8px; }
    .weather-icon   { font-size: 11px; }
    .weather-tooltip { font-size: 24px; }
    .sun-label      { font-size: 7px; }
    .sun-tooltip-bubble { font-size: 9px; }
}

/* ── backdrop-filter unsupported fallback (Firefox, some Windows) ── */
@supports not (backdrop-filter: blur(1px)) {
    .dock-container  { background: rgba(240, 240, 240, 0.92); }
    .note            { background: rgba(245, 245, 245, 0.96); }
    .settings-panel  { background: rgba(22, 22, 24, 0.95); }
    .note-arrow-bar  { background: rgba(240, 240, 240, 0.96); }
    .note-edit-overlay { background: rgba(0,0,0,0.35); }
}

/* ── Dock to bottom + fluid width at ≤ 750px ── */
@media (max-width: 750px) and (min-width: 431px) {
    body           { justify-content: flex-end; }
    .dock-wrapper  { width: calc(100% - 32px); padding-bottom: max(20px, env(safe-area-inset-bottom)); }
    .dock-row      { width: 100%; }
    .dock-container{ flex: 1; }
    .day-card      { flex: 1; width: auto; min-width: 0; }
    .dock-nav      { display: none; }
    .time-ruler    { width: calc(100% - 32px); }
}

/* ── Mobile layout — iPhone 13 → current (≤ 430px logical px) ── */
@media (max-width: 430px) {
    #desktop-only { display: none !important; }

    /* ── Body: dock at bottom ── */
    body {
        justify-content: flex-end;
    }

    /* ── Dock wrapper: safe-area bottom breathing room ── */
    .dock-wrapper {
        width: calc(100% - 24px);
        gap: 10px;
        padding-bottom: max(20px, env(safe-area-inset-bottom));
    }
    .dock-row { width: 100%; }
    .dock-container {
        flex: 1;
        padding: 8px 6px;
        gap: 4px;
        border-radius: 28px;
    }
    .dock-nav { display: none; }

    /* ── Day cards: full-width flex, tall enough for touch ── */
    .day-card {
        flex: 1;
        width: auto;
        min-width: 0;
        height: 80px;
        border-radius: 22px;
    }
    .day-card:hover  { transform: none; }
    .day-card:active { transform: scale(0.96); }

    /* ── Typography ── */
    .day-name   { font-size: 10px; letter-spacing: 0; }
    .day-number { font-size: 24px; }
    .day-separator { display: none; }
    .day-main-row  { gap: 3px; }

    /* ── Weather inside card ── */
    .day-weather  { opacity: 0.65; }
    .weather-icon { font-size: 13px; }
    .weather-temp { font-size: 10px; }

    /* ── Hide desktop-only chrome ── */
    .bottom-controls { display: none; }
    .city-tooltip    { display: none; }
    .capsule         { display: none; }

    /* ── Year progress: above dock ── */
    .year-progress-label {
        top: auto;
        bottom: calc(100% + 10px);
    }
    .year-progress-label .yp-bar { width: calc(100vw - 48px); }

    /* ── Time ruler: collapse, hide all ruler elements ── */
    .time-ruler { display: none; }

    /* ── Mobile clock pill: safe-area aware top ── */
    #mobile-time {
        display: block;
        position: fixed;
        top: max(16px, env(safe-area-inset-top, 16px));
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #7B52B0;
        background: rgba(167,139,202,0.12);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 0.5px solid rgba(167,139,202,0.3);
        border-radius: 20px;
        padding: 4px 12px;
        z-index: 9999;
        pointer-events: none;
        white-space: nowrap;
    }

    /* ── Settings button: respect Dynamic Island / notch ── */
    .settings-btn {
        top: max(16px, env(safe-area-inset-top, 16px));
        right: 16px;
    }

    /* ── Settings panel: open below settings button ── */
    .settings-panel {
        right: 8px;
        left: 8px;
        width: auto;
        top: max(66px, calc(env(safe-area-inset-top, 0px) + 60px));
        max-height: calc(100dvh - max(66px, calc(env(safe-area-inset-top, 0px) + 60px)) - 20px);
    }

    /* ── Notes ── */
    .weather-tooltip  { font-size: 20px; }
    .note             { max-width: calc(100vw - 32px); }
    .note-resize-handle { opacity: 1; }
    .note-arrow-bar   { max-width: calc(100vw - 32px); }
}

<script>
    /* ============================================================
       LANGUAGE SYSTEM: EN / ES / PT (3-way cycle)
    ============================================================ */
    const LANGS = ['en', 'es', 'pt'];
    const LANG_LABELS = { en: 'EN', es: 'ES', pt: 'PT' };
    let lang = LANGS.includes(localStorage.getItem('aura_lang')) ? localStorage.getItem('aura_lang') : 'en';
    const dock = document.getElementById('dock');
    let notes = JSON.parse(localStorage.getItem('aura_notes_v3')) || [];

    // First time — seed hint notes
    if (notes.length === 0) {
        notes = [
            { id: 'n_s2', x: Math.min(40,  window.innerWidth * 0.04), y: 38,  w: Math.min(260, window.innerWidth * 0.45), text: 'saturday\n→ farmers market\n→ fix the bike\n→ dinner with J at 8', color: 'mint',  zIndex: 100 },
            ...(window.innerWidth > 600 ? [
            { id: 'n_s4', x: Math.min(175, window.innerWidth * 0.30), y: 38,  w: Math.min(223, window.innerWidth * 0.40), text: 'book flights\n↗ tokyo, april\nbefore prices jump',                 color: 'pink',  zIndex: 101 },
            { id: 'n_s5', x: Math.min(712, window.innerWidth * 0.55), y: 38,  w: Math.min(224, window.innerWidth * 0.38), text: 'ship it. don\'t wait.',                                            color: 'blue',  zIndex: 102 },
            ] : []),

    }
    let topZ = 1100;

    /* ============================================================

    // Main greeting: simple, warm, uses day name where it feels right
    function getMainGreeting(lang, slot, dayName) {

        return map[lang][slot] || map[lang].morning;
    }

    // Subs stay funny & rotational
    const greetingSubs = {
        en: {
            dawn:      ["Can't sleep? Neither can your inbox.", "The birds aren't even awake yet. You good?", "Early bird gets the coffee. Go."],

            morning:   ["El café antes que las ambiciones.", "Hoy: confusión moderada y posibles logros.", "Cargado al 40%. Suficiente por agora.", "Buenos días. Relativo."],

        },
        pt: {
            dawn:      ["Não consegue dormir? Sua caixa de entrada também não.", "Nem os pássaros acordaram ainda. Tá bem?", "Quem madruga toma café primeiro."],
            morning:   ["Café antes das ambições. Sempre.", "Previsão de hoje: confusão com chance de produtividade.", "Carregando... 40%. Por enquanto basta.", "Bom dia. Relativamente falando."],
            lateAM:    ["O almoço está chegando. Segura.", "Tecnicamente ainda é manhã.", "A manhã ainda não desistiu. Você também não."],
            noon:      ["Meio-dia. Horário de pico do caos.", "É aqui que o café já não funciona mais.", "Metade do dia. Metade das desculpas."],
            afternoon: ["A queda das 16h vem aí. Avisado.", "O tempo voa. Sua lista de tarefas não.", "Produtivo? A ver."],
            evening:   ["Hora dourada. Suas ideias finalmente prestam.", "O jantar não vai se fazer sozinho.", "Quase terminou. O dia, pelo menos."],
            night:     ["Não deveria estar dormindo? Pergunta a ciência.", "Ideias de madrugada: arriscadas. Inevitáveis.", "Tá tudo bem. Completamente bem."],
        }
    };

    function getTimeSlot(hour) {
        if (hour >= 5 && hour < 12)  return 'morning';
        if (hour >= 12 && hour < 17) return 'afternoon';
        if (hour >= 17 && hour < 21) return 'evening';
        return 'night'; // Covers 21:00 - 04:59
    }

    // Pick a sub greeting (rotates every 10 minutes)
    function getSubGreeting(slot) {
        const subs = greetingSubs[lang][slot];
        const minuteBucket = Math.floor(Date.now() / (10 * 60 * 1000));
        return subs[minuteBucket % subs.length];
    }

    function updateHeader() {
        const now = new Date();
        const hour = now.getHours();
        const locale = lang === 'en' ? 'en-US' : lang === 'es' ? 'es-ES' : 'pt-BR';

        const slot = getTimeSlot(hour);
        const dayName = now.toLocaleDateString(locale, { weekday: 'long' });
        const greetEl = document.getElementById('greeting');
        const subEl = document.getElementById('greeting-sub');

        if (!greetEl || !subEl) return;

        // main greeting — simple, natural, with day name where it fits
        const mainText = getMainGreeting(lang, slot, dayName);
        greetEl.textContent = mainText;

        // sub greeting — the funny line
        subEl.textContent = getSubGreeting(slot);
    }

    function cycleLang() {
        const idx = LANGS.indexOf(lang);
        const nextLang = LANGS[(idx + 1) % LANGS.length];
        applyLang(nextLang);

        // Animate greeting
        const greetEl = document.getElementById('greeting');
        if (greetEl) {
            greetEl.classList.remove('lang-switch');
            void greetEl.offsetWidth; // reflow
            greetEl.classList.add('lang-switch');
        }
    }

    // Clicking the greeting cycles language
    document.getElementById('greeting').addEventListener('click', () => cycleLang());

    /* ============================================================
       LINKIFY
    ============================================================ */
    function spotifyEmbed(text) {
        const t = text.trim();
        // Extract src URL from any iframe embed containing a Spotify embed URL
        const match = t.match(/src=["'](https:\/\/open\.spotify\.com\/embed\/[^"'\s]+)["']/i);
        if (match) return match[1];
        // Also accept a bare Spotify embed URL
        if (/^https:\/\/open\.spotify\.com\/embed\//i.test(t)) return t;
        return null;
    }

    function renderNoteContent(content, text) {
        const spotifySrc = spotifyEmbed(text);
        if (spotifySrc) {
            content.innerHTML = `<iframe src="${spotifySrc}" width="100%" height="152" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" style="border-radius:10px;display:block;"></iframe>`;
            content.closest('.note').classList.add('spotify-note');
        } else {
            content.innerHTML = linkify(text);
            content.closest('.note').classList.remove('spotify-note');
        }
    }

    function linkify(text) {
        const urlRegex = /((https?:\/\/|www\.)[^\s]+|[a-zA-Z0-9-]+\.[a-zA-Z]{2,}[^\s]*)/gi;
        return text.replace(urlRegex, (url) => {
            let href = url.startsWith('http') ? url : 'https://' + url;
            return `<a href="${href}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${url}</a>`;
        });
    }


    /* ============================================================
       DOCK
    ============================================================ */
    let dockOffset = 0; // days offset from current start

    function initDock() {
        const dayNames = {
            en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            es: ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'],
            pt: ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'],
        };
        const now = new Date();
        const isMobile = window.innerWidth <= 430;
        const numDays = isMobile ? 5 : 7;
        const weekStart = new Date(now);
        weekStart.setHours(0, 0, 0, 0);
        const dayOfWeek = now.getDay(); // 0=Sun, 1=Mon, ...6=Sat
        const daysToSunday = -dayOfWeek;
        weekStart.setDate(now.getDate() + daysToSunday + dockOffset);

        const dock = document.getElementById('dock');
        dock.innerHTML = '';

        for (let i = 0; i < numDays; i++) {
            const date = new Date(weekStart);
            date.setDate(weekStart.getDate() + i);
            const dateStr = toISO(date);
            const isToday = date.toDateString() === now.toDateString();
            const isPast = date < new Date(now.getFullYear(), now.getMonth(), now.getDate());

            // 1. Create Day Card
            const card = document.createElement('div');
            const isWeekend = date.getDay() === 0 || date.getDay() === 6;
            card.className = `day-card${isToday ? ' active' : ''}${isPast ? ' past' : ''}${isWeekend ? ' weekend' : ''}`;
            card.dataset.date = dateStr;
            card.innerHTML = `
                <span class="day-name">${(dayNames[lang] || dayNames['en'])[date.getDay()]}</span>
                <div class="day-main-row">
                    <span class="day-number">${date.getDate()}</span>
                </div>
            `;
            if (!isPast) {
                card.addEventListener('click', () => openDayNotePopup(card, dateStr));
                card.style.cursor = 'pointer';
            }
            card.addEventListener('mouseenter', () => showDayNotePreview(card, dateStr));
            card.addEventListener('mouseleave', hideDayNotePreview);
            dock.appendChild(card);

            // 2. Separators (dock only)
            if (i < numDays - 1) {
                const nextDate = new Date(weekStart);
                nextDate.setDate(weekStart.getDate() + i + 1);
                const nextIsToday = nextDate.toDateString() === now.toDateString();
                if (!isToday && !nextIsToday) {
                    const sep = document.createElement('div');
                    sep.className = 'day-separator';
                    dock.appendChild(sep);
                }
            }
        }

        renderDayNoteDots();
    }

    function initWeatherRow() {
        const now = new Date();
        const isMobile = window.innerWidth <= 430;
        const numDays = isMobile ? 5 : 7;
        const weatherRow = document.getElementById('weather');
        weatherRow.innerHTML = '';

        for (let i = 0; i < numDays; i++) {
            const date = new Date(now);
            date.setHours(0, 0, 0, 0);
            date.setDate(now.getDate() + i);
            const dateStr = toISO(date);

            const wSlot = document.createElement('div');
            wSlot.className = 'weather-day' + (i === 0 ? ' today' : '');
            wSlot.id = `dw-${dateStr}`;
            wSlot.innerHTML = `<span class="weather-icon" style="opacity:0.2">--</span>`;
            weatherRow.appendChild(wSlot);

            if (i < numDays - 1) {
                const wSep = document.createElement('div');
                wSep.className = 'weather-separator';
                weatherRow.appendChild(wSep);
            }
        }

        if (window.populateDockWeather) window.populateDockWeather();
    }

    document.getElementById('dock-prev').addEventListener('click', () => {
        dockOffset -= 1;
        initDock();
    });
    document.getElementById('dock-next').addEventListener('click', () => {
        dockOffset += 1;
        initDock();
    });

    /* ============================================================
       TIME RULER
    ============================================================ */
    const RULER_START = 0;   // midnight
    const RULER_END   = 24;  // midnight
    const RULER_SPAN  = RULER_END - RULER_START;

    window.drawSunriseSunset = function() {
        return; // Hiding for now
        const ruler = document.getElementById('time-ruler');
        ruler.querySelectorAll('.sun-label').forEach(el => el.remove());
        const sun = window.todaySunTimes;
        if (!sun) return;

        const toH = iso => { const d = new Date(iso); return d.getHours() + d.getMinutes() / 60; };
        const toPct = h => Math.max(0, Math.min(100, (h - RULER_START) / RULER_SPAN * 100));
        const fmt = iso => {
            const d = new Date(iso);
            const h = d.getHours(), mm = String(d.getMinutes()).padStart(2,'0');
            return `${h % 12 || 12}:${mm}${h >= 12 ? 'pm' : 'am'}`;
        };

        const riseH = toH(sun.rise), setH = toH(sun.set);
        const risePct = toPct(riseH), setPct = toPct(setH);


        const riseIcon = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
            <circle cx="6" cy="5" r="2.2"/>
            <line x1="6" y1="0.5" x2="6" y2="1.8"/>
            <line x1="6" y1="8.2" x2="6" y2="9.5"/>
            <line x1="9.5" y1="5" x2="10.8" y2="5"/>
            <line x1="1.2" y1="5" x2="2.5" y2="5"/>
            <line x1="8.5" y1="2.5" x2="9.4" y2="1.6"/>
            <line x1="2.6" y1="8.4" x2="3.5" y2="7.5"/>
            <line x1="8.5" y1="7.5" x2="9.4" y2="8.4"/>
            <line x1="2.6" y1="1.6" x2="3.5" y2="2.5"/>
            <line x1="0" y1="11" x2="12" y2="11"/>
            <polyline points="4,9 6,7 8,9"/>
        </svg>`;
        const setIcon = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
            <circle cx="6" cy="4" r="2.2"/>
            <line x1="6" y1="0.5" x2="6" y2="1.8"/>
            <line x1="9.5" y1="4" x2="10.8" y2="4"/>
            <line x1="1.2" y1="4" x2="2.5" y2="4"/>
            <line x1="8.5" y1="1.5" x2="9.4" y2="0.6"/>
            <line x1="2.6" y1="0.6" x2="3.5" y2="1.5"/>
            <line x1="0" y1="8" x2="12" y2="8"/>
            <polyline points="4,9.5 6,11.5 8,9.5"/>
        </svg>`;

        const makeLabel = (iso, pct, icon) => {
            const l = document.createElement('div');
            l.className = 'sun-label'; l.style.left = pct + '%';
            l.textContent = fmt(iso);
            const tip = document.createElement('div');
            tip.className = 'sun-tooltip';
            tip.innerHTML = `<span class="sun-tooltip-icon">${icon}</span><div class="sun-tooltip-bubble">${fmt(iso)}</div>`;
            l.appendChild(tip);
            ruler.appendChild(l);
        };

        if (riseH >= RULER_START && riseH <= RULER_END) makeLabel(sun.rise, risePct, riseIcon);
        if (setH  >= RULER_START && setH  <= RULER_END) makeLabel(sun.set,  setPct,  setIcon);
    };

    function buildTimeRuler() {
        const ruler = document.getElementById('time-ruler');
        ruler.querySelectorAll('.time-ruler-tick').forEach(el => el.remove());

        const now = new Date();
        const nowH = now.getHours() + now.getMinutes() / 60;

        for (let h = RULER_START; h <= RULER_END; h++) {
            const isPastH = h <= nowH;

            // Hour tick
            const pct = (h - RULER_START) / RULER_SPAN * 100;
            const tick = document.createElement('div');
            tick.className = 'time-ruler-tick hour';
            tick.style.left = pct + '%';
            tick.style.background = isPastH ? '#A78BCA' : 'var(--text-color)';
            tick.style.opacity = isPastH ? '0.55' : '0.25';
            ruler.appendChild(tick);

            if (h < RULER_END) {
                // Half-hour tick
                const halfPct = (h + 0.5 - RULER_START) / RULER_SPAN * 100;
                const isPastHalf = (h + 0.5) <= nowH;
                const half = document.createElement('div');
                half.className = 'time-ruler-tick half';
                half.style.left = halfPct + '%';
                half.style.background = isPastHalf ? '#A78BCA' : 'var(--text-color)';
                half.style.opacity = isPastHalf ? '0.35' : '0.15';
                ruler.appendChild(half);

                // Quarter-hour ticks
                [0.25, 0.75].forEach(q => {
                    const qPct = (h + q - RULER_START) / RULER_SPAN * 100;
                    const isPastQ = (h + q) <= nowH;
                    const qt = document.createElement('div');
                    qt.className = 'time-ruler-tick quarter';
                    qt.style.left = qPct + '%';
                    qt.style.background = isPastQ ? '#A78BCA' : 'var(--text-color)';
                    qt.style.opacity = isPastQ ? '0.2' : '0.08';
                    ruler.appendChild(qt);
                });
            }
        }
    }

    let timeFormatIdx = parseInt(localStorage.getItem('aura_time_format') || '0') % 2;

    function formatTime(h, m) {
        const mm = m.toString().padStart(2, '0');
        if (timeFormatIdx === 0) {
            const ampm = h >= 12 ? 'pm' : 'am';
            const h12 = h % 12 || 12;
            return h12 + ':' + mm + ampm;
        }
        return h.toString().padStart(2, '0') + ':' + mm;
    }

    (function() {
        const ruler = document.getElementById('time-ruler');
        const hoverLabel = document.getElementById('time-ruler-hover-label');
        ruler.addEventListener('mousemove', (e) => {
            const rr = ruler.getBoundingClientRect();
            const frac = Math.max(0, Math.min(1, (e.clientX - rr.left) / rr.width));
            const totalH = RULER_START + frac * RULER_SPAN;
            const h = Math.floor(totalH);
            const m = Math.round((totalH - h) * 60);
            hoverLabel.textContent = formatTime(h === 24 ? 0 : h, m === 60 ? 0 : m);
            hoverLabel.style.left = (frac * 100) + '%';
            hoverLabel.classList.add('visible');
        });
        ruler.addEventListener('mouseleave', () => {
            hoverLabel.classList.remove('visible');
        });
    })();

    document.getElementById('time-ruler-now-label').addEventListener('click', () => {
        timeFormatIdx = (timeFormatIdx + 1) % 2;
        localStorage.setItem('aura_time_format', timeFormatIdx);

    function updateTimeline() {
        const now = new Date();
        const hours = now.getHours() + now.getMinutes() / 60;
        const nowEl = document.getElementById('time-ruler-now');
        const labelEl = document.getElementById('time-ruler-now-label');
        const pastEl = document.getElementById('time-ruler-past');

        const timeStr = formatTime(now.getHours(), now.getMinutes());
        labelEl.textContent = timeStr;
        const mobileTime = document.getElementById('mobile-time');
        if (mobileTime) mobileTime.textContent = timeStr;

        nowEl.style.display = 'flex';
        if (hours < RULER_START || hours > RULER_END) {
            document.querySelector('.time-ruler-now-line').style.display = 'none';
            document.querySelector('.time-ruler-now-dot').style.display = 'none';
            nowEl.style.left = hours < RULER_START ? '0%' : '100%';
            pastEl.style.width = hours < RULER_START ? '0%' : '100%';
            return;
        }
        document.querySelector('.time-ruler-now-line').style.display = '';
        document.querySelector('.time-ruler-now-dot').style.display = '';
        const pct = (hours - RULER_START) / RULER_SPAN * 100;
        nowEl.style.left = pct + '%';
        pastEl.style.width = pct + '%';
