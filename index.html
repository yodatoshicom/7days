<script>
// Apply persisted size setting before first paint to prevent flash
(function() {
    var sizes = { 'S':'21px', 'M':'22px', 'L':'28px' };
    var r = document.documentElement;
    r.classList.add('theme-valley');

    var s = localStorage.getItem('aura_note_size');
    if (s && sizes[s]) r.style.setProperty('--note-size', sizes[s]);

    // Custom background (image or video) lives in IndexedDB (loaded async after parse).
    // This flag lets us hide the default wallpaper before that load completes,
    // so we don't get a flash of the wrong image on reload.
    if (localStorage.getItem('aura_has_custom_bg') === '1') {
        r.style.backgroundImage = 'none';
        if (localStorage.getItem('aura_custom_bg_kind') === 'video') {
            r.classList.add('has-custom-bg-video');
        }
    }
})();
</script>
<style>

:root {
    --sf-easing: cubic-bezier(0.32, 0.72, 0, 1);
    --spring-easing: cubic-bezier(0.34, 1.56, 0.64, 1);
    --bg-color: #1a1040;
    --text-color: #f0eeff;
    --accent-color: #007AFF;

/* ── Valley theme ── */
html.theme-valley {
    background-color: #1a1040;
    background-image: url('img/wallpaper.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}
html.theme-valley body {
    background-image: none !important;
    background-color: transparent;
}
/* Custom background video — sits behind everything, covers the viewport like the wallpaper */
#custom-bg-video {
    display: none;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
    pointer-events: none;
}
html.has-custom-bg-video #custom-bg-video { display: block; }
html.has-custom-bg-video { background-image: none !important; }
/* Hide entire dock by default in valley; show-old-dock brings back the big legacy dock */
html.theme-valley .dock-wrapper { display: none; }
html.theme-valley.show-old-dock .dock-wrapper {
    display: flex;
    position: relative;
    top: auto;
    left: auto;
    transform: none;
    margin-top: auto;
    margin-bottom: 60px;
}
html.theme-valley.show-old-dock .day-card,
html.theme-valley.show-old-dock .day-card:first-child,
html.theme-valley.show-old-dock .day-card:last-child,
html.theme-valley.show-old-dock .day-card:first-child:hover,
html.theme-valley.show-old-dock .day-card:last-child:hover,
html.theme-valley.show-old-dock .day-card.active,
html.theme-valley.show-old-dock .day-card.active:first-child,
html.theme-valley.show-old-dock .day-card.active:last-child {
    width: 58px;
    height: 68px;
    border-radius: 27px;
}
html.theme-valley.show-old-dock .day-card .day-name { font-size: 9px; margin-bottom: 2px; }
html.theme-valley.show-old-dock .day-card .day-number { font-size: 25px; font-weight: 700; }
/* In the old dock, weekend cards should look identical to weekday cards */
html.theme-valley.show-old-dock .day-card.weekend .day-number {
    -webkit-text-fill-color: rgba(255, 255, 255, 0.7);
    color: rgba(255, 255, 255, 0.7);
}
html.theme-valley.show-old-dock .day-card.weekend.active .day-number {
    -webkit-text-fill-color: #fff;
    color: #fff;
}
html.theme-valley.show-old-dock .dock-nav { display: flex; }
html.theme-valley.show-old-dock .weather-row { display: flex; }
/* Old dock has its own weather row — hide the timebar's per-day weather emojis to avoid duplication */
html.show-old-dock .timebar-day-weather { display: none; }
html.theme-valley.show-old-dock .header-container {
    display: block;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: 10px;
}

html.theme-valley .weather-row { color: rgba(240, 238, 255, 0.8); }
html.theme-valley .weather-day { color: rgba(240, 238, 255, 0.8); }
html.theme-valley .weather-separator {
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15) 50%, transparent);
}
/* ---- active day backlight (behind glass pill) ---- */
#active-day-light {
    display: none;

    width: 100px;

    pointer-events: none;

}


/* Note color bar — shown below note in editing mode */
.note-color-dot[data-color="default"] { background: rgba(0,0,0,0.08); }
.note-color-dot[data-color="yellow"] { background: #fbbf24; }
.note-color-dot[data-color="blue"] { background: #60a5fa; }
.note-color-dot[data-color="mint"] { background: #34d399; }
.note-color-dot[data-color="pink"] { background: #f472b6; }

.bar-color-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s var(--spring-easing), border-color 0.15s;
    flex-shrink: 0;
}
.bar-color-dot:hover { transform: scale(1.25); }
.bar-color-dot.active { border-color: var(--text-color); }
.bar-color-dot[data-color="default"] { background: rgba(128,128,128,0.25); }
.bar-color-dot[data-color="yellow"] { background: #fbbf24; }
.bar-color-dot[data-color="blue"] { background: #60a5fa; }

.greeting {
    font-size: 58px;
    font-weight: 700;
    letter-spacing: -0.05em;
    background: linear-gradient(to bottom, var(--text-color) 70%, transparent);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 0.2s ease, transform 0.3s var(--spring-easing);
    display: inline-block;
    position: relative;
}

.greeting:hover {
    opacity: 0.8;
    transform: scale(1.02);
}

.greeting:active {
    transform: scale(0.97);
}

/* Lang flash animation on greeting */
@keyframes greetingPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.03); }
    100% { transform: scale(1); }
}

.greeting.lang-switch {
    animation: greetingPulse 0.4s var(--spring-easing);
}

.header-container {

/* Sunrise / sunset markers on time ruler */
.sun-label {
    position: absolute;
    bottom: 17px;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    color: #F59E0B;
    opacity: 0.65;
    white-space: nowrap;
    transform: translateX(-50%);
    pointer-events: auto;
    letter-spacing: 0.02em;
    cursor: default;
}
.sun-label:hover { opacity: 1; }
.sun-tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%) translateY(3px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
    white-space: nowrap;
}
.sun-tooltip-icon { opacity: 0.5; display: flex; color: var(--text-color); }
.sun-tooltip-bubble {
    background: rgba(245,158,11,0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 0.5px solid rgba(245,158,11,0.25);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #F59E0B;
}
.sun-label:hover .sun-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* Time ruler — absolute, sits on top edge of week bar */
.time-ruler {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: calc((100% - 90px) * 0.8);
    height: 44px;
    margin-bottom: -3px;
    user-select: none;
    -webkit-user-select: none;
}

.time-ruler-track {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, var(--text-color) 50%, transparent 100%);
    opacity: 0.15;
}

.time-ruler-past {
    position: relative;
    height: 100%;
    background: linear-gradient(to right, rgba(167,139,202,0.08), rgba(167,139,202,0.5));
    border-radius: 1px;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: visible;
}
.time-ruler-past::before {
    content: '';
    position: absolute;
    top: 0;
    left: 20%;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.5));
    border-radius: 1px;
    pointer-events: none;
}
.time-ruler-past::after {
    content: '';
    position: absolute;
    right: -10px;
    top: -5px;
    width: 20px;
    height: 11px;
    background: rgba(167,139,202,0.55);
    filter: blur(6px);
    border-radius: 50%;
    pointer-events: none;
}

.time-ruler-tick {
    position: absolute;
    bottom: 1px;
    width: 1px;
    transform: translateX(-50%);
    border-radius: 1px;
}

.time-ruler-tick.hour    { height: 14px; }
.time-ruler-tick.half    { height: 7px; }
.time-ruler-tick.quarter { height: 3px; }

.time-ruler-now {
    position: absolute;
    top: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    transform: translateX(-50%);
    filter: drop-shadow(0 0 5px rgba(167,139,202,0.4));
}

.time-ruler-now-line {
    flex: 1;
    width: 1.5px;
    position: relative;
    background: linear-gradient(to bottom, rgba(167,139,202,0.0), rgba(167,139,202,0.95));
    border-radius: 1px;
    margin: 2px 0 2px;
}

.time-ruler-now-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #c580fb;
    border: 1.5px solid rgba(255,255,255,0.65);
    box-shadow: 0 0 0 3px rgba(167,139,202,0.25), 0 0 14px rgba(167,139,202,0.7);
    animation: yearDotPulse 3s ease-in-out infinite;
    flex-shrink: 0;
}

.time-ruler-hover-label {
    position: absolute;
    top: 0;
    pointer-events: none;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 3px 10px;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 20;
}
.time-ruler-hover-label.visible { opacity: 1; }

.time-ruler-now-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    margin-top: 10px;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    color: #7B52B0;
    white-space: nowrap;
    flex-shrink: 0;
    background: rgba(167,139,202,0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(167,139,202,0.3);
    border-radius: 20px;
    padding: 3px 10px;
    cursor: pointer;
    user-select: none;
    pointer-events: auto;
}


/* THE PRO STUDIO DOCK */
.dock-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    margin-top: auto;
    margin-bottom: 250px;
}

.dock-row {
    display: flex;
    align-items: center;
    gap: 5px;
    position: relative;
}

.dock-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: none;
    color: var(--text-color);
    cursor: pointer;
    opacity: 0.25;
    transition: opacity 0.25s ease, transform 0.25s var(--sf-easing);
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    -webkit-tap-highlight-color: transparent;
}

.dock-nav:hover {
    opacity: 0.6;
}

.dock-nav:active {
    transform: scale(0.75);
    opacity: 0.4;
}

.dock-container {
    position: relative;
    padding: 8px;
    background: rgba(20, 10, 40, 0.55);
    backdrop-filter: blur(40px) saturate(130%) contrast(110%);
    -webkit-backdrop-filter: blur(40px) saturate(130%) contrast(110%);
    border-radius: 40px;
    border: none;

    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -1px 0 rgba(0, 0, 0, 0.08),
        0 12px 40px rgba(0, 0, 0, 0.25),
        0 2px 8px rgba(0, 0, 0, 0.12);

    display: flex;
    gap: 4px;
    align-items: center;
    user-select: none;
    z-index: 1000;
}


.day-separator {
    display: none;
}

.day-card {
    width: 64px;
    height: 76px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: transparent;
    border-radius: 30px;
    color: rgba(255, 255, 255, 0.6);
    transition:
        transform 0.5s var(--sf-easing),
        background 0.3s var(--sf-easing),
        box-shadow 0.3s var(--sf-easing);
    cursor: default;
    position: relative;
}


.day-card:hover {
    background: rgba(255, 255, 255, 0.05);
    transform: none;
}

.day-card:active {
    transform: scale(0.92) translateY(0);
    transition: transform 0.1s var(--sf-easing);
}

.day-card.active {
    background: rgba(255, 255, 255, 0.06);
    border: none;
    filter: none;
    z-index: 2;
    box-shadow: none;
}

.day-card.active::after {
    content: none;
}

.day-name {
    color: rgba(255, 255, 255, 0.35);
    font-size: 7px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 1px;
    letter-spacing: 0.06em;
}

.day-card.active .day-name { color: rgba(220, 180, 255, 0.7); }

.day-card.weekend .day-number {
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    -webkit-text-fill-color: rgba(210, 185, 255, 0.75);
    color: rgba(210, 185, 255, 0.75);
}

.day-card.weekend.active .day-number {
    background: none;
    -webkit-background-clip: unset;
    -webkit-text-fill-color: unset;
    background-clip: unset;
}

.day-number {
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    -webkit-text-fill-color: rgba(255, 255, 255, 0.7);
    color: rgba(255, 255, 255, 0.7);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    transition: font-weight 0.4s var(--sf-easing);
}

.day-card.active .day-number {
    font-weight: 700;
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    -webkit-text-fill-color: #fff;
    color: #fff;
}

.day-card.active:hover { background: rgba(255, 255, 255, 0.08); }

/* Inline weather inside day cards */
.day-main-row {
    display: flex;
    align-items: center;
    gap: 4px;
}

.weather-separator {
    width: 1px;
    height: 28px;
    background: linear-gradient(to bottom, transparent, rgba(120,120,128,0.2) 50%, transparent);
    flex-shrink: 0;
}

/* WEATHER ROW — below the dock */
.weather-row {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 54px;
    margin-top: 10px;
    opacity: 0.7;
}

.weather-day {
    width: 52px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: 0.3s;
    pointer-events: auto;
    cursor: pointer;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-color);
}

.weather-day:hover { opacity: 1; transform: translateY(-1px); }

.weather-day .weather-icon { font-size: 13px; margin-bottom: 0; margin-right: 4px; }
.weather-day .weather-temp { font-size: 10px; font-weight: 700; opacity: 0.8; }

.weather-separator {
    width: 1px;
    height: 10px;
    background: linear-gradient(to bottom, transparent, rgba(120,120,128,0.3) 50%, transparent);
    flex-shrink: 0;
}

.weather-day.today {
    filter: drop-shadow(0 0 6px rgba(0, 122, 255, 0.5));
}

.weather-icon { font-size: 14px; margin-bottom: 1px; }
.weather-temp { font-size: 10px; font-weight: 700; }


.weather-tooltip {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Caveat', cursive;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.01em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 9998;
    color: var(--text-color);
    text-align: center;
    white-space: nowrap;
}

.weather-tooltip.show {
    opacity: 0.4;
}


.city-tooltip {
    display: none;
    position: fixed;
    bottom: max(16px, calc(16px + env(safe-area-inset-bottom)));
    right: 30px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.2;
    z-index: 9999;
    pointer-events: auto;
    cursor: pointer;
    transition: 0.3s;
}

.city-tooltip:hover {
    opacity: 0.6;
    transform: scale(1.05);
}



.note {
    font-family: Caveat;
    font-size: 12px;
    position: absolute;
    width: fit-content;
    min-width: 0;
    max-width: 600px;
    min-height: 40px;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.015);
    backdrop-filter: blur(3px)!important;
    -webkit-backdrop-filter: blur(3px)!important;
    border: none;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 30px;
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -1px 0 rgba(0, 0, 0, 0.08),
        0 4px 16px rgba(0, 0, 0, 0.12);
    color: #f0eeff;
    white-space: normal;
    z-index: 1100;
    cursor: grab;
    transition: transform 0.4s var(--spring-easing), box-shadow 0.3s var(--sf-easing), opacity 0.3s ease;
    overflow: visible;
    resize: none;
    user-select: none;
    -webkit-user-select: none;
}
.note.selected {
    outline: 2px solid rgba(197, 128, 251, 0.7);
    outline-offset: 0px;
}
.note .note-content {
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: break-word;
}
.note textarea { color: inherit; }

.note[data-note-color="yellow"] { color: #fef3c7; }
.note[data-note-color="blue"] { color: #dbeafe; }
.note[data-note-color="mint"] { color: #d1fae5; }
.note[data-note-color="pink"] { color: #fce7f3; }

/* Caveat handwriting reads cleanest in pure white — only on default-color notes */
.note:not([data-note-color]) { color: #ffffff; }


.note:active:not(:has(.note-resize-handle:active)) {
    transform: none;
}

.note.dragging {
    cursor: grabbing;
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.15);
    transition: transform 0.4s var(--spring-easing), padding 0.3s var(--sf-easing),
                border-radius 0.3s var(--sf-easing), opacity 0.25s ease;
}

.note.dragging.near-dock {
    padding: 6px 14px;
    border-radius: 30px;
    opacity: 0.85;
    pointer-events: none;
    transform-origin: center center;
    transition: transform 0.35s var(--spring-easing), padding 0.3s var(--sf-easing),
                border-radius 0.3s var(--sf-easing), opacity 0.25s ease;
}

.note.dragging.near-dock .note-content {
    transition: font-size 0.3s var(--sf-easing), max-height 0.3s var(--sf-easing);
    font-size: 13px;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
    max-height: 1.1em;
}

.note.dragging.near-dock .note-resize-handle,
.note.dragging.near-dock .note-close,
.note.dragging.near-dock .note-color-bar {
    opacity: 0;
    pointer-events: none;
}

/* Note close button — top right corner */
.note-close {
    position: absolute;
    top: -2px;
    right: -6px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #FF5F57;
    border: 0.5px solid rgba(0, 0, 0, 0.12);
    box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transform: scale(0);
    transition: transform 0.3s var(--spring-easing), opacity 0.2s ease, filter 0.15s ease;
}

.note:hover .note-close,
.note.editing .note-close {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
}

.note-close:active {
    filter: brightness(0.8);
}

.note-close svg {
    width: 8px;
    height: 8px;
    stroke: rgba(255, 255, 255, 0.9);
    stroke-width: 1.6;
    fill: none;
    transition: stroke 0.1s ease;
}

.note-close:hover svg {
    stroke: rgba(77, 0, 0, 0.9);
}

.note-alerts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 6px;
    pointer-events: auto;
}
.note-alert-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    line-height: 1;
    font-weight: 800;
    font-size: 1.05em;
    letter-spacing: 0.01em;
    background: linear-gradient(90deg, #c580fb, #6aa9ff, #34d399, #f5b942, #f472b6, #c580fb);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    animation: alert-shine 6s linear infinite;
    user-select: none;
}
.note-alert-icon,
.note-alert-text {
    display: inline-block;
    line-height: 1;
}
@keyframes alert-shine {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
}
.note-alert-x {
    border: none;
    background: none;
    color: rgba(0,0,0,0.45);
    -webkit-text-fill-color: rgba(0,0,0,0.45);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 0 2px;
}
.note-alert-x:hover { color: rgba(0,0,0,0.85); -webkit-text-fill-color: rgba(0,0,0,0.85); }

.note-content {
    font-family: var(--note-font);
    font-weight: var(--note-weight, 400);
    font-size: var(--note-size);
    line-height: 1.1;
    outline: none;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: normal;
    user-select: none;
    -webkit-user-select: none;
}

/* Blurred note content state */
.note.blurred .note-content,
.note.blurred .note-image {
    filter: blur(4px);
    opacity: 0.6;
    transition: filter 0.3s ease, opacity 0.3s ease;
    user-select: none;
    pointer-events: none;
}

.note.blurred:hover .note-content,
.note.blurred:hover .note-image {
    filter: blur(1.5px);
    opacity: 0.8;
}

/* Selection rectangle overlay */
.selection-rect {
    position: fixed;
    border: 1px solid rgba(0, 122, 255, 0.5);
    background: rgba(0, 122, 255, 0.05);
    pointer-events: none;
    z-index: 999;
    border-radius: 4px;
    transition: none;
    display: none;
}

/* ── Page Navigation Dots ── */
.page-dots {
    display: none !important;
    position: fixed;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 1200;
    padding: 6px 3px;
}
.page-dot {
    width: 6px;
    height: 14px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
    border: 0.5px solid rgba(255, 255, 255, 0.1);
}
.page-dot:hover {
    background: rgba(255, 255, 255, 0.45);
    transform: scale(1.1);
}
.page-dot.active {
    width: 8px;
    height: 20px;
    border-radius: 5px;
    background: rgba(255, 255, 255, 0.65);
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
    border: 0.5px solid rgba(255, 255, 255, 0.25);
}
/* Circle variant */
.page-dots.circles .page-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}
.page-dots.circles .page-dot.active {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}
/* Shape toggle button */
.page-shape-toggle {
    display: none !important;
    position: fixed;
    bottom: 12px;
    right: 12px;
    width: 22px;
    height: 22px;
    border: none;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 6px;
    cursor: pointer;
    z-index: 1200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.25s ease, opacity 0.25s ease;
    opacity: 0.4;
}
.page-shape-toggle:hover {
    background: rgba(255, 255, 255, 0.25);
    opacity: 0.7;
}
.page-shape-toggle svg {
    width: 12px;
    height: 12px;
    fill: rgba(255, 255, 255, 0.8);
}

/* Disable text selection during multi-select mode */
body.is-selecting {
    user-select: none;
    -webkit-user-select: none;
}

/* Highlight notes that would be selected during rectangle draw */
.note.potential-select {
    outline: 2px solid rgba(197, 128, 251, 0.5);
    outline-offset: 0px;
}

body.note-editing-mode .note.editing {
    user-select: text;
    -webkit-user-select: text;
}

body.note-editing-mode .note.editing .note-content,
body.note-editing-mode .note.editing textarea {
    user-select: text;
    -webkit-user-select: text;
}

.note-edit-ta {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--note-font);
    font-weight: var(--note-weight, 400);
    font-size: var(--note-size);
    line-height: 1.1;
    color: inherit;
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    overflow: hidden;
    field-sizing: content;
}
.note-content a {
    color: var(--accent-color);
    text-decoration: none;
    border-bottom: 2px solid rgba(0, 122, 255, 0.2);
    font-family: inherit !important;
}

/* Image notes */
.note.image-note {
    padding: 6px !important;
    overflow: visible;
    /* backdrop-filter conflicts with video compositor layers causing blank frames
       after tab switches — image/video covers the full note so this is safe to remove */
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
}

.note.image-note .note-content,
.note.image-note .note-color-bar {
    display: none;
}



.note-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 30px;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-user-drag: none;
}

video.note-image {
    pointer-events: none;
}

.video-play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
}

.note.image-note:hover .video-play-btn {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

.video-play-btn:hover {
    background: rgba(0, 0, 0, 0.75);
}

.video-play-btn:active {
    transform: translate(-50%, -50%) scale(0.9);
}

/* ── Video upload progress indicator ── */
.video-upload-indicator {
    position: fixed;
    z-index: 9000;
    width: 180px;
    padding: 14px 16px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 0.5px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 8px 30px rgba(0, 0, 0, 0.25);
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
    animation: vui-in 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes vui-in {
    from { opacity: 0; transform: scale(0.85) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
}
.video-upload-indicator.done {
    animation: vui-out 0.22s ease forwards;
}
@keyframes vui-out {
    to { opacity: 0; transform: scale(0.88) translateY(4px); }
}
.vui-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 6px;
}
.vui-label svg {
    opacity: 0.6;
    flex-shrink: 0;
}
.vui-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
}
.vui-bar {
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.55);
    border-radius: 99px;
    transition: width 0.12s ease;
}




/* ── Note editing mode — page blur ── */
.note-edit-overlay {
    display: none;
}
body.note-editing-mode .note-edit-overlay { display: none; }
body.note-editing-mode .note.editing { z-index: 2000 !important; }

.note-context-menu {
    position: fixed;
    z-index: 10000;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border: 0.5px solid rgba(255, 255, 255, 0.35);
    border-radius: 18px;
    padding: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 140px;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.92);
    transform-origin: top left;
    transition: opacity 0.15s ease, transform 0.25s var(--spring-easing);
}
.note-context-menu.show {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
}
.ncm-section {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 4px;
}
.ncm-section.colors {
    justify-content: space-between;
    padding: 4px 8px;
}
.ncm-sep {
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
    margin: 2px 4px;
}
.ncm-btn {
    flex: 1;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-color);
    font-size: 14px;
    transition: background 0.1s;
    user-select: none;
}
.ncm-btn:hover { background: rgba(255, 255, 255, 0.1); }
.ncm-btn:active { transform: scale(0.95); }

.ncm-color-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s var(--spring-easing);
}
.ncm-color-dot:hover { transform: scale(1.2); }
.ncm-color-dot.active { border-color: #fff; }
.ncm-color-dot[data-color="default"] { background: rgba(128,128,128,0.4); }
.ncm-color-dot[data-color="yellow"] { background: #fbbf24; }
.ncm-color-dot[data-color="blue"] { background: #60a5fa; }
.ncm-color-dot[data-color="mint"] { background: #34d399; }
.ncm-color-dot[data-color="pink"] { background: #f472b6; }

/* SVG arc resize handle */
.note-resize-handle {
    position: absolute;
    bottom: -5px;
    right: -5px;
    width: 38px;
    height: 38px;
    cursor: nwse-resize;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s var(--sf-easing);
    pointer-events: none;
}
.note-resize-handle svg {
    pointer-events: none;
}
.note-resize-handle .rh-fill {
    pointer-events: stroke;
    cursor: nwse-resize;
}

.note:hover .note-resize-handle { opacity: 1; pointer-events: none; }
.note:hover .note-resize-handle .rh-fill { pointer-events: stroke; }

.note-resize-handle .rh-fill { }



html.hide-ruler .time-ruler {
    display: none !important;
}
html.hide-ruler .dock-wrapper {
    margin-top: auto;
}




.old-dock-toggle-btn {
    position: fixed;
    top: 24px;
    right: 60px;
    z-index: 10001;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    opacity: 0.3;
    transition: opacity 0.3s ease, transform 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    padding: 0;
}
.old-dock-toggle-btn:hover { opacity: 0.8; }
.old-dock-toggle-btn:active { transform: scale(0.9); }
.old-dock-toggle-btn.active { opacity: 0.9; }


.app-logo {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10001;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    opacity: 0.9;
    cursor: pointer;
    user-select: none;
    background: transparent;
    border: none;
    padding: 0;
    transition: transform 0.3s var(--spring-easing), opacity 0.2s ease;
}
.app-logo:hover { opacity: 1; transform: translateX(-50%) scale(1.08); }
.app-logo:active { transform: translateX(-50%) scale(0.94); }
.app-logo svg { width: 28px; height: 28px; }


.settings-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10001;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    opacity: 0.35;
    transition: opacity 0.4s ease, transform 0.4s var(--spring-easing);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    padding: 0;
}

.settings-btn:hover { opacity: 1; }
.settings-btn:active { transform: scale(0.92); }
.settings-btn.open { opacity: 1; }


.settings-btn svg {
    transition: transform 0.5s var(--spring-easing);
}
.settings-btn:hover svg { transform: rotate(45deg); }

/* Dev export */
.dev-export-btn {
    position: fixed;
    top: 70px;
    right: 20px;
    z-index: 10001;
    display: none;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    opacity: 0.8;
    letter-spacing: 0.02em;
}
.dev-export-btn:hover { opacity: 1; }
body.dev-mode .dev-export-btn { display: block; }
.dev-only { display: none; }
body.dev-mode .dev-only { display: block; }
.delete-confirm-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 99999;
    align-items: center;
    justify-content: center;
}
.delete-confirm-modal.open { display: flex; }
.delete-confirm-box {
    background: rgba(28, 28, 30, 0.92);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px 24px 20px;
    width: 300px;
    max-width: 90vw;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    animation: delete-confirm-in 0.18s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes delete-confirm-in {
    from { opacity: 0; transform: scale(0.88); }
    to   { opacity: 1; transform: scale(1); }
}
.delete-confirm-msg {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.88);
    line-height: 1.4;
}
.delete-confirm-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
}
.delete-confirm-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
}
.delete-confirm-cancel {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
}
.delete-confirm-cancel:hover { background: rgba(255,255,255,0.16); }
.delete-confirm-delete {
    background: #ff3b30;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
}
.delete-confirm-delete:hover { background: #ff1f12; }

.dev-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
}
.dev-modal.open { display: flex; }
.dev-modal-box {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 20px;

    max-width: 90vw;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.dev-modal-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.05em;
}
.dev-modal textarea {
    background: #111;
    border: 1px solid rgba(255,255,255,0.1);

    color: #a8ff78;

    padding: 12px;

.dev-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.dev-modal-copy {

.dev-modal-close {

}

.settings-panel {
    position: fixed;
    top: 58px;
    right: 20px;
    z-index: 10000;
    background: rgba(22, 22, 24, 0.88);
    backdrop-filter: blur(60px) saturate(180%);
    -webkit-backdrop-filter: blur(60px) saturate(180%);
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 18px;
    padding: 18px;
    box-shadow:
        0 20px 50px rgba(0,0,0,0.4),
        inset 0 1px 0 0 rgba(255,255,255,0.08);
    width: 220px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-12px) scale(0.92);
    transform-origin: top right;
    transition: opacity 0.3s ease, transform 0.5s var(--spring-easing);
    user-select: none;
}

.settings-panel.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0) scale(1);
}

.settings-section-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.4;
    color: rgba(255,255,255,0.9);
    margin-bottom: 6px;
}

.settings-divider {
    height: 0.5px;
    background: rgba(255, 255, 255, 0.12);
    margin: 10px -2px;
}

.settings-discord-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 2px 0;
    color: #b8c0ff;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-decoration: none;
    opacity: 0.85;
}
.settings-discord-link:hover { opacity: 1; text-decoration: none; }
.settings-discord-link svg { flex-shrink: 0; }

.settings-location-input {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.settings-location-input::placeholder { color: rgba(255,255,255,0.3); }

.settings-location-input:focus {
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
}

.settings-toggle {
    display: flex;
    gap: 2px;
    padding: 2px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
}

.settings-toggle-btn {
    flex: 1;
    padding: 6px 0;
    border: none;
    border-radius: 8px;
    background: transparent;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    opacity: 0.4;
    cursor: pointer;
    transition: opacity 0.2s, background 0.2s, box-shadow 0.2s;
}

.settings-toggle-btn.active {
    opacity: 1;
    background: rgba(255,255,255,0.12);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

.settings-action-row {
    display: flex;
    gap: 6px;
}
.settings-action-btn {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.9);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease, transform 0.1s ease;
}
.settings-action-btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.18);
}
.settings-action-btn:active { transform: scale(0.97); }
.settings-action-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
}
.settings-action-btn:disabled:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.10);
}
.settings-action-btn svg { opacity: 0.8; }

/* PAST DAY CARDS */
.day-card.past {
    cursor: default !important;
    opacity: 0.5;
}

.day-card.past:hover {
    background: transparent;
    transform: none;
}

/* DAY CARD DRAG-OVER HIGHLIGHT */
.day-card.drag-over {
    background: rgba(0, 122, 255, 0.08);
    transform: translateY(-4px) scale(1.04);
    transition: transform 0.2s var(--spring-easing), background 0.2s ease;
}





/* Bottom watermark — Alcove-style fading text */
.bottom-watermark {
    display: block;
    position: fixed;
    bottom: -0.18em;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(100px, 14vw, 220px);
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    letter-spacing: 0.01em;
    line-height: 0.85;
    color: var(--text-color);
    opacity: 0.1;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
    z-index: 0;
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.25) 55%, transparent 85%);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.25) 55%, transparent 85%);

}

/* ── backdrop-filter unsupported fallback (Firefox, some Windows) ── */
@supports not (backdrop-filter: blur(1px)) {
    .dock-container  { background: rgba(240, 240, 240, 0.92); }
    .note            { background: rgba(245, 245, 245, 0.96); }
    .settings-panel  { background: rgba(22, 22, 24, 0.95); }
    .note-arrow-bar  { background: rgba(240, 240, 240, 0.96); }
    .note-edit-overlay { background: rgba(0,0,0,0.35); }
}

/* ── Timebar — days of current month ── */
.timebar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    z-index: 600;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s ease;
}
.timebar.ready { opacity: 1; }
.timebar-inner {
    display: flex;
    align-items: flex-end;
    gap: 0; /* days are flush so cursor never leaves the hit zone */
    padding: 16px 10px 0; /* transparent top buffer keeps hover alive above */
    max-width: 100vw;
    box-sizing: border-box;
    pointer-events: auto;
}
.timebar-day {
    box-sizing: border-box;
    flex: 0 0 auto;
    position: relative;
    width: clamp(26px, 2.5vw, 36px);
    height: 30px;
    color: rgba(240, 238, 255, 0.6);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    line-height: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 2px;
    padding-top: 10px;
    transition: height 0.32s var(--spring-easing),
                color 0.25s ease;
    cursor: pointer;
    overflow: visible;
    user-select: none;
    -webkit-user-select: none;
    background: transparent;
}
.timebar-day-num { line-height: 1; }
/* Visible day shape — drawn inside a transparent margin so days are flush in the DOM */
.timebar-day::before {
    content: '';
    position: absolute;
    left: 3px;
    right: 3px;
    top: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.015);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 0.5px solid rgba(255, 255, 255, 0.15);
    border-radius: 22px 22px 0 0;
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 -1px 0 rgba(0, 0, 0, 0.08),
        0 4px 16px rgba(0, 0, 0, 0.12);
    transition: background 0.25s ease, border-top-color 0.25s ease;
    pointer-events: none;
    z-index: -1;
}
/* .is-this-week is kept as a data flag for weather emoji attachment — no
   visual styling. Only today stands out (rule below). */
/* Today — brightest tint, stronger glow */
.timebar-day.is-today {
    color: #f0eeff;
}
.timebar-day.is-today::before {
    background: rgba(197, 128, 251, 0.26);
    border-top-color: rgba(197, 128, 251, 0.65);
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 -1px 0 rgba(0, 0, 0, 0.10),
        0 6px 26px rgba(197, 128, 251, 0.32);
}
.timebar-day-wd {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    line-height: 1;
    opacity: 0;
    transform: translateY(-3px);
    transition: opacity 0.22s ease, transform 0.22s var(--spring-easing);
    pointer-events: none;
}
/* Weather emoji — floats above the pill, outside the day shape */
.timebar-day-weather {
    position: absolute;
    left: 50%;
    bottom: calc(100% + 6px);
    transform: translateX(-50%);
    font-size: 15px;
    line-height: 1;
    user-select: none;
    -webkit-user-select: none;
    filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.35));
    opacity: 0.95;
    z-index: 2;
    white-space: nowrap;
    cursor: default;
}
.timebar-day.is-today .timebar-day-weather {
    font-size: 17px;
    opacity: 1;
}
.timebar-day:hover .timebar-day-wd,
.timebar-day.is-today .timebar-day-wd {
    opacity: 0.85;
    transform: translateY(0);
}

/* During active magnification, JS drives heights every frame — no transition */
.timebar-inner.is-magnifying .timebar-day {
    transition: color 0.25s ease;
}
.timebar-inner.is-magnifying .timebar-day:hover { color: #f0eeff; }

/* Range-select highlight while dragging across days */
.timebar-day.is-selecting::before {
    background: rgba(120, 200, 255, 0.18);
    border-top-color: rgba(120, 200, 255, 0.65);
}
/* Saved event marker — tinted background on the day pill */
.timebar-day.has-event {
    color: rgba(255, 255, 255, 0.95);
    text-shadow: 0 0 6px rgba(255, 255, 255, 0.18);
}
.timebar-day.has-event::before {
    background:
        linear-gradient(180deg,
            var(--event-bg, rgba(197, 128, 251, 0.34)) 0%,
            var(--event-bg-fade, rgba(197, 128, 251, 0.12)) 100%);
    border-top: 0.5px solid var(--event-border, rgba(197, 128, 251, 0.75));
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -1px 0 rgba(0, 0, 0, 0.10),
        0 4px 22px var(--event-glow, rgba(197, 128, 251, 0.32));
}
.timebar-day.has-event:hover .timebar-day-wd,
.timebar-day.has-event.is-today .timebar-day-wd {
    opacity: 0.95;
}

.timebar-event-popover {
    position: fixed;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    background: rgba(20, 10, 40, 0.92);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    z-index: 1000;
}
.timebar-event-popover input {
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    outline: none;
    min-width: 200px;
}
.timebar-event-popover input::placeholder { color: rgba(255,255,255,0.4); }
.timebar-event-popover button {
    background: none; border: none;
    color: rgba(255,255,255,0.55);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 0 4px;
}
.timebar-event-popover button:hover { color: rgba(255, 100, 100, 0.9); }

.timebar-event-tooltip {
    position: fixed;
    pointer-events: none;
    padding: 7px 12px 7px 16px;
    background: linear-gradient(180deg,
        rgba(30, 18, 56, 0.94) 0%,
        rgba(18, 10, 38, 0.94) 100%);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 0.5px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    color: rgba(255,255,255,0.96);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.01em;
    line-height: 1.35;
    white-space: nowrap;
    max-width: min(320px, 80vw);
    box-shadow:
        0 8px 28px rgba(0, 0, 0, 0.4),
        0 2px 6px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
    z-index: 999;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.18s ease, transform 0.22s var(--spring-easing);
}
.timebar-event-tooltip.visible {
    opacity: 1;
    transform: translateY(0);
}
/* Accent bar — tinted with the event color */
.timebar-event-tooltip::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 7px;
    bottom: 7px;
    width: 2px;
    border-radius: 2px;
    background: var(--tt-accent, rgba(197, 128, 251, 0.95));
    box-shadow: 0 0 8px var(--tt-accent, rgba(197, 128, 251, 0.6));
}
/* Caret — points down at the day pill, positioned via --caret-x */
.timebar-event-tooltip::after {
    content: '';
    position: absolute;
    left: var(--caret-x, 50%);
    bottom: -4px;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 5px solid transparent;

<script>
    /* ============================================================
       BACKGROUND GEOMETRY & MESH
    ============================================================ */
    const geoModes = ['off', 'dots', 'web', 'stellar', 'tribon', 'mesh'];
    let currentGeo = localStorage.getItem('aura_bg_geo') || 'off';

    function initMeshBg() {
        const W = window.innerWidth, H = window.innerHeight;
        const PAD = 200;
        const TW = W + PAD * 2, TH = H + PAD * 2;
        const balls = [
            { x: W *  1.20 - 300 + PAD, y: H * -0.10 + 300 + PAD, r: 300, color: '#007AFF' },
            { x: W * -0.18 + 275 + PAD, y: H *  1.12 - 275 + PAD, r: 275, color: '#FF3B30' },
            { x: W *  0.93 - 250 + PAD, y: H *  0.83 - 250 + PAD, r: 250, color: '#5856D6' },
        ];
        const iframe = document.getElementById('mesh-iframe');
        if (!iframe) return;
        const circles = balls.map(b =>
            `<div style="position:absolute;width:${b.r*2}px;height:${b.r*2}px;left:${b.x-b.r}px;top:${b.y-b.r}px;border-radius:50%;background:${b.color};"></div>`
        ).join('');
        const srcdoc = `<!DOCTYPE html><html><head><style>
            *{margin:0;padding:0;box-sizing:border-box;}
            body{width:${TW}px;height:${TH}px;overflow:hidden;background:transparent;filter:blur(120px);}
        </style></head><body>${circles}</body></html>`;
        iframe.srcdoc = srcdoc;
        iframe.style.top = `-${PAD}px`;
        iframe.style.left = `-${PAD}px`;
        iframe.style.width = `${TW}px`;
        iframe.style.height = `${TH}px`;
    }

    function drawBgGeo() {
        const canvas = document.getElementById('dot-connections');
        if (!canvas) return;
        const W = window.innerWidth, H = window.innerHeight;
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, W, H);

        if (currentGeo === 'web') {
            const STEP = 22, OFF = 11;
            const cols = Math.ceil(W / STEP) + 1, rows = Math.ceil(H / STEP) + 1;
            ctx.strokeStyle = 'rgba(0,0,0,0.13)';
            ctx.lineWidth = 1;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = c * STEP + OFF, y = r * STEP + OFF;
                    if (c < cols - 1 && Math.random() < 0.14)
                        { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + STEP, y); ctx.stroke(); }
                    if (r < rows - 1 && Math.random() < 0.14)
                        { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + STEP); ctx.stroke(); }
                }
            }
        } else if (currentGeo === 'stellar') {
            const N = Math.floor((W * H) / 14000);
            const pts = Array.from({ length: N }, () => ({ x: Math.random() * W, y: Math.random() * H }));
            const MAX_DIST = 160;
            ctx.lineWidth = 0.8;
            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < MAX_DIST) {
                        const alpha = (1 - d / MAX_DIST) * 0.22;
                        ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
                        ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke();
                    }
                }
            }
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 1.3, 0, Math.PI * 2); ctx.fill(); });
        } else if (currentGeo === 'tribon') {
            const A1 = 0.5436890126920764, A2 = 0.2956120693571985;
            const N = Math.floor((W * H) / 6500);
            ctx.fillStyle = 'rgba(0,0,0,0.38)';
            for (let i = 0; i < N; i++) {
                const x = ((0.5 + i * A1) % 1) * W, y = ((0.5 + i * A2) % 1) * H;
                ctx.beginPath(); ctx.arc(x, y, 1.2, 0, Math.PI * 2); ctx.fill();
            }
        }
    }

    function applyBgGeo(mode, noSave = false) {
        geoModes.forEach(m => document.body.classList.remove('bg-geo-' + m));
        document.body.classList.add('bg-geo-' + mode);
        currentGeo = mode;
        if (mode === 'mesh') initMeshBg();
        drawBgGeo();
        if (!noSave) localStorage.setItem('aura_bg_geo', mode);
    }

    window.addEventListener('resize', () => {
        if (currentGeo === 'mesh') initMeshBg();
        drawBgGeo();
    });

    /* ============================================================
       LANGUAGE SYSTEM: EN / ES / PT (3-way cycle)
    ============================================================ */
    // ---- IndexedDB for media blobs ----
    const mediaDB = (function() {
        const DB_NAME = 'aura_media';
        const STORE = 'blobs';
        let dbPromise;
        function open() {
            if (!dbPromise) {
                dbPromise = new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, 1);
                    req.onupgradeneeded = () => req.result.createObjectStore(STORE);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }
            return dbPromise;
        }
        return {
            async put(key, data) {
                const db = await open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE, 'readwrite');
                    tx.objectStore(STORE).put(data, key);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },
            async get(key) {
                const db = await open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE, 'readonly');
                    const req = tx.objectStore(STORE).get(key);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            async del(key) {
                const db = await open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE, 'readwrite');
                    tx.objectStore(STORE).delete(key);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },
            async keys() {
                const db = await open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE, 'readonly');
                    const req = tx.objectStore(STORE).getAllKeys();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }
        };
    })();

    const LANGS = ['en', 'es', 'pt'];
    const LANG_LABELS = { en: 'EN', es: 'ES', pt: 'PT' };
    let lang = LANGS.includes(localStorage.getItem('aura_lang')) ? localStorage.getItem('aura_lang') : 'en';
    const dock = document.getElementById('dock');
    let notes = JSON.parse(localStorage.getItem('aura_notes_v3')) || [];
    const PAGE_COUNT = 4;
    let currentPage = parseInt(localStorage.getItem('aura_current_page') || '0', 10);
    if (isNaN(currentPage) || currentPage < 0 || currentPage >= PAGE_COUNT) currentPage = 0;

    // Ensure all notes have a page property
    notes.forEach(n => { if (n.page == null) n.page = 0; });

    function switchPage(page) {
        if (page === currentPage) return;
        clearSelection();
        currentPage = page;
        localStorage.setItem('aura_current_page', String(page));
        // Hide/show notes based on page
        document.querySelectorAll('.note').forEach(el => {
            const d = notes.find(n => n.id === el.id);
            const show = (d && d.page === currentPage);
            const wasHidden = el.style.display === 'none';
            el.style.display = show ? '' : 'none';
            if (show && wasHidden) {
                const vid = el.querySelector('video');
                if (vid && vid.src) vid.load();
            }
        });
        renderPageDots();
    }

    function renderPageDots() {
        let container = document.getElementById('page-dots');
        if (!container) {
            container = document.createElement('div');
            container.className = 'page-dots';
            container.id = 'page-dots';
            document.body.appendChild(container);
        }
        container.className = 'page-dots';
        container.innerHTML = '';
        for (let i = 0; i < PAGE_COUNT; i++) {
            const dot = document.createElement('div');
            dot.className = 'page-dot' + (i === currentPage ? ' active' : '');
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                switchPage(i);
            });
            container.appendChild(dot);
        }
    }
    renderPageDots();

    // Shape toggle button removed

    let selectedNoteIds = new Set();
    const selRect = document.getElementById('selection-rect');
    let isSelecting = false;
    let selStart = { x: 0, y: 0 };

    // First time — seed hint notes
    if (notes.length === 0) {
        notes = [
            { "id": "n1776098065375vhb9", "x": 276, "y": 60,  "w": 271, "text": "add to your homepage 🏡", "page": 0, "zIndex": 100 },
            { "id": "n1776098095232",      "x": 274, "y": 133, "w": 176, "h": 96, "manualResize": true, "text": "double click to create a note", "page": 0, "zIndex": 101 },
            { "id": "n1776098589852",      "x": 45,  "y": 53,  "w": 207, "h": 128, "manualResize": true, "text": "book flights\n↗ tokyo, april\nbefore prices jump", "page": 0, "zIndex": 102 },
            { "id": "n1776100345016",      "x": 87,  "y": 194, "w": 162, "text": "weekdash.com", "page": 0, "zIndex": 103 },
            { "id": "n1776200000001",      "x": 570, "y": 55,  "w": 265, "h": 185, "manualResize": true, "imageData": "vid/preview.mov", "page": 0, "zIndex": 104 }
        ];
        localStorage.setItem('aura_notes_v3', JSON.stringify(notes));
    }
    let topZ = Math.max(1100, ...notes.map(n => n.zIndex || 0));

    // Track mouse for paste-to-note
    let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    document.addEventListener('mousemove', (e) => {
        mousePos.x = e.clientX;
        mousePos.y = e.clientY;
    });

    document.addEventListener('paste', (e) => {
        // Skip if typing in an input/textarea
        if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) || document.activeElement.contentEditable === 'true') return;

        const text = (e.clipboardData || window.clipboardData).getData('text').trim();
        if (!text) return;

        // Simple URL check
        const urlRegex = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([/\w .-]*)*\/?$/i;
        if (urlRegex.test(text)) {
            e.preventDefault();
            // Extract domain.tld
            let domain = text.replace(/^(https?:\/\/)?(www\.)?/i, '').split('/')[0];
            
            const newNote = {
                id: 'n' + Date.now(),
                x: mousePos.x - 100,
                y: mousePos.y - 20,
                text: text,
                displayTitle: domain,
                zIndex: ++topZ,
                page: currentPage
            };
            // Actually, user wants trimmed text in the note.
            newNote.text = domain; 

            notes.push(newNote);
            createNote(newNote, true);
            save();
        }
    });

    // ---- MULTI-SELECTION HELPERS ----
    function clearSelection() {
        selectedNoteIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.remove('selected');
        });
        selectedNoteIds.clear();
    }

    function toggleNoteSelection(id) {
        const el = document.getElementById(id);
        if (!el) return;
        if (selectedNoteIds.has(id)) {
            selectedNoteIds.delete(id);
            el.classList.remove('selected');
        } else {
            selectedNoteIds.add(id);
            el.classList.add('selected');
        }
    }

    function selectNotesInRect(x1, y1, x2, y2) {
        const left = Math.min(x1, x2);
        const top = Math.min(y1, y2);
        const right = Math.max(x1, x2);
        const bottom = Math.max(y1, y2);

        clearSelection();

        document.querySelectorAll('.note').forEach(el => {
            const rect = el.getBoundingClientRect();
            // Collision: rectangle intersection
            if (rect.left < right && rect.right > left && rect.top < bottom && rect.bottom > top) {
                selectedNoteIds.add(el.id);
                el.classList.add('selected');
            }
        });
    }

    // ---- COPY / PASTE SELECTED NOTES ----
    let copiedNotes = null;

    let arrowSaveTimer = null;
    function scheduleArrowSave() {
        if (arrowSaveTimer) clearTimeout(arrowSaveTimer);
        arrowSaveTimer = setTimeout(() => { arrowSaveTimer = null; save(); }, 200);
    }

    window.addEventListener('keydown', (e) => {
        if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) || document.activeElement.contentEditable === 'true') return;

        // Cmd/Ctrl+C — copy selected notes
        if ((e.metaKey || e.ctrlKey) && e.key === 'c' && selectedNoteIds.size > 0) {
            e.preventDefault();
            const selectedData = notes.filter(n => selectedNoteIds.has(n.id));
            if (!selectedData.length) return;
            // Store copies with relative positions (offset from the group's top-left)
            const minX = Math.min(...selectedData.map(n => n.x));
            const minY = Math.min(...selectedData.map(n => n.y));
            copiedNotes = selectedData.map(n => ({
                text: n.text,
                color: n.color,
                imageData: n.imageData,
                w: n.w,
                h: n.h,
                manualResize: n.manualResize,
                ox: n.x - minX,
                oy: n.y - minY,
            }));
            return;
        }

        // Cmd/Ctrl+V — paste copied notes at mouse position
        if ((e.metaKey || e.ctrlKey) && e.key === 'v' && copiedNotes) {
            e.preventDefault();
            clearSelection();
            const baseX = mousePos.x - 20;
            const baseY = mousePos.y - 20;
            copiedNotes.forEach(src => {
                const n = {
                    id: 'n' + Date.now() + Math.random().toString(36).slice(2, 6),
                    x: baseX + src.ox,
                    y: baseY + src.oy,
                    text: src.text,
                    color: src.color,
                    w: src.w,
                    h: src.h,
                    manualResize: src.manualResize,
                    imageData: src.imageData,
                    zIndex: ++topZ,
                    page: currentPage,
                };
                notes.push(n);
                createNote(n);
                selectedNoteIds.add(n.id);
                const el = document.getElementById(n.id);
                if (el) el.classList.add('selected');
            });
            save();
            return;
        }

        // Delete / Backspace — delete selected notes immediately
        if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNoteIds.size > 0) {
            e.preventDefault();
            commitDeleteSelected();
            return;
        }

        // Arrow keys — nudge selected notes (Shift = bigger step)
        if (selectedNoteIds.size > 0 &&
            (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
            e.preventDefault();
            const step = e.shiftKey ? 10 : 1;
            const dx = e.key === 'ArrowLeft' ? -step : e.key === 'ArrowRight' ? step : 0;
            const dy = e.key === 'ArrowUp'   ? -step : e.key === 'ArrowDown'  ? step : 0;
            const margin = 20;
            selectedNoteIds.forEach(id => {
                const data = notes.find(n => n.id === id);
                const el = document.getElementById(id);
                if (!data || !el) return;
                const w = el.offsetWidth, h = el.offsetHeight;
                const nx = Math.min(Math.max(data.x + dx, margin), window.innerWidth  - w - margin);
                const ny = Math.min(Math.max(data.y + dy, margin), window.innerHeight - h - margin);
                data.x = nx; data.y = ny;
                el.style.left = nx + 'px';
                el.style.top  = ny + 'px';
            });
            scheduleArrowSave();
            return;
        }
    });

    // ---- SELECTION RECTANGLE ON WINDOW CLICK ----
    window.addEventListener('mousedown', (e) => {
        // Only start selection if clicking on empty space (not on a note, not on UI elements)
        if (
            e.button !== 0 ||
            e.target.closest('.note') ||
            e.target.closest('.dock-wrapper') ||
            e.target.closest('.settings-btn') ||
            e.target.closest('.search-overlay') ||
            e.target.closest('.note-context-menu') ||
            e.target.closest('.dev-modal') ||
            e.target.closest('.delete-confirm-modal') ||
            ['INPUT', 'TEXTAREA', 'BUTTON', 'A'].includes(e.target.tagName)
        ) return;

        isSelecting = true;
        selStart.x = e.clientX;
        selStart.y = e.clientY;
        
        document.body.classList.add('is-selecting');
        selRect.style.display = 'block';
        selRect.style.left = e.clientX + 'px';
        selRect.style.top = e.clientY + 'px';
        selRect.style.width = '0px';
        selRect.style.height = '0px';
    });

    window.addEventListener('mousemove', (e) => {
        if (!isSelecting) return;
        
        const x = e.clientX;
        const y = e.clientY;
        const left = Math.min(selStart.x, x);
        const top = Math.min(selStart.y, y);
        const width = Math.abs(x - selStart.x);
        const height = Math.abs(y - selStart.y);
        
        selRect.style.left = left + 'px';
        selRect.style.top = top + 'px';
        selRect.style.width = width + 'px';
        selRect.style.height = height + 'px';
        
        // Live preview: highlight notes that would be selected
        const right = Math.max(selStart.x, x);
        const bottom = Math.max(selStart.y, y);
        
        document.querySelectorAll('.note').forEach(el => {
            const rect = el.getBoundingClientRect();
            // Collision: rectangle intersection
            if (rect.left < right && rect.right > left && rect.top < bottom && rect.bottom > top) {
                el.classList.add('potential-select');
            } else {
                el.classList.remove('potential-select');
            }
        });
    });

    window.addEventListener('mouseup', (e) => {
        if (!isSelecting) return;
        isSelecting = false;
        document.body.classList.remove('is-selecting');
        
        const x = e.clientX;
        const y = e.clientY;
        const width = Math.abs(x - selStart.x);
        const height = Math.abs(y - selStart.y);
        
        // Remove potential-select from all notes
        document.querySelectorAll('.note.potential-select').forEach(el => el.classList.remove('potential-select'));
        
        // Only select if rectangle is large enough (avoid accidental clicks)
        if (width > 10 && height > 10) {
            selectNotesInRect(selStart.x, selStart.y, x, y);
        } else {
            // Small click - clear selection
            clearSelection();
        }
        
        selRect.style.display = 'none';
    });

    function wrapNote(note, data) {
        if (data.imageData) return;
        const content = note.querySelector('.note-content');
        if (!content) return;
        const text = data.text || '';
        if (!text.trim()) return;

        // Always clear fixed height so it auto-sizes to content
        note.style.height = '';
        delete data.h;

        if (data.manualResize) return;

        const lines = text.split('\n');

        // Single line (no explicit newlines) — let CSS fit-content + max-width handle it
        if (lines.length <= 1) {
            note.style.width = '';
            delete data.w;
            return;
        }

        // Multi-line: measure the longest line and size to fit
        const cs = getComputedStyle(content);
        const mirror = document.createElement('div');
        mirror.style.cssText = 'position:fixed;top:-9999px;left:-9999px;white-space:pre;visibility:hidden;pointer-events:none;';
        mirror.style.fontFamily = cs.fontFamily;
        mirror.style.fontSize = cs.fontSize;
        mirror.style.fontWeight = cs.fontWeight;
        mirror.style.lineHeight = cs.lineHeight;
        mirror.style.letterSpacing = cs.letterSpacing;
        document.body.appendChild(mirror);

        const NOTE_PAD = 32;
        const NOTE_MAX = 568;
        const NOTE_MIN = 80;

        let maxW = 0;
        lines.forEach(line => {
            mirror.textContent = line || ' ';
            maxW = Math.max(maxW, mirror.getBoundingClientRect().width);
        });
        mirror.remove();

        const edgeMax = Math.max(NOTE_MIN, window.innerWidth - data.x - 16);
        const w = Math.max(Math.min(Math.ceil(maxW) + NOTE_PAD, NOTE_MAX + NOTE_PAD, edgeMax), NOTE_MIN);
        note.style.width = w + 'px';
        data.w = w;
    }

    function linkify(text) {
        const urlRegex = /((https?:\/\/|www\.)[^\s]+|[a-zA-Z0-9-]+\.[a-zA-Z]{2,}[^\s]*)/gi;
        return text.replace(urlRegex, (url) => {
            let href = url.startsWith('http') ? url : 'https://' + url;
            return `<a href="${href}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${url}</a>`;
        });
    }

    let dockOffset = 0; // days offset from current start

    function initDock() {
        const dayNames = {
            en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            es: ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'],
            pt: ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'],
        };
        const now = new Date();
        const isMobile = window.innerWidth <= 430;
        const numDays = isMobile ? 5 : 7;
        const weekStart = new Date(now);
        weekStart.setHours(0, 0, 0, 0);
        weekStart.setDate(now.getDate() + dockOffset);

        const dock = document.getElementById('dock');
        dock.innerHTML = '';

        for (let i = 0; i < numDays; i++) {
            const date = new Date(weekStart);
            date.setDate(weekStart.getDate() + i);
            const dateStr = toISO(date);
            const isToday = date.toDateString() === now.toDateString();
            const isPast = date < new Date(now.getFullYear(), now.getMonth(), now.getDate());

            // 1. Create Day Card
            const card = document.createElement('div');
            const isWeekend = date.getDay() === 0 || date.getDay() === 6;
            card.className = `day-card${isToday ? ' active' : ''}${isPast ? ' past' : ''}${isWeekend ? ' weekend' : ''}`;
            card.dataset.date = dateStr;
            card.innerHTML = `
                <span class="day-name">${(dayNames[lang] || dayNames['en'])[date.getDay()]}</span>
                <div class="day-main-row">
                    <span class="day-number">${date.getDate()}</span>
                </div>
            `;
            dock.appendChild(card);
            if (isToday) {
                requestAnimationFrame(() => {
                    const light = document.getElementById('active-day-light');
                    if (!light) return;
                    const cr = card.getBoundingClientRect();
                    light.style.left = (cr.left + cr.width / 2) + 'px';
                    light.style.top  = (cr.top  + cr.height / 2) + 'px';
                });
            }

            // 2. Separators (dock only)
            if (i < numDays - 1) {
                const nextDate = new Date(weekStart);
                nextDate.setDate(weekStart.getDate() + i + 1);
                const nextIsToday = nextDate.toDateString() === now.toDateString();
                if (!isToday && !nextIsToday) {
                    const sep = document.createElement('div');
                    sep.className = 'day-separator';
                    dock.appendChild(sep);
                }
            }
        }
    }

    const RULER_START = 0;   // midnight
    const RULER_END   = 24;  // midnight
    const RULER_SPAN  = RULER_END - RULER_START;

    window.drawSunriseSunset = function() {
        return; // Sun/moon arc removed
        const ruler = document.getElementById('time-ruler');
        ruler.querySelectorAll('.sun-label').forEach(el => el.remove());
        const sun = window.todaySunTimes;
        if (!sun) return;

        const toH = iso => { const d = new Date(iso); return d.getHours() + d.getMinutes() / 60; };
        const toPct = h => Math.max(0, Math.min(100, (h - RULER_START) / RULER_SPAN * 100));
        const fmt = iso => {
            const d = new Date(iso);
            const h = d.getHours(), mm = String(d.getMinutes()).padStart(2,'0');
            return `${h % 12 || 12}:${mm}${h >= 12 ? 'pm' : 'am'}`;
        };

        const riseH = toH(sun.rise), setH = toH(sun.set);

            <line x1="0" y1="11" x2="12" y2="11"/>

        </svg>`;
        const setIcon = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
            <circle cx="6" cy="4" r="2.2"/>
            <line x1="6" y1="0.5" x2="6" y2="1.8"/>

            <line x1="0" y1="8" x2="12" y2="8"/>
            <polyline points="4,9.5 6,11.5 8,9.5"/>
        </svg>`;

        const makeLabel = (iso, pct, icon) => {
            const l = document.createElement('div');

        if (riseH >= RULER_START && riseH <= RULER_END) makeLabel(sun.rise, risePct, riseIcon);
        if (setH  >= RULER_START && setH  <= RULER_END) makeLabel(sun.set,  setPct,  setIcon);

    function buildTimeRuler() {
        const ruler = document.getElementById('time-ruler');
        ruler.querySelectorAll('.time-ruler-tick').forEach(el => el.remove());

        const now = new Date();
        const nowH = now.getHours() + now.getMinutes() / 60;

        for (let h = RULER_START; h <= RULER_END; h++) {
            const isPastH = h <= nowH;

            // Hour tick
            const pct = (h - RULER_START) / RULER_SPAN * 100;
            const tick = document.createElement('div');
            tick.className = 'time-ruler-tick hour';
            tick.style.left = pct + '%';
            tick.style.background = isPastH ? '#c580fb' : 'var(--text-color)';
            tick.style.opacity = isPastH ? '0.55' : '0.25';
            ruler.appendChild(tick);

            if (h < RULER_END) {
                // Half-hour tick
                const halfPct = (h + 0.5 - RULER_START) / RULER_SPAN * 100;
                const isPastHalf = (h + 0.5) <= nowH;
                const half = document.createElement('div');
                half.className = 'time-ruler-tick half';
                half.style.left = halfPct + '%';
                half.style.background = isPastHalf ? '#c580fb' : 'var(--text-color)';
                half.style.opacity = isPastHalf ? '0.35' : '0.15';
                ruler.appendChild(half);

                // Quarter-hour ticks
                [0.25, 0.75].forEach(q => {
                    const qPct = (h + q - RULER_START) / RULER_SPAN * 100;
                    const isPastQ = (h + q) <= nowH;
                    const qt = document.createElement('div');
                    qt.className = 'time-ruler-tick quarter';
                    qt.style.left = qPct + '%';
                    qt.style.background = isPastQ ? '#c580fb' : 'var(--text-color)';
                    qt.style.opacity = isPastQ ? '0.2' : '0.08';
                    ruler.appendChild(qt);
                });
            }
        }
    }
